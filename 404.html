<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>404 — Page Not Found | Learn with Champak</title>

<meta name="description" content="The page you were looking for does not exist on Learn with Champak. Search the blog instead."/>
<meta name="theme-color" content="#f4a340">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0f1319;
--panel:#1a202b;
--text:#edf2f8;
--muted:#9aa7b6;
--saffron:#f4a340;
--saffron2:#ffd08a;
--radius:22px;
--max:900px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,system-ui;
background:
radial-gradient(circle at top left, rgba(244,163,64,.15), transparent 35%),
linear-gradient(180deg,#0f1319,#171c25);
color:var(--text);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.container{
width:min(100%,var(--max));
}

.card{
background:var(--panel);
border-radius:28px;
padding:40px;
text-align:center;
border:1px solid rgba(255,255,255,.08);
box-shadow:0 20px 50px rgba(0,0,0,.4);
}

.logo{
display:inline-flex;
align-items:center;
justify-content:center;
width:70px;
height:70px;
border-radius:18px;
background:linear-gradient(135deg,var(--saffron),#ff8f2a);
font-family:"DM Sans";
font-weight:800;
color:#2b1500;
font-size:24px;
margin-bottom:18px;
}

h1{
font-family:"DM Sans";
font-size:42px;
margin:0 0 10px 0;
}

.subtitle{
color:var(--muted);
margin-bottom:30px;
}

.search{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-bottom:25px;
}

input{
flex:1;
min-width:240px;
padding:14px 16px;
border-radius:12px;
border:1px solid #333;
background:#11161d;
color:white;
font-size:16px;
}

button{
padding:14px 18px;
border-radius:12px;
border:none;
background:linear-gradient(135deg,var(--saffron),#ff8f2a);
color:#2b1500;
font-weight:700;
cursor:pointer;
}

button.secondary{
background:#11161d;
color:white;
border:1px solid #333;
}

.links{
margin-top:20px;
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
}

.link-btn{
padding:12px 16px;
border-radius:12px;
border:1px solid #333;
background:#11161d;
color:white;
text-decoration:none;
}

.link-btn:hover{
border-color:var(--saffron);
}

.footer{
margin-top:28px;
font-size:14px;
color:var(--muted);
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="logo">PP</div>

<h1>404</h1>

<p class="subtitle">
The page you were looking for does not exist.
<br>
But you can search the blog below.
</p>

<div class="search">

<input id="q" placeholder="Search learnwithchampak.live">

<button onclick="search()">Search</button>

</div>

<div class="links">

<a class="link-btn" href="https://www.learnwithchampak.live">
Home
</a>

<a class="link-btn" href="https://www.learnwithchampak.live/search">
Blog Search
</a>

<a class="link-btn" href="https://programmer-s-picnic.github.io">
Programmer's Picnic
</a>

</div>

<div class="footer">
Learn with Champak • Champak Roy • Programmer's Picnic
</div>

</div>

</div>

<script>

function search(){

const q=document.getElementById("q").value.trim()

if(!q)return

const url="https://www.google.com/search?q=site:learnwithchampak.live+"+encodeURIComponent(q)

window.location=url

}

document.getElementById("q").addEventListener("keydown",function(e){

if(e.key==="Enter")search()

})

</script>

</body>
</html>
