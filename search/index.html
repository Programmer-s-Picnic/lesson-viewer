<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Programmer’s Picnic — Search</title>
    <meta name="theme-color" content="#d97706" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #fff7e6;
        --panel: rgba(255, 255, 255, 0.86);
        --ink: #1f2328;
        --muted: #5b6570;
        --line: rgba(31, 35, 40, 0.12);
        --saffron: #d97706;
        --saffron2: #ffb74d;
        --shadow: 0 18px 50px rgba(31, 35, 40, 0.14);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "DM Sans", sans-serif;
        background:
          radial-gradient(
            1000px 520px at 20% 0%,
            rgba(217, 119, 6, 0.18),
            transparent 60%
          ),
          radial-gradient(
            900px 520px at 80% 10%,
            rgba(255, 159, 28, 0.14),
            transparent 55%
          ),
          linear-gradient(180deg, #fffaf0, var(--bg));
      }
      .wrap {
        max-width: 950px;
        margin: 0 auto;
        padding: 18px;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .chat {
        flex: 1;
        overflow: auto;
        background: var(--panel);
        border-radius: 24px;
        padding: 18px;
        box-shadow: var(--shadow);
      }
      .row {
        display: flex;
        margin: 12px 0;
      }
      .row.user {
        justify-content: flex-end;
      }
      .row.bot {
        justify-content: flex-start;
      }
      .bubble {
        max-width: 78%;
        padding: 14px 16px;
        border-radius: 18px;
        background: white;
        border: 1px solid var(--line);
      }
      .user .bubble {
        background: linear-gradient(
          180deg,
          rgba(217, 119, 6, 0.25),
          rgba(255, 183, 77, 0.22)
        );
      }
      .meta {
        font-size: 12px;
        color: var(--muted);
        margin-top: 6px;
        font-weight: 800;
      }
      .inputbar {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }
      input {
        flex: 1;
        padding: 14px;
        border-radius: 16px;
        border: 1px solid var(--line);
        font-weight: 800;
        font-size: 14px;
      }
      button {
        padding: 12px 16px;
        border-radius: 16px;
        border: 1px solid var(--line);
        font-weight: 800;
        cursor: pointer;
      }
      .primary {
        background: linear-gradient(135deg, var(--saffron2), var(--saffron));
        border: none;
      }
      .controls {
        display: flex;
        gap: 12px;
        margin-top: 8px;
        align-items: center;
        font-weight: 800;
      }
      .small {
        font-size: 12px;
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="chat" id="chat"></div>

      <div class="controls">
        <label><input type="checkbox" id="semToggle" /> Semantic</label>
        <button id="voiceBtn">🎙 Voice</button>
      </div>

      <div class="inputbar">
        <input id="q" placeholder="Ask something..." />
        <button id="send" class="primary">Search</button>
      </div>
    </div>

    <script type="module">
      /* ===============================
   GLOBAL STATE
=============================== */

      let INDEX = [];
      let VECTORS = [];
      let VECTOR_MAP = new Map();
      let extractor = null;

      /* ===============================
   LOAD JSON
=============================== */

      async function loadData() {
        const idx = await fetch("./index.json").then((r) => r.json());
        INDEX = idx.items || [];

        const emb = await fetch("./embeddings.json").then((r) => r.json());
        VECTORS = emb.vectors || [];

        for (const v of VECTORS) {
          VECTOR_MAP.set(v.id, v.v);
        }

        bot("Index loaded: " + INDEX.length + " posts.");
      }

      /* ===============================
   CHAT UI
=============================== */

      const chat = document.getElementById("chat");

      function bot(html) {
        const row = document.createElement("div");
        row.className = "row bot";
        row.innerHTML = `<div class="bubble">${html}</div>`;
        chat.appendChild(row);
        chat.scrollTop = chat.scrollHeight;
      }
      function user(text) {
        const row = document.createElement("div");
        row.className = "row user";
        row.innerHTML = `<div class="bubble">${escape(text)}</div>`;
        chat.appendChild(row);
        chat.scrollTop = chat.scrollHeight;
      }
      function escape(s) {
        return s.replace(
          /[&<>"]/g,
          (c) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
            })[c],
        );
      }

      /* ===============================
   KEYWORD SEARCH
=============================== */

      function keywordSearch(q) {
        const tokens = q.toLowerCase().split(/\s+/);
        const scored = [];
        for (const item of INDEX) {
          const text = (
            item.title +
            " " +
            item.text +
            " " +
            item.labels.join(" ")
          ).toLowerCase();
          let score = 0;
          for (const t of tokens) {
            if (text.includes(t)) score++;
          }
          if (score > 0) scored.push({ item, score });
        }
        scored.sort((a, b) => b.score - a.score);
        return scored.slice(0, 8).map((x) => x.item);
      }

      /* ===============================
   SEMANTIC SEARCH
=============================== */

      function cosine(a, b) {
        let s = 0;
        for (let i = 0; i < a.length; i++) s += a[i] * b[i];
        return s;
      }

      function normalize(v) {
        let s = 0;
        for (let i = 0; i < v.length; i++) s += v[i] * v[i];
        const d = Math.sqrt(s) + 1e-12;
        return v.map((x) => x / d);
      }

      function meanPool(t) {
        const arr = Array.isArray(t[0][0]) ? t[0] : t;
        const dim = arr[0].length;
        const out = new Array(dim).fill(0);
        for (let i = 0; i < arr.length; i++) {
          for (let d = 0; d < dim; d++) out[d] += arr[i][d];
        }
        for (let d = 0; d < dim; d++) out[d] /= arr.length;
        return out;
      }

      async function ensureModel() {
        if (extractor) return extractor;

        bot("Loading semantic model...");
        const { pipeline, env } =
          await import("https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2");

        env.useBrowserCache = true;

        extractor = await pipeline(
          "feature-extraction",
          "Xenova/paraphrase-multilingual-MiniLM-L12-v2",
          { quantized: true },
        );

        bot("Model ready.");
        return extractor;
      }

      async function semanticSearch(q) {
        if (!VECTORS.length) return [];

        const model = await ensureModel();

        const out = await model(q);
        const queryVec = normalize(meanPool(out.data));

        const scored = [];

        for (const item of INDEX) {
          const vec = VECTOR_MAP.get(item.id);
          if (!vec) continue;
          const score = cosine(queryVec, vec);
          scored.push({ item, score });
        }

        scored.sort((a, b) => b.score - a.score);
        return scored.slice(0, 8).map((x) => x.item);
      }

      /* ===============================
   RUN SEARCH
=============================== */

      async function run() {
        const q = document.getElementById("q").value.trim();
        if (!q) return;

        user(q);

        const useSem = document.getElementById("semToggle").checked;

        let results;
        if (useSem) {
          results = await semanticSearch(q);
        } else {
          results = keywordSearch(q);
        }

        if (!results.length) {
          bot("No results found.");
          return;
        }

        let html = "";
        results.forEach((r) => {
          html += `
    <div>
      <b>${escape(r.title)}</b><br/>
      <span class="small">${escape(r.snippet)}</span><br/>
      <a href="${r.link}" target="_blank">Open ↗</a>
      <div class="meta">${r.labels.join(", ")}</div>
    </div><hr/>`;
        });

        bot(html);
      }

      /* ===============================
   VOICE
=============================== */

      function startVoice() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) {
          bot("Voice not supported.");
          return;
        }

        const rec = new SR();
        rec.lang = "en-IN";
        rec.onresult = (e) => {
          document.getElementById("q").value = e.results[0][0].transcript;
        };
        rec.start();
      }

      document.getElementById("send").onclick = run;
      document.getElementById("voiceBtn").onclick = startVoice;
      document.getElementById("q").addEventListener("keydown", (e) => {
        if (e.key === "Enter") run();
      });

      /* ===============================
   INIT
=============================== */

      loadData();
      bot("Search ready.");
    </script>
  </body>
</html>
