<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Programmer's Picnic Whiteboard — Modular Skeleton</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">Programmer's Picnic — Whiteboard Engine</div>
      <div class="top-actions">
        <button id="themeBtn">Toggle Theme</button>
        <button id="newBtn">New</button>
        <button id="saveBtn">Export JSON</button>
        <button id="loadBtn">Load JSON</button>
        <button id="pngBtn">Export PNG</button>
        <input id="fileInput" type="file" accept="application/json" hidden />
      </div>
    </header>

    <section class="toolbar">
      <button data-tool="select" class="active">Select</button>
      <button data-tool="rect">Rect</button>
      <button data-tool="ellipse">Ellipse</button>
      <button data-tool="diamond">Diamond</button>
      <button data-tool="line">Line</button>
      <button data-tool="arrow">Arrow</button>
      <button data-tool="text">Text</button>
      <label class="color-label">Stroke <input type="color" id="strokeColor" value="#1f2328" /></label>
      <label class="color-label">Fill <input type="color" id="fillColor" value="#fff1c7" /></label>
      <label class="range-label">Stroke <input type="range" id="strokeWidth" min="1" max="12" step="1" value="2" /><span id="strokeWidthValue">2</span></label>
      <label class="select-label">Font <select id="fontFamily">
        <option value="Inter, sans-serif">Inter</option>
        <option value="Arial, sans-serif">Arial</option>
        <option value="Georgia, serif">Georgia</option>
        <option value="Courier New, monospace">Courier New</option>
        <option value="Verdana, sans-serif">Verdana</option>
      </select></label>
      <label class="range-label">Size <input type="range" id="fontSize" min="10" max="48" step="1" value="18" /><span id="fontSizeValue">18</span></label>
      <button id="groupBtn">Group</button>
      <button id="ungroupBtn">Ungroup</button>
      <button id="undoBtn">Undo</button>
      <button id="redoBtn">Redo</button>
      <button id="selectAllBtn">Select All</button>
      <div class="status" id="statusText">Ready</div>
    </section>

    <main class="board-shell">
      <aside class="props-panel" id="propsPanel">
        <div class="props-title">Selected Object</div>
        <label class="prop-row">Stroke <input type="color" id="propStroke" value="#1f2328" /></label>
        <label class="prop-row">Fill <input type="color" id="propFill" value="#fff1c7" /></label>
        <label class="prop-row">Width <input type="number" id="propWidth" min="1" step="1" /></label>
        <label class="prop-row">Height <input type="number" id="propHeight" min="1" step="1" /></label>
        <label class="prop-row">Stroke Width <input type="range" id="propStrokeWidth" min="1" max="12" step="1" value="2" /></label>
        <label class="prop-row">Font Family <select id="propFontFamily">
          <option value="Inter, sans-serif">Inter</option>
          <option value="Arial, sans-serif">Arial</option>
          <option value="Georgia, serif">Georgia</option>
          <option value="Courier New, monospace">Courier New</option>
          <option value="Verdana, sans-serif">Verdana</option>
        </select></label>
        <label class="prop-row">Font Size <input type="range" id="propFontSize" min="10" max="48" step="1" value="18" /></label>
        <label class="prop-row">Text <textarea id="propText" rows="4" placeholder="Edit selected text"></textarea></label>
      </aside>
      <canvas id="board"></canvas>
      <div class="hint">
        Shift+click adds selection · Drag empty space for marquee · Delete removes selection · Cursor changes by tool
      </div>
    </main>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
