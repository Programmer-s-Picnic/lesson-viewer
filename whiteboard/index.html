<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Programmer's Picnic Whiteboard Engine Skeleton</title>
    <style>
      :root {
        --bg: #fff8ef;
        --panel: #ffffff;
        --ink: #1f2328;
        --muted: #5f6771;
        --line: #d0d7de;
        --accent: #ff9f1c;
        --accent-2: #2563eb;
        --canvas-bg: #fffdf8;
      }

      [data-theme="dark"] {
        --bg: #0f1115;
        --panel: #161a21;
        --ink: #e6edf3;
        --muted: #9aa4af;
        --line: #2a2f37;
        --accent: #ff9f1c;
        --accent-2: #60a5fa;
        --canvas-bg: #0f1115;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      .app {
        display: grid;
        grid-template-rows: auto auto 1fr;
        height: 100%;
      }

      .topbar,
      .toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
        flex-wrap: wrap;
      }

      .brand {
        font-weight: 800;
        margin-right: auto;
      }

      .status {
        margin-left: auto;
        color: var(--muted);
        font-size: 12px;
      }

      button,
      select,
      input {
        font: inherit;
      }

      button {
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--ink);
        padding: 8px 12px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 700;
      }

      button:hover {
        border-color: var(--accent);
      }

      button.active {
        background: color-mix(in srgb, var(--accent) 18%, var(--panel));
        border-color: var(--accent);
      }

      .shell {
        position: relative;
        overflow: hidden;
      }

      #board {
        display: block;
        width: 100%;
        height: 100%;
        background: var(--canvas-bg);
        cursor: crosshair;
      }

      .floating {
        position: absolute;
        left: 12px;
        bottom: 12px;
        background: color-mix(in srgb, var(--panel) 92%, transparent);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 8px 10px;
        font-size: 12px;
        color: var(--muted);
        backdrop-filter: blur(8px);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <div class="brand">
          Programmer's Picnic — Whiteboard Engine Skeleton
        </div>
        <button id="themeBtn">Toggle Theme</button>
        <button id="newBtn">New</button>
        <button id="saveBtn">Export JSON</button>
        <button id="loadBtn">Load JSON</button>
        <button id="pngBtn">Export PNG</button>
        <input id="fileInput" type="file" accept="application/json" hidden />
        <div class="status" id="statusText">Ready</div>
      </div>

      <div class="toolbar" id="toolbar">
        <button data-tool="select" class="active">Select</button>
        <button data-tool="rect">Rect</button>
        <button data-tool="ellipse">Ellipse</button>
        <button data-tool="diamond">Diamond</button>
        <button data-tool="line">Line</button>
        <button data-tool="arrow">Arrow</button>
        <button data-tool="text">Text</button>
        <button id="groupBtn">Group</button>
        <button id="ungroupBtn">Ungroup</button>
        <button id="undoBtn">Undo</button>
        <button id="redoBtn">Redo</button>
        <button id="selectAllBtn">Select All</button>
      </div>

      <div class="shell">
        <canvas id="board"></canvas>
        <div class="floating">
          Shift+click: multi-select · Drag empty space: marquee · Ctrl/Cmd+Z:
          undo
        </div>
      </div>
    </div>

    <script>
      /******************************************************************
       * 1. CONSTANTS AND ENUMS
       ******************************************************************/
      const OBJECT_TYPES = Object.freeze({
        RECT: "rect",
        ELLIPSE: "ellipse",
        DIAMOND: "diamond",
        LINE: "line",
        ARROW: "arrow",
        TEXT: "text",
        STICKY: "sticky",
        CODEBLOCK: "codeblock",
      });

      const TOOLS = Object.freeze({
        SELECT: "select",
        RECT: "rect",
        ELLIPSE: "ellipse",
        DIAMOND: "diamond",
        LINE: "line",
        ARROW: "arrow",
        TEXT: "text",
      });

      const COMMANDS = Object.freeze({
        ADD_OBJECTS: "ADD_OBJECTS",
        DELETE_OBJECTS: "DELETE_OBJECTS",
        UPDATE_OBJECTS: "UPDATE_OBJECTS",
        GROUP_OBJECTS: "GROUP_OBJECTS",
        UNGROUP_OBJECTS: "UNGROUP_OBJECTS",
        LOAD_BOARD: "LOAD_BOARD",
        CLEAR_BOARD: "CLEAR_BOARD",
      });

      /******************************************************************
       * 2. UTILITIES
       ******************************************************************/
      const Id = (() => {
        let objectCounter = 1;
        let groupCounter = 1;
        return {
          object() {
            return `obj_${objectCounter++}`;
          },
          group() {
            return `group_${groupCounter++}`;
          },
        };
      })();

      function deepClone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function normalizeRect(x1, y1, x2, y2) {
        return {
          x: Math.min(x1, x2),
          y: Math.min(y1, y2),
          width: Math.abs(x2 - x1),
          height: Math.abs(y2 - y1),
        };
      }

      /******************************************************************
       * 3. STATE FACTORY
       ******************************************************************/
      function createInitialBoardState() {
        const now = Date.now();
        return {
          version: 1,
          metadata: {
            boardId: `board_${now}`,
            title: "Untitled Board",
            createdAt: now,
            updatedAt: now,
            author: "Programmer's Picnic",
          },
          camera: {
            zoom: 1,
            panX: 0,
            panY: 0,
            minZoom: 0.25,
            maxZoom: 4,
          },
          settings: {
            theme: "light",
            showGrid: true,
            snapToGrid: false,
            gridSize: 20,
            background: "#fff8ef",
          },
          toolState: {
            activeTool: TOOLS.SELECT,
            toolOptions: {
              stroke: "#1f2328",
              fill: "#fff1c7",
              strokeWidth: 2,
              fontSize: 18,
              fontFamily: "Inter, sans-serif",
            },
          },
          selection: {
            selectedIds: [],
            hoverId: null,
            marquee: {
              active: false,
              x: 0,
              y: 0,
              width: 0,
              height: 0,
            },
            transform: {
              mode: null,
              handle: null,
            },
          },
          objects: [],
          groups: [],
          connectors: [],
        };
      }

      let boardState = createInitialBoardState();

      /******************************************************************
       * 4. OBJECT FACTORIES
       ******************************************************************/
      function createBaseObject(type, x, y, width, height, style = {}) {
        return {
          id: Id.object(),
          type,
          x,
          y,
          width,
          height,
          rotation: 0,
          zIndex: getNextZIndex(),
          locked: false,
          visible: true,
          groupId: null,
          style: {
            stroke: "#1f2328",
            fill: "#fff1c7",
            strokeWidth: 2,
            opacity: 1,
            ...style,
          },
          meta: {},
        };
      }

      function createRect(x, y, width, height) {
        return {
          ...createBaseObject(OBJECT_TYPES.RECT, x, y, width, height),
          radius: 12,
        };
      }

      function createEllipse(x, y, width, height) {
        return createBaseObject(OBJECT_TYPES.ELLIPSE, x, y, width, height);
      }

      function createDiamond(x, y, width, height) {
        return createBaseObject(OBJECT_TYPES.DIAMOND, x, y, width, height);
      }

      function createLine(x1, y1, x2, y2) {
        return {
          id: Id.object(),
          type: OBJECT_TYPES.LINE,
          x1,
          y1,
          x2,
          y2,
          zIndex: getNextZIndex(),
          locked: false,
          visible: true,
          groupId: null,
          style: {
            stroke: "#1f2328",
            strokeWidth: 2,
            opacity: 1,
          },
          meta: {},
        };
      }

      function createArrow(x1, y1, x2, y2) {
        return {
          ...createLine(x1, y1, x2, y2),
          type: OBJECT_TYPES.ARROW,
          arrowStart: false,
          arrowEnd: true,
        };
      }

      function createText(x, y, text) {
        return {
          id: Id.object(),
          type: OBJECT_TYPES.TEXT,
          x,
          y,
          width: Math.max(120, text.length * 10),
          height: 32,
          rotation: 0,
          zIndex: getNextZIndex(),
          locked: false,
          visible: true,
          groupId: null,
          text,
          textAlign: "left",
          verticalAlign: "top",
          style: {
            color: "#1f2328",
            fontSize: 18,
            fontFamily: "Inter, sans-serif",
            fontWeight: 600,
            opacity: 1,
          },
          meta: {},
        };
      }

      function getNextZIndex() {
        const zValues = boardState.objects.map((obj) => obj.zIndex || 0);
        return (zValues.length ? Math.max(...zValues) : 0) + 1;
      }

      /******************************************************************
       * 5. GROUP HELPERS
       ******************************************************************/
      function createGroup(childIds) {
        return {
          id: Id.group(),
          type: "group",
          childIds: [...childIds],
          parentGroupId: null,
          locked: false,
          visible: true,
          meta: {},
        };
      }

      function getObjectById(id) {
        return boardState.objects.find((obj) => obj.id === id) || null;
      }

      function getGroupById(id) {
        return boardState.groups.find((group) => group.id === id) || null;
      }

      function getTopSelectableId(id) {
        const obj = getObjectById(id);
        if (!obj) return null;
        return obj.groupId || obj.id;
      }

      function expandSelectionIds(ids) {
        const expanded = new Set();
        for (const id of ids) {
          const group = getGroupById(id);
          if (group) {
            group.childIds.forEach((childId) => expanded.add(childId));
            continue;
          }

          const obj = getObjectById(id);
          if (!obj) continue;

          if (obj.groupId) {
            const parent = getGroupById(obj.groupId);
            if (parent) {
              parent.childIds.forEach((childId) => expanded.add(childId));
            } else {
              expanded.add(obj.id);
            }
          } else {
            expanded.add(obj.id);
          }
        }
        return [...expanded];
      }

      function getSelectionObjects() {
        return expandSelectionIds(boardState.selection.selectedIds)
          .map(getObjectById)
          .filter(Boolean);
      }

      /******************************************************************
       * 6. GEOMETRY HELPERS
       ******************************************************************/
      function getObjectBounds(obj) {
        if (!obj) return null;

        if (obj.type === OBJECT_TYPES.LINE || obj.type === OBJECT_TYPES.ARROW) {
          return normalizeRect(obj.x1, obj.y1, obj.x2, obj.y2);
        }

        return {
          x: obj.x,
          y: obj.y,
          width: obj.width,
          height: obj.height,
        };
      }

      function getSelectionBounds() {
        const items = getSelectionObjects();
        if (!items.length) return null;

        const bounds = items.map(getObjectBounds).filter(Boolean);
        const x1 = Math.min(...bounds.map((b) => b.x));
        const y1 = Math.min(...bounds.map((b) => b.y));
        const x2 = Math.max(...bounds.map((b) => b.x + b.width));
        const y2 = Math.max(...bounds.map((b) => b.y + b.height));

        return {
          x: x1,
          y: y1,
          width: x2 - x1,
          height: y2 - y1,
        };
      }

      function pointInRect(px, py, rect) {
        return (
          px >= rect.x &&
          py >= rect.y &&
          px <= rect.x + rect.width &&
          py <= rect.y + rect.height
        );
      }

      function hitTest(worldX, worldY) {
        const objects = [...boardState.objects]
          .filter((obj) => obj.visible !== false)
          .sort((a, b) => (b.zIndex || 0) - (a.zIndex || 0));

        for (const obj of objects) {
          const bounds = getObjectBounds(obj);
          if (!bounds) continue;
          if (pointInRect(worldX, worldY, bounds)) {
            return obj;
          }
        }
        return null;
      }

      function marqueeIntersect(rectA, rectB) {
        return (
          rectA.x < rectB.x + rectB.width &&
          rectA.x + rectA.width > rectB.x &&
          rectA.y < rectB.y + rectB.height &&
          rectA.y + rectA.height > rectB.y
        );
      }

      /******************************************************************
       * 7. COMMAND EXECUTOR + HISTORY
       ******************************************************************/
      const history = {
        undoStack: [],
        redoStack: [],
      };

      function executeCommand(command, options = { record: true }) {
        applyCommand(command);

        if (options.record) {
          history.undoStack.push(deepClone(command));
          history.redoStack.length = 0;
        }

        boardState.metadata.updatedAt = Date.now();
        requestRender();
      }

      function applyCommand(command) {
        switch (command.type) {
          case COMMANDS.ADD_OBJECTS: {
            boardState.objects.push(...deepClone(command.payload.objects));
            break;
          }

          case COMMANDS.DELETE_OBJECTS: {
            const ids = new Set(command.payload.ids);
            boardState.objects = boardState.objects.filter(
              (obj) => !ids.has(obj.id),
            );
            boardState.groups = boardState.groups.filter(
              (group) => !ids.has(group.id),
            );
            boardState.selection.selectedIds =
              boardState.selection.selectedIds.filter((id) => !ids.has(id));
            break;
          }

          case COMMANDS.UPDATE_OBJECTS: {
            const patchMap = new Map(
              command.payload.after.map((item) => [item.id, item]),
            );
            boardState.objects = boardState.objects.map((obj) =>
              patchMap.has(obj.id) ? patchMap.get(obj.id) : obj,
            );
            break;
          }

          case COMMANDS.GROUP_OBJECTS: {
            const group = deepClone(command.payload.group);
            boardState.groups.push(group);
            for (const childId of group.childIds) {
              const child = getObjectById(childId);
              if (child) child.groupId = group.id;
            }
            boardState.selection.selectedIds = [group.id];
            break;
          }

          case COMMANDS.UNGROUP_OBJECTS: {
            const { groupId } = command.payload;
            const group = getGroupById(groupId);
            if (group) {
              for (const childId of group.childIds) {
                const child = getObjectById(childId);
                if (child && child.groupId === groupId) child.groupId = null;
              }
            }
            boardState.groups = boardState.groups.filter(
              (g) => g.id !== groupId,
            );
            boardState.selection.selectedIds = [];
            break;
          }

          case COMMANDS.LOAD_BOARD: {
            boardState = deepClone(command.payload.state);
            break;
          }

          case COMMANDS.CLEAR_BOARD: {
            boardState.objects = [];
            boardState.groups = [];
            boardState.connectors = [];
            boardState.selection.selectedIds = [];
            break;
          }

          default:
            console.warn("Unknown command:", command);
        }
      }

      function invertCommand(command) {
        switch (command.type) {
          case COMMANDS.ADD_OBJECTS:
            return {
              type: COMMANDS.DELETE_OBJECTS,
              payload: { ids: command.payload.objects.map((obj) => obj.id) },
            };

          case COMMANDS.DELETE_OBJECTS:
            return {
              type: COMMANDS.ADD_OBJECTS,
              payload: {
                objects: deepClone(command.payload.objectsBackup || []),
              },
            };

          case COMMANDS.UPDATE_OBJECTS:
            return {
              type: COMMANDS.UPDATE_OBJECTS,
              payload: { after: deepClone(command.payload.before) },
            };

          case COMMANDS.GROUP_OBJECTS:
            return {
              type: COMMANDS.UNGROUP_OBJECTS,
              payload: { groupId: command.payload.group.id },
            };

          case COMMANDS.UNGROUP_OBJECTS:
            return {
              type: COMMANDS.GROUP_OBJECTS,
              payload: { group: deepClone(command.payload.groupBackup) },
            };

          case COMMANDS.LOAD_BOARD:
            return {
              type: COMMANDS.LOAD_BOARD,
              payload: { state: deepClone(command.payload.previousState) },
            };

          case COMMANDS.CLEAR_BOARD:
            return {
              type: COMMANDS.LOAD_BOARD,
              payload: { state: deepClone(command.payload.previousState) },
            };

          default:
            return null;
        }
      }

      function undo() {
        const command = history.undoStack.pop();
        if (!command) return;

        const inverse = invertCommand(command);
        if (!inverse) return;

        history.redoStack.push(deepClone(command));
        applyCommand(inverse);
        requestRender();
      }

      function redo() {
        const command = history.redoStack.pop();
        if (!command) return;
        history.undoStack.push(deepClone(command));
        applyCommand(command);
        requestRender();
      }

      /******************************************************************
       * 8. CAMERA / COORDINATE SYSTEM
       ******************************************************************/
      function screenToWorld(x, y) {
        const { zoom, panX, panY } = boardState.camera;
        return {
          x: (x - panX) / zoom,
          y: (y - panY) / zoom,
        };
      }

      function worldToScreen(x, y) {
        const { zoom, panX, panY } = boardState.camera;
        return {
          x: x * zoom + panX,
          y: y * zoom + panY,
        };
      }

      /******************************************************************
       * 9. RENDERER
       ******************************************************************/
      const canvas = document.getElementById("board");
      const ctx = canvas.getContext("2d");
      const statusText = document.getElementById("statusText");

      let renderPending = false;

      function resizeCanvas() {
        const shell = canvas.parentElement;
        const rect = shell.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        canvas.style.width = `${rect.width}px`;
        canvas.style.height = `${rect.height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        requestRender();
      }

      function requestRender() {
        if (renderPending) return;
        renderPending = true;
        requestAnimationFrame(() => {
          renderPending = false;
          render();
        });
      }

      function render() {
        const rect = canvas.getBoundingClientRect();
        ctx.clearRect(0, 0, rect.width, rect.height);

        drawBackground(rect.width, rect.height);
        drawGrid(rect.width, rect.height);

        ctx.save();
        applyCameraTransform();

        drawObjects();
        drawSelectionOverlay();
        drawMarquee();

        ctx.restore();

        updateStatusText();
      }

      function drawBackground(width, height) {
        const styles = getComputedStyle(document.documentElement);
        ctx.fillStyle = styles.getPropertyValue("--canvas-bg").trim();
        ctx.fillRect(0, 0, width, height);
      }

      function applyCameraTransform() {
        const { zoom, panX, panY } = boardState.camera;
        ctx.translate(panX, panY);
        ctx.scale(zoom, zoom);
      }

      function drawGrid(screenWidth, screenHeight) {
        if (!boardState.settings.showGrid) return;

        const { gridSize } = boardState.settings;
        const { zoom, panX, panY } = boardState.camera;
        const styles = getComputedStyle(document.documentElement);
        ctx.save();
        ctx.strokeStyle = styles.getPropertyValue("--line").trim();
        ctx.lineWidth = 1;

        const step = gridSize * zoom;
        const startX = ((panX % step) + step) % step;
        const startY = ((panY % step) + step) % step;

        for (let x = startX; x < screenWidth; x += step) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, screenHeight);
          ctx.stroke();
        }

        for (let y = startY; y < screenHeight; y += step) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(screenWidth, y);
          ctx.stroke();
        }

        ctx.restore();
      }

      function drawObjects() {
        const objects = [...boardState.objects]
          .filter((obj) => obj.visible !== false)
          .sort((a, b) => (a.zIndex || 0) - (b.zIndex || 0));

        for (const obj of objects) {
          drawObject(obj);
        }
      }

      function drawObject(obj) {
        switch (obj.type) {
          case OBJECT_TYPES.RECT:
            drawRect(obj);
            break;
          case OBJECT_TYPES.ELLIPSE:
            drawEllipse(obj);
            break;
          case OBJECT_TYPES.DIAMOND:
            drawDiamond(obj);
            break;
          case OBJECT_TYPES.LINE:
            drawLine(obj);
            break;
          case OBJECT_TYPES.ARROW:
            drawArrow(obj);
            break;
          case OBJECT_TYPES.TEXT:
            drawText(obj);
            break;
        }
      }

      function setStrokeAndFill(obj) {
        ctx.globalAlpha = obj.style?.opacity ?? 1;
        ctx.strokeStyle = obj.style?.stroke || "#1f2328";
        ctx.fillStyle = obj.style?.fill || "transparent";
        ctx.lineWidth = obj.style?.strokeWidth || 2;
      }

      function drawRect(obj) {
        setStrokeAndFill(obj);
        const r = obj.radius || 0;

        if (r > 0) {
          roundRectPath(obj.x, obj.y, obj.width, obj.height, r);
          if (obj.style?.fill) ctx.fill();
          ctx.stroke();
        } else {
          if (obj.style?.fill)
            ctx.fillRect(obj.x, obj.y, obj.width, obj.height);
          ctx.strokeRect(obj.x, obj.y, obj.width, obj.height);
        }
      }

      function roundRectPath(x, y, w, h, r) {
        const rr = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + rr, y);
        ctx.arcTo(x + w, y, x + w, y + h, rr);
        ctx.arcTo(x + w, y + h, x, y + h, rr);
        ctx.arcTo(x, y + h, x, y, rr);
        ctx.arcTo(x, y, x + w, y, rr);
        ctx.closePath();
      }

      function drawEllipse(obj) {
        setStrokeAndFill(obj);
        ctx.beginPath();
        ctx.ellipse(
          obj.x + obj.width / 2,
          obj.y + obj.height / 2,
          Math.abs(obj.width / 2),
          Math.abs(obj.height / 2),
          0,
          0,
          Math.PI * 2,
        );
        if (obj.style?.fill) ctx.fill();
        ctx.stroke();
      }

      function drawDiamond(obj) {
        setStrokeAndFill(obj);
        ctx.beginPath();
        ctx.moveTo(obj.x + obj.width / 2, obj.y);
        ctx.lineTo(obj.x + obj.width, obj.y + obj.height / 2);
        ctx.lineTo(obj.x + obj.width / 2, obj.y + obj.height);
        ctx.lineTo(obj.x, obj.y + obj.height / 2);
        ctx.closePath();
        if (obj.style?.fill) ctx.fill();
        ctx.stroke();
      }

      function drawLine(obj) {
        ctx.save();
        ctx.globalAlpha = obj.style?.opacity ?? 1;
        ctx.strokeStyle = obj.style?.stroke || "#1f2328";
        ctx.lineWidth = obj.style?.strokeWidth || 2;
        ctx.beginPath();
        ctx.moveTo(obj.x1, obj.y1);
        ctx.lineTo(obj.x2, obj.y2);
        ctx.stroke();
        ctx.restore();
      }

      function drawArrow(obj) {
        drawLine(obj);
        drawArrowHead(
          obj.x1,
          obj.y1,
          obj.x2,
          obj.y2,
          obj.style?.stroke || "#1f2328",
        );
      }

      function drawArrowHead(x1, y1, x2, y2, color) {
        const angle = Math.atan2(y2 - y1, x2 - x1);
        const size = 12;
        ctx.save();
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(x2, y2);
        ctx.lineTo(
          x2 - size * Math.cos(angle - Math.PI / 6),
          y2 - size * Math.sin(angle - Math.PI / 6),
        );
        ctx.lineTo(
          x2 - size * Math.cos(angle + Math.PI / 6),
          y2 - size * Math.sin(angle + Math.PI / 6),
        );
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function drawText(obj) {
        ctx.save();
        ctx.globalAlpha = obj.style?.opacity ?? 1;
        ctx.fillStyle = obj.style?.color || "#1f2328";
        ctx.font = `${obj.style?.fontWeight || 600} ${obj.style?.fontSize || 18}px ${
          obj.style?.fontFamily || "Inter, sans-serif"
        }`;
        ctx.textBaseline = "top";
        ctx.fillText(obj.text || "", obj.x, obj.y);
        ctx.restore();
      }

      function drawSelectionOverlay() {
        const bounds = getSelectionBounds();
        if (!bounds) return;

        ctx.save();
        ctx.strokeStyle = getComputedStyle(document.documentElement)
          .getPropertyValue("--accent-2")
          .trim();
        ctx.lineWidth = 1.5;
        ctx.setLineDash([6, 4]);
        ctx.strokeRect(
          bounds.x - 6,
          bounds.y - 6,
          bounds.width + 12,
          bounds.height + 12,
        );
        ctx.restore();
      }

      function drawMarquee() {
        const m = boardState.selection.marquee;
        if (!m.active) return;

        ctx.save();
        ctx.strokeStyle = getComputedStyle(document.documentElement)
          .getPropertyValue("--accent-2")
          .trim();
        ctx.lineWidth = 1;
        ctx.setLineDash([6, 4]);
        ctx.strokeRect(m.x, m.y, m.width, m.height);
        ctx.restore();
      }

      function updateStatusText() {
        statusText.textContent = `${boardState.objects.length} objects · ${boardState.groups.length} groups · ${boardState.selection.selectedIds.length} selected`;
      }

      /******************************************************************
       * 10. POINTER / TOOL INTERACTION SKELETON
       ******************************************************************/
      const interaction = {
        pointerDown: false,
        dragMode: null, // create | marquee | move
        startWorld: null,
        startScreen: null,
        activeDraftObject: null,
        moveSnapshot: null,
      };

      function getPointerScreenPosition(event) {
        const r = canvas.getBoundingClientRect();
        return {
          x: event.clientX - r.left,
          y: event.clientY - r.top,
        };
      }

      canvas.addEventListener("pointerdown", (event) => {
        canvas.setPointerCapture(event.pointerId);

        const screen = getPointerScreenPosition(event);
        const world = screenToWorld(screen.x, screen.y);
        const tool = boardState.toolState.activeTool;
        const hit = hitTest(world.x, world.y);

        interaction.pointerDown = true;
        interaction.startScreen = screen;
        interaction.startWorld = world;
        interaction.activeDraftObject = null;
        interaction.moveSnapshot = null;

        if (tool === TOOLS.SELECT) {
          handleSelectPointerDown(event, hit, world);
          requestRender();
          return;
        }

        handleCreatePointerDown(tool, world);
        requestRender();
      });

      canvas.addEventListener("pointermove", (event) => {
        if (!interaction.pointerDown) return;

        const screen = getPointerScreenPosition(event);
        const world = screenToWorld(screen.x, screen.y);

        if (interaction.dragMode === "create") {
          updateDraftObject(world);
        } else if (interaction.dragMode === "marquee") {
          updateMarquee(interaction.startWorld, world);
        } else if (interaction.dragMode === "move") {
          updateSelectionMove(world);
        }

        requestRender();
      });

      canvas.addEventListener("pointerup", () => {
        if (!interaction.pointerDown) return;

        if (
          interaction.dragMode === "create" &&
          interaction.activeDraftObject
        ) {
          finalizeDraftObject();
        } else if (interaction.dragMode === "marquee") {
          finalizeMarqueeSelection();
        } else if (interaction.dragMode === "move") {
          finalizeMove();
        }

        interaction.pointerDown = false;
        interaction.dragMode = null;
        interaction.activeDraftObject = null;
        interaction.moveSnapshot = null;
        requestRender();
      });

      function handleSelectPointerDown(event, hit, world) {
        if (hit) {
          const targetSelectableId = getTopSelectableId(hit.id);
          if (event.shiftKey) {
            const ids = new Set(boardState.selection.selectedIds);
            ids.add(targetSelectableId);
            boardState.selection.selectedIds = [...ids];
          } else {
            boardState.selection.selectedIds = [targetSelectableId];
          }

          interaction.dragMode = "move";
          interaction.moveSnapshot = getSelectionObjects().map((obj) =>
            deepClone(obj),
          );
        } else {
          if (!event.shiftKey) boardState.selection.selectedIds = [];
          interaction.dragMode = "marquee";
          boardState.selection.marquee = {
            active: true,
            x: world.x,
            y: world.y,
            width: 0,
            height: 0,
          };
        }
      }

      function handleCreatePointerDown(tool, world) {
        interaction.dragMode = "create";

        switch (tool) {
          case TOOLS.RECT:
            interaction.activeDraftObject = createRect(world.x, world.y, 0, 0);
            break;
          case TOOLS.ELLIPSE:
            interaction.activeDraftObject = createEllipse(
              world.x,
              world.y,
              0,
              0,
            );
            break;
          case TOOLS.DIAMOND:
            interaction.activeDraftObject = createDiamond(
              world.x,
              world.y,
              0,
              0,
            );
            break;
          case TOOLS.LINE:
            interaction.activeDraftObject = createLine(
              world.x,
              world.y,
              world.x,
              world.y,
            );
            break;
          case TOOLS.ARROW:
            interaction.activeDraftObject = createArrow(
              world.x,
              world.y,
              world.x,
              world.y,
            );
            break;
          case TOOLS.TEXT: {
            const text = prompt("Enter text");
            if (text) {
              executeCommand({
                type: COMMANDS.ADD_OBJECTS,
                payload: { objects: [createText(world.x, world.y, text)] },
              });
            }
            interaction.dragMode = null;
            break;
          }
        }
      }

      function updateDraftObject(world) {
        const obj = interaction.activeDraftObject;
        if (!obj) return;

        if (obj.type === OBJECT_TYPES.LINE || obj.type === OBJECT_TYPES.ARROW) {
          obj.x2 = world.x;
          obj.y2 = world.y;
          return;
        }

        const rect = normalizeRect(
          interaction.startWorld.x,
          interaction.startWorld.y,
          world.x,
          world.y,
        );
        obj.x = rect.x;
        obj.y = rect.y;
        obj.width = rect.width;
        obj.height = rect.height;
      }

      function finalizeDraftObject() {
        const obj = interaction.activeDraftObject;
        if (!obj) return;

        const bounds = getObjectBounds(obj);
        const valid =
          obj.type === OBJECT_TYPES.LINE || obj.type === OBJECT_TYPES.ARROW
            ? Math.hypot(obj.x2 - obj.x1, obj.y2 - obj.y1) > 2
            : bounds.width > 4 && bounds.height > 4;

        if (!valid) return;

        executeCommand({
          type: COMMANDS.ADD_OBJECTS,
          payload: { objects: [obj] },
        });
      }

      function updateMarquee(startWorld, currentWorld) {
        const rect = normalizeRect(
          startWorld.x,
          startWorld.y,
          currentWorld.x,
          currentWorld.y,
        );
        boardState.selection.marquee = {
          active: true,
          ...rect,
        };
      }

      function finalizeMarqueeSelection() {
        const marquee = boardState.selection.marquee;
        const selectedIds = [];

        for (const obj of boardState.objects) {
          const bounds = getObjectBounds(obj);
          if (bounds && marqueeIntersect(marquee, bounds)) {
            selectedIds.push(getTopSelectableId(obj.id));
          }
        }

        boardState.selection.selectedIds = [...new Set(selectedIds)];
        boardState.selection.marquee.active = false;
      }

      function updateSelectionMove(world) {
        if (!interaction.moveSnapshot) return;

        const dx = world.x - interaction.startWorld.x;
        const dy = world.y - interaction.startWorld.y;

        const snapshotMap = new Map(
          interaction.moveSnapshot.map((obj) => [obj.id, obj]),
        );

        for (const obj of getSelectionObjects()) {
          const original = snapshotMap.get(obj.id);
          if (!original) continue;

          if (
            obj.type === OBJECT_TYPES.LINE ||
            obj.type === OBJECT_TYPES.ARROW
          ) {
            obj.x1 = original.x1 + dx;
            obj.y1 = original.y1 + dy;
            obj.x2 = original.x2 + dx;
            obj.y2 = original.y2 + dy;
          } else {
            obj.x = original.x + dx;
            obj.y = original.y + dy;
          }
        }
      }

      function finalizeMove() {
        if (!interaction.moveSnapshot) return;

        const before = interaction.moveSnapshot;
        const after = getSelectionObjects().map((obj) => deepClone(obj));

        executeCommand({
          type: COMMANDS.UPDATE_OBJECTS,
          payload: { before, after },
        });
      }

      /******************************************************************
       * 11. TOOLBAR / UI ACTIONS
       ******************************************************************/
      document.querySelectorAll("[data-tool]").forEach((button) => {
        button.addEventListener("click", () => {
          document
            .querySelectorAll("[data-tool]")
            .forEach((b) => b.classList.remove("active"));
          button.classList.add("active");
          boardState.toolState.activeTool = button.dataset.tool;
        });
      });

      document.getElementById("groupBtn").addEventListener("click", () => {
        const childIds = getSelectionObjects().map((obj) => obj.id);
        if (childIds.length < 2) return;

        const group = createGroup(childIds);
        executeCommand({
          type: COMMANDS.GROUP_OBJECTS,
          payload: { group },
        });
      });

      document.getElementById("ungroupBtn").addEventListener("click", () => {
        const selectedGroupId = boardState.selection.selectedIds.find((id) =>
          getGroupById(id),
        );
        if (!selectedGroupId) return;

        executeCommand({
          type: COMMANDS.UNGROUP_OBJECTS,
          payload: {
            groupId: selectedGroupId,
            groupBackup: deepClone(getGroupById(selectedGroupId)),
          },
        });
      });

      document.getElementById("undoBtn").addEventListener("click", undo);
      document.getElementById("redoBtn").addEventListener("click", redo);

      document.getElementById("selectAllBtn").addEventListener("click", () => {
        boardState.selection.selectedIds = boardState.objects.map(
          (obj) => obj.groupId || obj.id,
        );
        boardState.selection.selectedIds = [
          ...new Set(boardState.selection.selectedIds),
        ];
        requestRender();
      });

      document.getElementById("newBtn").addEventListener("click", () => {
        const previousState = deepClone(boardState);
        executeCommand({
          type: COMMANDS.CLEAR_BOARD,
          payload: { previousState },
        });
      });

      document.getElementById("saveBtn").addEventListener("click", () => {
        const blob = new Blob([JSON.stringify(boardState, null, 2)], {
          type: "application/json",
        });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "pp-whiteboard.json";
        a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 1000);
      });

      document.getElementById("loadBtn").addEventListener("click", () => {
        document.getElementById("fileInput").click();
      });

      document
        .getElementById("fileInput")
        .addEventListener("change", (event) => {
          const file = event.target.files?.[0];
          if (!file) return;

          const reader = new FileReader();
          reader.onload = () => {
            try {
              const previousState = deepClone(boardState);
              const parsed = JSON.parse(String(reader.result));
              executeCommand({
                type: COMMANDS.LOAD_BOARD,
                payload: {
                  state: parsed,
                  previousState,
                },
              });
            } catch (error) {
              alert("Invalid JSON file.");
              console.error(error);
            }
          };
          reader.readAsText(file);
          event.target.value = "";
        });

      document.getElementById("pngBtn").addEventListener("click", () => {
        const link = document.createElement("a");
        link.download = "pp-whiteboard.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      });

      document.getElementById("themeBtn").addEventListener("click", () => {
        const root = document.documentElement;
        const next =
          root.getAttribute("data-theme") === "dark" ? "light" : "dark";
        root.setAttribute("data-theme", next);
        boardState.settings.theme = next;
        localStorage.setItem("pp-theme", next);
        requestRender();
      });

      /******************************************************************
       * 12. KEYBOARD SHORTCUT SKELETON
       ******************************************************************/
      document.addEventListener("keydown", (event) => {
        const mod = event.ctrlKey || event.metaKey;

        if (mod && event.key.toLowerCase() === "z") {
          event.preventDefault();
          undo();
        }

        if (mod && event.key.toLowerCase() === "y") {
          event.preventDefault();
          redo();
        }

        if (mod && event.key.toLowerCase() === "a") {
          event.preventDefault();
          boardState.selection.selectedIds = boardState.objects.map(
            (obj) => obj.groupId || obj.id,
          );
          boardState.selection.selectedIds = [
            ...new Set(boardState.selection.selectedIds),
          ];
          requestRender();
        }

        if (event.key === "Delete" || event.key === "Backspace") {
          if (!boardState.selection.selectedIds.length) return;

          const ids = getSelectionObjects().map((obj) => obj.id);
          const deletedObjects = ids
            .map(getObjectById)
            .filter(Boolean)
            .map(deepClone);

          executeCommand({
            type: COMMANDS.DELETE_OBJECTS,
            payload: {
              ids,
              objectsBackup: deletedObjects,
            },
          });
        }
      });

      /******************************************************************
       * 13. INITIALIZATION
       ******************************************************************/
      function boot() {
        const savedTheme = localStorage.getItem("pp-theme");
        if (savedTheme) {
          document.documentElement.setAttribute("data-theme", savedTheme);
          boardState.settings.theme = savedTheme;
        }

        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        // Demo objects for initial engine testing
        executeCommand(
          {
            type: COMMANDS.ADD_OBJECTS,
            payload: {
              objects: [
                createRect(120, 120, 180, 90),
                createText(160, 155, "Start here"),
                createEllipse(420, 120, 160, 90),
                createArrow(300, 165, 420, 165),
              ],
            },
          },
          { record: false },
        );

        requestRender();
      }

      boot();
    </script>
  </body>
</html>
