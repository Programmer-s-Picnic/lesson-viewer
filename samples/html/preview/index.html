<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#d97706" />
  <title>Programmer's Picnic — Simple HTML Editor</title>
  <style>
    :root{
      --bg:#fff7ed;--card:#fff;--ink:#241407;--muted:#7c5b35;--line:#f2d6ad;
      --top:#fffaf0;--primary:#d97706;--primary2:#f59e0b;--shadow:0 18px 45px rgba(146,64,14,.14);
      --radius:18px;--mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
      --sans:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    }
    *{box-sizing:border-box} html,body{height:100%;margin:0} body{font-family:var(--sans);background:radial-gradient(circle at top left,rgba(245,158,11,.24),transparent 34rem),var(--bg);color:var(--ink);overflow:hidden}
    .app{height:100vh;display:flex;flex-direction:column;gap:12px;padding:14px}
    .topbar{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:12px}
    .brand{flex:1;min-width:220px}.brand h1{font-size:18px;line-height:1.15;margin:0}.brand p{margin:4px 0 0;color:var(--muted);font-size:12px;font-weight:800}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    button{border:1px solid rgba(217,119,6,.32);background:#fff3d8;color:#5c2d05;border-radius:999px;padding:9px 14px;font-weight:900;cursor:pointer;transition:.16s ease;white-space:nowrap}
    button:hover{transform:translateY(-1px);background:#ffe7b8;border-color:rgba(217,119,6,.58)} button.primary{background:linear-gradient(135deg,var(--primary),var(--primary2));border-color:transparent;color:#fff;box-shadow:0 10px 22px rgba(217,119,6,.24)}
    .workarea{flex:1;min-height:0;display:grid;grid-template-columns:1fr 1fr;gap:12px}.pane{min-height:0;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column}
    .pane-title{height:39px;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 12px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fffaf0,#fff4dc);font-size:13px;font-weight:950;color:#7c3f00}.status{font-size:12px;color:var(--muted);font-weight:850}
    .editor-shell{position:relative;flex:1;min-height:0;background:#fff}.highlight,.code-input{position:absolute;inset:0;margin:0;border:0;padding:14px;font:14px/1.55 var(--mono);tab-size:2;white-space:pre-wrap;word-break:break-word;overflow:auto}.highlight{pointer-events:none;color:#1f2937;background:#fff}.code-input{resize:none;outline:none;background:transparent;color:transparent;caret-color:#111827;spellcheck:false;z-index:2}.code-input::selection{background:rgba(217,119,6,.25);color:transparent}.tag{color:#b45309;font-weight:800}.attr{color:#2563eb}.value{color:#047857}.comment{color:#6b7280;font-style:italic}.doctype{color:#7c3aed;font-weight:800}.text{color:#1f2937}.script,.style{color:#be123c}
    iframe{flex:1;width:100%;border:0;background:white}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(18px);background:#241407;color:white;padding:10px 14px;border-radius:999px;box-shadow:0 14px 36px rgba(0,0,0,.24);opacity:0;pointer-events:none;transition:.22s ease;font-size:13px;font-weight:850;z-index:50}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .app:fullscreen{background:var(--bg);padding:14px}.app:fullscreen .workarea{height:100%}
    @media(max-width:900px){body{overflow:auto}.app{height:auto;min-height:100vh}.topbar{align-items:flex-start;flex-direction:column}.actions{justify-content:flex-start}.workarea{grid-template-columns:1fr}.pane{min-height:48vh}}
  </style>
</head>
<body>
  <main class="app" id="app">
    <header class="topbar">
      <div class="brand">
        <h1>Programmer's Picnic — Simple HTML Editor</h1>
        <p>Code coloring, auto preview, sharing, and fullscreen.</p>
      </div>
      <div class="actions">
        <button class="primary" id="runBtn" type="button">Run</button>
        <button id="shareBtn" type="button">Share</button>
        <button id="fullBtn" type="button">Fullscreen</button>
        <button id="resetBtn" type="button">Reset</button>
      </div>
    </header>

    <section class="workarea">
      <section class="pane">
        <div class="pane-title"><span>HTML CODE</span><span class="status" id="saveStatus">Auto preview on</span></div>
        <div class="editor-shell">
          <pre class="highlight" id="highlight" aria-hidden="true"></pre>
          <textarea class="code-input" id="editor" spellcheck="false" autocomplete="off" autocapitalize="off" autocorrect="off"></textarea>
        </div>
      </section>
      <section class="pane">
        <div class="pane-title"><span>LIVE PREVIEW</span><span class="status" id="previewStatus">Ready</span></div>
        <iframe id="preview" sandbox="allow-scripts allow-forms allow-modals allow-popups"></iframe>
      </section>
    </section>
  </main>
  <div class="toast" id="toast">Done</div>

  <script>
    const STORAGE_KEY = "pp_simple_html_editor_v2";
    const starterCode = `<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Page</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #fff7ed;
      color: #241407;
      padding: 30px;
    }
    .card {
      max-width: 760px;
      margin: auto;
      background: white;
      border: 1px solid #f2d6ad;
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 18px 45px rgba(146, 64, 14, 0.14);
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      background: #d97706;
      color: white;
      font-weight: 900;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello, Programmer's Picnic</h1>
    <p>Edit the HTML, CSS, and JavaScript. The preview updates automatically.</p>
    <button onclick="alert('Great!')">Click me</button>
  </div>
</body>
</html>`;

    const app = document.getElementById("app");
    const editor = document.getElementById("editor");
    const highlight = document.getElementById("highlight");
    const preview = document.getElementById("preview");
    const runBtn = document.getElementById("runBtn");
    const shareBtn = document.getElementById("shareBtn");
    const fullBtn = document.getElementById("fullBtn");
    const resetBtn = document.getElementById("resetBtn");
    const previewStatus = document.getElementById("previewStatus");
    const saveStatus = document.getElementById("saveStatus");
    const toast = document.getElementById("toast");

    function esc(s){return String(s).replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]));}
    function colorCode(code){
      let safe = esc(code);
      safe = safe.replace(/(&lt;!doctype[^&]*?&gt;)/gi,'<span class="doctype">$1</span>');
      safe = safe.replace(/(&lt;!--[\s\S]*?--&gt;)/g,'<span class="comment">$1</span>');
      safe = safe.replace(/(&lt;\/?(?:script|style)\b[^&]*?&gt;)/gi,'<span class="script">$1</span>');
      safe = safe.replace(/(&lt;\/?[a-zA-Z][\w:-]*)([\s\S]*?)(\/??&gt;)/g,(m,start,attrs,end)=>{
        const a = attrs.replace(/([a-zA-Z_:][-\w:.]*)(=)(&quot;.*?&quot;|&#39;.*?&#39;|[^\s&]+)/g,'<span class="attr">$1</span>$2<span class="value">$3</span>');
        return '<span class="tag">'+start+'</span>'+a+'<span class="tag">'+end+'</span>';
      });
      return safe + (code.endsWith("\n") ? "\n" : "");
    }
    function refreshHighlight(){highlight.innerHTML = colorCode(editor.value);}
    function syncScroll(){highlight.scrollTop = editor.scrollTop; highlight.scrollLeft = editor.scrollLeft;}
    function showToast(msg){toast.textContent=msg;toast.classList.add("show");clearTimeout(showToast.t);showToast.t=setTimeout(()=>toast.classList.remove("show"),1400);}
    function runPreview(){preview.srcdoc = editor.value; localStorage.setItem(STORAGE_KEY, editor.value); previewStatus.textContent="Updated"; saveStatus.textContent="Saved locally"; refreshHighlight();}
    function encodeShare(text){const bytes=new TextEncoder().encode(text);let bin="";bytes.forEach(b=>bin+=String.fromCharCode(b));return btoa(bin).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");}
    function decodeShare(text){text=text.replace(/-/g,"+").replace(/_/g,"/");while(text.length%4)text+="=";const bin=atob(text);const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));return new TextDecoder().decode(bytes);}
    async function shareCode(){const url=location.origin+location.pathname+"#code="+encodeShare(editor.value);try{await navigator.clipboard.writeText(url);showToast("Share link copied");}catch(e){prompt("Copy this share link:",url);}}
    async function toggleFullscreen(){try{if(!document.fullscreenElement){await app.requestFullscreen();}else{await document.exitFullscreen();}}catch(e){showToast("Fullscreen blocked by browser");}}

    let timer=null;
    editor.addEventListener("input",()=>{refreshHighlight();previewStatus.textContent="Typing...";saveStatus.textContent="Auto preview on";clearTimeout(timer);timer=setTimeout(runPreview,300);});
    editor.addEventListener("scroll",syncScroll);
    editor.addEventListener("keydown",e=>{
      if(e.key==="Tab"){e.preventDefault();const s=editor.selectionStart,en=editor.selectionEnd;editor.value=editor.value.slice(0,s)+"  "+editor.value.slice(en);editor.selectionStart=editor.selectionEnd=s+2;refreshHighlight();clearTimeout(timer);timer=setTimeout(runPreview,300);} 
      const mod = navigator.platform.toLowerCase().includes("mac") ? e.metaKey : e.ctrlKey;
      if(mod && e.key==="Enter"){e.preventDefault();runPreview();showToast("Preview updated");}
    });
    runBtn.addEventListener("click",()=>{runPreview();showToast("Preview updated");});
    shareBtn.addEventListener("click",shareCode);
    fullBtn.addEventListener("click",toggleFullscreen);
    resetBtn.addEventListener("click",()=>{if(!confirm("Reset the editor to the starter code?"))return;editor.value=starterCode;runPreview();showToast("Starter restored");});
    document.addEventListener("fullscreenchange",()=>{fullBtn.textContent=document.fullscreenElement?"Exit Fullscreen":"Fullscreen";});

    function init(){
      try{const m=location.hash.match(/code=([^&]+)/);if(m&&m[1]){editor.value=decodeShare(m[1]);runPreview();showToast("Shared code loaded");return;}}catch(e){}
      editor.value=localStorage.getItem(STORAGE_KEY)||starterCode;runPreview();
    }
    init();
  </script>
</body>
</html>
