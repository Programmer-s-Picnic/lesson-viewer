<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Virtual Classroom Board</title>
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8321261883090494"
      crossorigin="anonymous"
    ></script>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #111;
      }

      .topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        padding: 10px;
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(8px);
      }

      button {
        padding: 8px 12px;
        border-radius: 10px;
        border: 1px solid rgba(0, 0, 0, 0.2);
        background: #fff;
        font-weight: 600;
        cursor: pointer;
      }

      button.primary {
        border: none;
        background: linear-gradient(145deg, #ffb020, #ff7a18);
      }

      button.active {
        outline: 2px solid orange;
      }

      input[type="range"] {
        width: 100px;
      }

      .stage {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      .bg {
        position: absolute;
        inset: 0;
        background: url("classroom.jpg") center/cover no-repeat;
      }

      .boardBox {
        position: absolute;
        left: 5%;
        top: 5%;
        width: 90%;
        height: 90%;
        border-radius: 8px;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 8px;
      }

      .calibOutline {
        position: absolute;
        inset: -2px;
        border: 2px dashed orange;
        display: none;
      }

      .handle {
        position: absolute;
        width: 16px;
        height: 16px;
        background: orange;
        border-radius: 50%;
        display: none;
      }

      .h-se {
        right: -8px;
        bottom: -8px;
        cursor: nwse-resize;
      }

      .textPanel {
        position: fixed;
        right: 14px;
        top: 78px;
        width: 320px;
        z-index: 120;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 16px;
        padding: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
        border: 1px solid rgba(0, 0, 0, 0.08);
      }

      .textPanel h3 {
        margin: 0 0 10px;
        font-size: 15px;
      }

      .textPanel textarea {
        width: 100%;
        min-height: 130px;
        resize: vertical;
        border-radius: 12px;
        border: 1px solid rgba(0, 0, 0, 0.15);
        padding: 10px 12px;
        font:
          14px/1.5 system-ui,
          sans-serif;
        outline: none;
      }

      .textGrid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 10px;
      }

      .textPanel label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        margin-bottom: 4px;
        color: #333;
      }

      .textPanel input[type="number"],
      .textPanel select {
        width: 100%;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid rgba(0, 0, 0, 0.15);
        background: #fff;
      }

      .textActions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
        flex-wrap: wrap;
      }

      .hint {
        margin-top: 8px;
        font-size: 12px;
        color: #555;
      }

      @media (max-width: 900px) {
        .textPanel {
          left: 10px;
          right: 10px;
          width: auto;
          top: auto;
          bottom: 10px;
          max-height: 42vh;
          overflow: auto;
        }
      }
      /* Hide text panel in fullscreen */
      :fullscreen .textPanel {
        display: none;
      }

      /* Safari support */
      :-webkit-full-screen .textPanel {
        display: none;
      }

      /* Older Firefox support */
      :-moz-full-screen .textPanel {
        display: none;
      }
    </style>
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Patrick+Hand&family=Kalam:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="topbar">
      <button id="penBtn" class="primary active">Pen</button>
      <button id="eraserBtn">Eraser</button>
      <button id="moveTextBtn">Move Text</button>

      <input type="color" id="color" value="#111827" />
      <input type="range" id="size" min="2" max="30" value="6" />
      <span id="sizeVal">6</span>

      <button id="clearBtn">Clear</button>
      <button id="saveBtn">Save PNG</button>
      <button id="calibBtn">Calibrate</button>
      <button id="fullscreenBtn">Fullscreen</button>
    </div>

    <div class="textPanel">
      <h3>Write text on board</h3>
      <textarea
        id="boardText"
        placeholder="Type here...
Each line will be drawn separately on the board."
      ></textarea>

      <div class="textGrid">
        <div>
          <label for="textFont">Handwriting font</label>
          <select id="textFont">
            <option value="'Caveat', cursive">Caveat</option>
            <option value="'Patrick Hand', cursive">Patrick Hand</option>
            <option value="'Kalam', cursive">Kalam</option>
          </select>
        </div>

        <div>
          <label for="textSize">Text size</label>
          <input type="number" id="textSize" value="36" min="12" max="120" />
        </div>

        <div>
          <label for="textX">Start X</label>
          <input type="number" id="textX" value="40" min="0" />
        </div>

        <div>
          <label for="textY">Start Y</label>
          <input type="number" id="textY" value="70" min="0" />
        </div>

        <div>
          <label for="lineGap">Line gap</label>
          <input type="number" id="lineGap" value="12" min="0" max="80" />
        </div>

        <div>
          <label for="textColor">Text color</label>
          <input type="color" id="textColor" value="#111827" />
        </div>
      </div>

      <div class="textActions">
        <button id="writeTextBtn" class="primary">Write on Board</button>
        <button id="clearTextBtn">Clear Text Box</button>
      </div>

      <div class="hint">
        In <b>Move Text</b> mode, drag a text block up/down with the mouse or
        use the mouse wheel to nudge the selected block vertically.
      </div>
    </div>

    <div class="stage">
      <div class="bg"></div>

      <div class="boardBox" id="boardBox">
        <div class="calibOutline" id="outline"></div>
        <div class="handle h-se" id="resizeHandle"></div>
        <canvas id="board"></canvas>
      </div>
    </div>

    <script>
      const canvas = document.getElementById("board");
      const ctx = canvas.getContext("2d");
      const boardBox = document.getElementById("boardBox");

      const penBtn = document.getElementById("penBtn");
      const eraserBtn = document.getElementById("eraserBtn");
      const moveTextBtn = document.getElementById("moveTextBtn");
      const colorEl = document.getElementById("color");
      const sizeEl = document.getElementById("size");
      const sizeVal = document.getElementById("sizeVal");
      const clearBtn = document.getElementById("clearBtn");
      const saveBtn = document.getElementById("saveBtn");
      const calibBtn = document.getElementById("calibBtn");
      const fullscreenBtn = document.getElementById("fullscreenBtn");

      const outline = document.getElementById("outline");
      const resizeHandle = document.getElementById("resizeHandle");

      const boardText = document.getElementById("boardText");
      const textFont = document.getElementById("textFont");
      const textSize = document.getElementById("textSize");
      const textX = document.getElementById("textX");
      const textY = document.getElementById("textY");
      const lineGap = document.getElementById("lineGap");
      const textColor = document.getElementById("textColor");
      const writeTextBtn = document.getElementById("writeTextBtn");
      const clearTextBtn = document.getElementById("clearTextBtn");

      let tool = "pen";
      let drawing = false;
      let last = null;
      let calibrate = false;

      let drawLayer = document.createElement("canvas");
      let drawCtx = drawLayer.getContext("2d");

      let textBlocks = [];
      let selectedTextId = null;
      let draggingText = false;
      let dragOffsetY = 0;

      function resizeCanvas() {
        const rect = boardBox.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;

        const oldDrawLayer = document.createElement("canvas");
        oldDrawLayer.width = drawLayer.width;
        oldDrawLayer.height = drawLayer.height;
        oldDrawLayer.getContext("2d").drawImage(drawLayer, 0, 0);

        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        drawLayer.width = rect.width * dpr;
        drawLayer.height = rect.height * dpr;
        drawCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

        if (oldDrawLayer.width && oldDrawLayer.height) {
          drawCtx.drawImage(
            oldDrawLayer,
            0,
            0,
            oldDrawLayer.width,
            oldDrawLayer.height,
            0,
            0,
            rect.width,
            rect.height,
          );
        }

        renderScene();
      }

      new ResizeObserver(resizeCanvas).observe(boardBox);
      window.addEventListener("load", resizeCanvas);

      function getPos(e) {
        const r = canvas.getBoundingClientRect();
        return {
          x: e.clientX - r.left,
          y: e.clientY - r.top,
        };
      }

      function stroke(a, b) {
        drawCtx.lineWidth = Number(sizeEl.value);
        drawCtx.lineCap = "round";
        drawCtx.lineJoin = "round";

        if (tool === "eraser") {
          drawCtx.globalCompositeOperation = "destination-out";
          drawCtx.strokeStyle = "rgba(0,0,0,1)";
        } else {
          drawCtx.globalCompositeOperation = "source-over";
          drawCtx.strokeStyle = colorEl.value;
        }

        drawCtx.beginPath();
        drawCtx.moveTo(a.x, a.y);
        drawCtx.lineTo(b.x, b.y);
        drawCtx.stroke();
      }

      function addTextBlock() {
        const raw = boardText.value;
        if (!raw.trim()) return;

        const lines = raw.replace(/\r\n/g, "\n").split("\n");
        const startX = Number(textX.value) || 0;
        const startY = Number(textY.value) || 0;
        const fontSize = Math.max(12, Number(textSize.value) || 36);
        const extraGap = Math.max(0, Number(lineGap.value) || 0);

        const block = {
          id: crypto.randomUUID
            ? crypto.randomUUID()
            : String(Date.now() + Math.random()),
          lines,
          x: startX,
          y: startY,
          fontSize,
          fontFamily: textFont.value,
          color: textColor.value,
          lineGap: extraGap,
        };

        textBlocks.push(block);
        selectedTextId = block.id;
        renderScene();
      }

      function drawTextBlock(block, isSelected = false) {
        const stepY = block.fontSize + block.lineGap;

        ctx.save();
        ctx.globalCompositeOperation = "source-over";
        ctx.fillStyle = block.color;
        ctx.textAlign = "left";
        ctx.textBaseline = "alphabetic";
        ctx.font = `${block.fontSize}px ${block.fontFamily}`;

        let maxWidth = 0;
        block.lines.forEach((line) => {
          maxWidth = Math.max(maxWidth, ctx.measureText(line).width);
        });

        block.lines.forEach((line, index) => {
          const y = block.y + index * stepY;
          ctx.fillText(line, block.x, y);
        });

        if (isSelected) {
          const top = block.y - block.fontSize;
          const height = block.lines.length * stepY;
          ctx.strokeStyle = "rgba(255,140,0,0.95)";
          ctx.lineWidth = 2;
          ctx.setLineDash([6, 4]);
          ctx.strokeRect(block.x - 8, top - 8, maxWidth + 16, height + 16);
        }

        ctx.restore();
      }

      function getTextBlockBounds(block) {
        ctx.save();
        ctx.font = `${block.fontSize}px ${block.fontFamily}`;
        let maxWidth = 0;
        block.lines.forEach((line) => {
          maxWidth = Math.max(maxWidth, ctx.measureText(line).width);
        });
        ctx.restore();

        const stepY = block.fontSize + block.lineGap;
        return {
          x: block.x - 8,
          y: block.y - block.fontSize - 8,
          w: maxWidth + 16,
          h: block.lines.length * stepY + 16,
        };
      }

      function hitTestTextBlock(pos) {
        for (let i = textBlocks.length - 1; i >= 0; i--) {
          const block = textBlocks[i];
          const b = getTextBlockBounds(block);
          if (
            pos.x >= b.x &&
            pos.x <= b.x + b.w &&
            pos.y >= b.y &&
            pos.y <= b.y + b.h
          ) {
            return block;
          }
        }
        return null;
      }

      function renderScene() {
        const rect = boardBox.getBoundingClientRect();
        ctx.clearRect(0, 0, rect.width, rect.height);
        ctx.drawImage(drawLayer, 0, 0, rect.width, rect.height);

        for (const block of textBlocks) {
          drawTextBlock(block, block.id === selectedTextId);
        }
      }

      canvas.addEventListener("pointerdown", (e) => {
        if (calibrate) return;

        const pos = getPos(e);

        if (tool === "moveText") {
          const hit = hitTestTextBlock(pos);
          if (hit) {
            selectedTextId = hit.id;
            draggingText = true;
            dragOffsetY = pos.y - hit.y;
          } else {
            selectedTextId = null;
          }
          renderScene();
          return;
        }

        drawing = true;
        last = pos;
      });

      canvas.addEventListener("pointermove", (e) => {
        const p = getPos(e);

        if (tool === "moveText" && draggingText) {
          const block = textBlocks.find((t) => t.id === selectedTextId);
          if (block) {
            block.y = p.y - dragOffsetY;
            renderScene();
          }
          return;
        }

        if (!drawing || calibrate) return;
        stroke(last, p);
        last = p;
        renderScene();
      });

      canvas.addEventListener(
        "wheel",
        (e) => {
          if (tool !== "moveText" || !selectedTextId) return;

          e.preventDefault();
          const block = textBlocks.find((t) => t.id === selectedTextId);
          if (!block) return;

          block.y += e.deltaY > 0 ? 8 : -8;
          renderScene();
        },
        { passive: false },
      );

      window.addEventListener("pointerup", () => {
        drawing = false;
        draggingText = false;
      });

      function setActiveTool(nextTool) {
        tool = nextTool;

        penBtn.classList.toggle("active", nextTool === "pen");
        eraserBtn.classList.toggle("active", nextTool === "eraser");
        moveTextBtn.classList.toggle("active", nextTool === "moveText");

        canvas.style.cursor =
          nextTool === "moveText"
            ? "grab"
            : nextTool === "eraser"
              ? "cell"
              : "crosshair";
      }

      penBtn.onclick = () => setActiveTool("pen");
      eraserBtn.onclick = () => setActiveTool("eraser");
      moveTextBtn.onclick = () => setActiveTool("moveText");

      sizeEl.oninput = () => {
        sizeVal.textContent = sizeEl.value;
      };

      clearBtn.onclick = () => {
        drawCtx.clearRect(0, 0, drawLayer.width, drawLayer.height);
        textBlocks = [];
        selectedTextId = null;
        renderScene();
      };

      calibBtn.onclick = () => {
        calibrate = !calibrate;
        outline.style.display = calibrate ? "block" : "none";
        resizeHandle.style.display = calibrate ? "block" : "none";
      };

      let resizing = false;

      resizeHandle.addEventListener("pointerdown", () => {
        resizing = true;
      });

      window.addEventListener("pointermove", (e) => {
        if (!resizing) return;
        const rect = boardBox.getBoundingClientRect();
        boardBox.style.width = e.clientX - rect.left + "px";
        boardBox.style.height = e.clientY - rect.top + "px";
      });

      window.addEventListener("pointerup", () => {
        resizing = false;
      });

      saveBtn.onclick = () => {
        const stage = document.querySelector(".stage");
        const stageRect = stage.getBoundingClientRect();

        const output = document.createElement("canvas");
        const dpr = window.devicePixelRatio || 1;
        output.width = stageRect.width * dpr;
        output.height = stageRect.height * dpr;

        const octx = output.getContext("2d");
        octx.scale(dpr, dpr);

        const img = new Image();
        img.onload = function () {
          octx.drawImage(img, 0, 0, stageRect.width, stageRect.height);

          const boardRect = boardBox.getBoundingClientRect();
          const x = boardRect.left - stageRect.left;
          const y = boardRect.top - stageRect.top;

          octx.drawImage(canvas, x, y, boardRect.width, boardRect.height);

          const link = document.createElement("a");
          link.download = "full-classroom-board.png";
          link.href = output.toDataURL("image/png");
          link.click();
        };
        img.src = "classroom.jpg";
      };

      fullscreenBtn.onclick = () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen();
          fullscreenBtn.textContent = "Exit Fullscreen";
        } else {
          document.exitFullscreen();
          fullscreenBtn.textContent = "Fullscreen";
        }
      };

      document.addEventListener("fullscreenchange", () => {
        fullscreenBtn.textContent = document.fullscreenElement
          ? "Exit Fullscreen"
          : "Fullscreen";
      });

      writeTextBtn.onclick = () => {
        addTextBlock();
      };

      clearTextBtn.onclick = () => {
        boardText.value = "";
        boardText.focus();
      };

      setActiveTool("pen");
    </script>
  </body>
</html>
