<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple Whiteboard Chalk - Fixed</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --accent: #ff9f1c;
      --dark-panel: rgba(0, 0, 0, 0.78);
      --light-panel: rgba(255, 255, 255, 0.92);
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      overflow: hidden;
    }

    body {
      color: #fff;
    }

    .stage {
      width: 100vw;
      height: 100vh;
      background-image: url("classroom.jpg");
      background-position: center;
      background-size: contain;
      background-repeat: no-repeat;
      background-color: var(--stage-bg);
      position: relative;
    }

    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
      cursor: crosshair;
    }

    .toolbar {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      max-width: min(1120px, calc(100vw - 20px));
      padding: 10px;
      border-radius: 18px;
      background: var(--dark-panel);
      color: #fff;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toolbar.collapsed {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(-12px) scale(0.98);
    }

    .toolbarBall {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 40;
      width: 54px;
      height: 54px;
      display: none;
      place-items: center;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: #111;
      font-size: 24px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.35);
    }

    .toolbarBall.visible {
      display: grid;
    }

    button,
    input,
    select {
      border: 0;
      border-radius: 10px;
      padding: 8px 11px;
      font-weight: 750;
      cursor: pointer;
    }

    button {
      background: #fff;
      color: #111;
    }

    button:hover,
    .toolbarBall:hover {
      filter: brightness(1.05);
    }

    button.active {
      background: var(--accent);
      color: #111;
    }

    label {
      font-size: 13px;
      font-weight: 800;
      color: inherit;
    }

    input[type="color"] {
      width: 44px;
      height: 36px;
      padding: 3px;
    }

    input[type="range"] {
      width: 96px;
    }

    .colorBtn {
      width: 34px;
      height: 34px;
      padding: 0;
      border: 2px solid rgba(255, 255, 255, 0.65);
    }

    .divider {
      width: 1px;
      height: 32px;
      background: rgba(255, 255, 255, 0.22);
      margin: 0 2px;
    }

    .hint {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      padding: 8px 10px;
      border-radius: 12px;
      font-size: 12px;
      line-height: 1.35;
      max-width: calc(100vw - 24px);
      pointer-events: none;
    }

    body.light {
      background: #fff;
      color: #111;
    }

    body.light .toolbar {
      background: var(--light-panel);
      color: #111;
    }

    body.light button:not(.active):not(.toolbarBall) {
      background: #111;
      color: #fff;
    }

    body.light .colorBtn {
      border-color: rgba(0, 0, 0, 0.35);
    }

    body.light .divider {
      background: rgba(0, 0, 0, 0.18);
    }

    body.light .hint {
      background: rgba(255, 255, 255, 0.72);
      color: #111;
    }

    @media (max-width: 700px) {
      .toolbar {
        top: 8px;
        width: calc(100vw - 16px);
        max-height: 46vh;
        overflow: auto;
        justify-content: flex-start;
      }

      input[type="range"] {
        width: 82px;
      }

      .hint {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="toolbar" id="toolbar">
    <button id="penBtn" class="active" type="button">✏️ Chalk</button>
    <button id="eraserBtn" type="button">⬜ Eraser</button>

    <input type="color" id="color" value="#ffffff" title="Choose chalk color" />

    <button class="colorBtn" style="background:#ffffff" data-color="#ffffff" title="White" type="button"></button>
    <button class="colorBtn" style="background:#ffd93d" data-color="#ffd93d" title="Yellow" type="button"></button>
    <button class="colorBtn" style="background:#4dabf7" data-color="#4dabf7" title="Blue" type="button"></button>
    <button class="colorBtn" style="background:#ff6b6b" data-color="#ff6b6b" title="Red" type="button"></button>
    <button class="colorBtn" style="background:#51cf66" data-color="#51cf66" title="Green" type="button"></button>
    <button class="colorBtn" style="background:#111111" data-color="#111111" title="Black" type="button"></button>

    <label for="size">Pen</label>
    <input type="range" id="size" min="2" max="35" value="5" />

    <label for="eraserSize">Eraser</label>
    <input type="range" id="eraserSize" min="10" max="100" value="35" />

    <label for="smooth">Smooth</label>
    <input type="range" id="smooth" min="1" max="20" value="12" />

    <div class="divider" aria-hidden="true"></div>

    <button id="undoBtn" type="button">↶ Undo</button>
    <button id="redoBtn" type="button">↷ Redo</button>
    <button id="clearBtn" type="button">Clear</button>

    <div class="divider" aria-hidden="true"></div>

    <button id="loadDrawingBtn" type="button">Load Drawing PNG</button>
    <input type="file" id="loadDrawingInput" accept="image/png,image/*" hidden />

    <button id="boardImageBtn" type="button">Change Board Image</button>
    <input type="file" id="boardImageInput" accept="image/png,image/jpeg,image/webp,image/*" hidden />

    <button id="resetBoardImageBtn" type="button">Reset Board</button>
    <button id="saveBtn" type="button">Save PNG</button>
    <button id="shareBtn" type="button">Share</button>

    <div class="divider" aria-hidden="true"></div>

    <button id="collapseBtn" type="button">Collapse</button>
    <button id="fsBtn" type="button">Fullscreen</button>
    <button id="themeBtn" type="button">Dark/Light</button>
  </div>

  <button class="toolbarBall" id="toolbarBall" title="Show toolbar" type="button">☰</button>

  <div class="stage" id="stage">
    <canvas id="board"></canvas>
  </div>

  <div class="hint">F2: collapse/show toolbar · Esc: leave fullscreen · Save includes the current board image</div>

  <script>
    const stage = document.getElementById("stage");
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });

    const toolbar = document.getElementById("toolbar");
    const toolbarBall = document.getElementById("toolbarBall");
    const penBtn = document.getElementById("penBtn");
    const eraserBtn = document.getElementById("eraserBtn");
    const color = document.getElementById("color");
    const size = document.getElementById("size");
    const eraserSize = document.getElementById("eraserSize");
    const smooth = document.getElementById("smooth");
    const clearBtn = document.getElementById("clearBtn");
    const undoBtn = document.getElementById("undoBtn");
    const redoBtn = document.getElementById("redoBtn");
    const saveBtn = document.getElementById("saveBtn");
    const shareBtn = document.getElementById("shareBtn");
    const fsBtn = document.getElementById("fsBtn");
    const themeBtn = document.getElementById("themeBtn");
    const collapseBtn = document.getElementById("collapseBtn");
    const loadDrawingBtn = document.getElementById("loadDrawingBtn");
    const loadDrawingInput = document.getElementById("loadDrawingInput");
    const boardImageBtn = document.getElementById("boardImageBtn");
    const boardImageInput = document.getElementById("boardImageInput");
    const resetBoardImageBtn = document.getElementById("resetBoardImageBtn");

    const defaultBoardImage = "classroom.jpg";
    let boardImageSrc = defaultBoardImage;
    let boardImageObj = null;

    let tool = "pen";
    let drawing = false;
    let lastX = 0;
    let lastY = 0;
    let undoStack = [];
    let redoStack = [];
    let lastCanvasData = null;
    let currentPointerId = null;

    function updateBoardBackground() {
      stage.style.backgroundImage = `url("${boardImageSrc}")`;
    }

    function loadBoardImageObject(src) {
      boardImageObj = null;
      const img = new Image();
      img.onload = () => {
        boardImageObj = img;
      };
      img.onerror = () => {
        boardImageObj = null;
      };
      img.src = src;
    }

    updateBoardBackground();
    loadBoardImageObject(boardImageSrc);

    function snapshot() {
      return canvas.toDataURL("image/png");
    }

    function saveState() {
      undoStack.push(snapshot());
      if (undoStack.length > 50) undoStack.shift();
      redoStack = [];
    }

    function loadState(dataUrl) {
      const img = new Image();
      img.onload = () => {
        ctx.save();
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.globalCompositeOperation = "source-over";
        ctx.shadowBlur = 0;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        ctx.restore();
      };
      img.src = dataUrl;
    }

    function resizeCanvas() {
      if (canvas.width && canvas.height) {
        lastCanvasData = snapshot();
      }

      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const width = Math.round(window.innerWidth * dpr);
      const height = Math.round(window.innerHeight * dpr);

      canvas.width = width;
      canvas.height = height;
      canvas.style.width = `${window.innerWidth}px`;
      canvas.style.height = `${window.innerHeight}px`;

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      if (lastCanvasData) {
        loadState(lastCanvasData);
      }
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    function setPenMode() {
      tool = "pen";
      canvas.style.cursor = "crosshair";
      penBtn.classList.add("active");
      eraserBtn.classList.remove("active");
    }

    function setEraserMode() {
      tool = "eraser";
      canvas.style.cursor = "cell";
      eraserBtn.classList.add("active");
      penBtn.classList.remove("active");
    }

    function setColor(c) {
      color.value = c;
      setPenMode();
    }

    document.querySelectorAll(".colorBtn").forEach((btn) => {
      btn.addEventListener("click", () => setColor(btn.dataset.color));
    });

    color.addEventListener("input", () => setPenMode());
    penBtn.addEventListener("click", setPenMode);
    eraserBtn.addEventListener("click", setEraserMode);

    function getPos(e) {
      const r = canvas.getBoundingClientRect();
      return {
        x: e.clientX - r.left,
        y: e.clientY - r.top,
      };
    }

    function startDraw(e) {
      if (e.button !== undefined && e.button !== 0) return;
      e.preventDefault();
      currentPointerId = e.pointerId;
      canvas.setPointerCapture?.(e.pointerId);
      saveState();
      drawing = true;
      const p = getPos(e);
      lastX = p.x;
      lastY = p.y;
    }

    function draw(e) {
      if (!drawing || (currentPointerId !== null && e.pointerId !== currentPointerId)) return;
      e.preventDefault();

      const p = getPos(e);
      const smoothing = Math.max(0.05, Number(smooth.value) / 20);
      const x = lastX + (p.x - lastX) * smoothing;
      const y = lastY + (p.y - lastY) * smoothing;

      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      if (tool === "eraser") {
        ctx.globalCompositeOperation = "destination-out";
        ctx.shadowBlur = 0;
        ctx.lineWidth = Number(eraserSize.value);
        ctx.strokeStyle = "rgba(0,0,0,1)";
      } else {
        ctx.globalCompositeOperation = "source-over";
        ctx.strokeStyle = color.value;
        ctx.lineWidth = Number(size.value);
        ctx.shadowBlur = 2;
        ctx.shadowColor = color.value;
      }

      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(x, y);
      ctx.stroke();
      ctx.restore();

      lastX = x;
      lastY = y;
    }

    function stopDraw(e) {
      if (currentPointerId !== null && e?.pointerId !== undefined && e.pointerId !== currentPointerId) return;
      drawing = false;
      currentPointerId = null;
      ctx.beginPath();
    }

    canvas.addEventListener("pointerdown", startDraw);
    canvas.addEventListener("pointermove", draw);
    window.addEventListener("pointerup", stopDraw);
    window.addEventListener("pointercancel", stopDraw);

    clearBtn.addEventListener("click", () => {
      saveState();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    });

    undoBtn.addEventListener("click", () => {
      if (!undoStack.length) return;
      redoStack.push(snapshot());
      loadState(undoStack.pop());
    });

    redoBtn.addEventListener("click", () => {
      if (!redoStack.length) return;
      undoStack.push(snapshot());
      loadState(redoStack.pop());
    });

    loadDrawingBtn.addEventListener("click", () => loadDrawingInput.click());

    loadDrawingInput.addEventListener("change", (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      saveState();
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          ctx.save();
          ctx.globalCompositeOperation = "source-over";
          ctx.shadowBlur = 0;
          const scale = Math.min(window.innerWidth / img.width, window.innerHeight / img.height);
          const w = img.width * scale;
          const h = img.height * scale;
          const x = (window.innerWidth - w) / 2;
          const y = (window.innerHeight - h) / 2;
          ctx.drawImage(img, x, y, w, h);
          ctx.restore();
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
      loadDrawingInput.value = "";
    });

    boardImageBtn.addEventListener("click", () => boardImageInput.click());

    boardImageInput.addEventListener("change", (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        boardImageSrc = event.target.result;
        updateBoardBackground();
        loadBoardImageObject(boardImageSrc);
      };
      reader.readAsDataURL(file);
      boardImageInput.value = "";
    });

    resetBoardImageBtn.addEventListener("click", () => {
      boardImageSrc = defaultBoardImage;
      updateBoardBackground();
      loadBoardImageObject(boardImageSrc);
    });

    function drawContainImage(octx, img, width, height) {
      if (!img || !img.complete || !img.naturalWidth) {
        octx.fillStyle = document.body.classList.contains("light") ? "#ffffff" : "#111111";
        octx.fillRect(0, 0, width, height);
        return;
      }
      const scale = Math.min(width / img.naturalWidth, height / img.naturalHeight);
      const w = img.naturalWidth * scale;
      const h = img.naturalHeight * scale;
      const x = (width - w) / 2;
      const y = (height - h) / 2;
      octx.drawImage(img, x, y, w, h);
    }

    function makeOutputCanvas() {
      const output = document.createElement("canvas");
      const octx = output.getContext("2d");
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      output.width = Math.round(window.innerWidth * dpr);
      output.height = Math.round(window.innerHeight * dpr);
      drawContainImage(octx, boardImageObj, output.width, output.height);
      octx.drawImage(canvas, 0, 0, output.width, output.height);
      return output;
    }

    saveBtn.addEventListener("click", () => {
      const output = makeOutputCanvas();
      const link = document.createElement("a");
      link.download = "whiteboard-chalk.png";
      link.href = output.toDataURL("image/png");
      link.click();
    });

    shareBtn.addEventListener("click", async () => {
      const output = makeOutputCanvas();
      output.toBlob(async (blob) => {
        const file = new File([blob], "whiteboard-chalk.png", { type: "image/png" });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({ title: "Whiteboard Chalk", files: [file] });
        } else if (navigator.share) {
          await navigator.share({ title: "Whiteboard Chalk" });
        } else {
          alert("Sharing is not supported here. Use Save PNG instead.");
        }
      }, "image/png");
    });

    function collapseToolbar() {
      toolbar.classList.add("collapsed");
      toolbarBall.classList.add("visible");
    }

    function expandToolbar() {
      toolbar.classList.remove("collapsed");
      toolbarBall.classList.remove("visible");
    }

    function toggleToolbar() {
      if (toolbar.classList.contains("collapsed")) expandToolbar();
      else collapseToolbar();
    }

    collapseBtn.addEventListener("click", collapseToolbar);
    toolbarBall.addEventListener("click", expandToolbar);

    async function toggleFullscreen() {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
        } else {
          await document.exitFullscreen();
        }
      } catch (err) {
        alert("Fullscreen is blocked by this browser or page context.");
      }
    }

    fsBtn.addEventListener("click", toggleFullscreen);

    document.addEventListener("fullscreenchange", () => {
      fsBtn.textContent = document.fullscreenElement ? "Exit Fullscreen" : "Fullscreen";
      setTimeout(resizeCanvas, 60);
    });

    themeBtn.addEventListener("click", () => {
      document.body.classList.toggle("light");
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "F2") {
        e.preventDefault();
        toggleToolbar();
      }

      const ctrlOrCmd = e.ctrlKey || e.metaKey;
      if (ctrlOrCmd && e.key.toLowerCase() === "z") {
        e.preventDefault();
        undoBtn.click();
      }
      if (ctrlOrCmd && e.key.toLowerCase() === "y") {
        e.preventDefault();
        redoBtn.click();
      }
    });
  </script>
</body>

</html>
