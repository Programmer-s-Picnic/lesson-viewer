<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Virtual Classroom Board</title>

    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        --bar-bg: rgba(255, 255, 255, 0.92);
        --bar-border: rgba(0, 0, 0, 0.12);
        --btn-bg: #ffffff;
        --btn-text: #111827;
        --btn-border: rgba(0, 0, 0, 0.18);
        --accent: #f59e0b;
        --accent-2: #ea580c;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family:
          Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #111;
      }

      body {
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
      }

      .topbar {
        position: fixed;
        top: 10px;
        left: 10px;
        right: 10px;
        z-index: 1000;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        padding: 10px 12px;
        border: 1px solid var(--bar-border);
        border-radius: 16px;
        background: var(--bar-bg);
        backdrop-filter: blur(10px);
        box-shadow: 0 12px 34px rgba(0, 0, 0, 0.18);
      }

      .topbar .group {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .topbar .spacer {
        flex: 1 1 auto;
      }

      button {
        appearance: none;
        border: 1px solid var(--btn-border);
        background: var(--btn-bg);
        color: var(--btn-text);
        padding: 9px 14px;
        border-radius: 12px;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 0.15s ease,
          background 0.15s ease,
          box-shadow 0.15s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button.primary {
        border: none;
        background: linear-gradient(145deg, var(--accent), var(--accent-2));
        color: #111;
      }

      button.active {
        outline: 2px solid rgba(245, 158, 11, 0.9);
        outline-offset: 2px;
      }

      .label {
        font-size: 13px;
        font-weight: 700;
        color: #374151;
      }

      input[type="range"] {
        width: 120px;
      }

      input[type="color"] {
        width: 42px;
        height: 42px;
        padding: 0;
        border: none;
        background: transparent;
        cursor: pointer;
      }

      .stage {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      .bg {
        position: absolute;
        inset: 0;
        background: url("classroom.jpg") center center / cover no-repeat;
      }

      .boardBox {
        position: absolute;
        left: 23%;
        top: 8%;
        width: 63%;
        height: 90%;
        border-radius: 8px;
        overflow: visible;
        touch-action: none;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.02);
        cursor: crosshair;
        touch-action: none;
      }

      .calibOutline {
        position: absolute;
        inset: -2px;
        border: 2px dashed #f59e0b;
        border-radius: 10px;
        display: none;
        pointer-events: none;
        box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.12) inset;
      }

      .handle {
        position: absolute;
        width: 18px;
        height: 18px;
        background: #f59e0b;
        border: 2px solid white;
        border-radius: 50%;
        display: none;
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25);
      }

      .handle.h-se {
        right: -9px;
        bottom: -9px;
        cursor: nwse-resize;
      }

      .dragPad {
        position: absolute;
        left: 10px;
        top: 10px;
        padding: 6px 10px;
        border-radius: 10px;
        background: rgba(245, 158, 11, 0.95);
        color: #111;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.04em;
        display: none;
        cursor: grab;
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.22);
      }

      .status {
        padding: 7px 10px;
        border-radius: 10px;
        background: rgba(17, 24, 39, 0.06);
        color: #374151;
        font-size: 13px;
        font-weight: 700;
      }

      @media (max-width: 900px) {
        .topbar {
          top: 8px;
          left: 8px;
          right: 8px;
          gap: 8px;
        }

        .boardBox {
          left: 6%;
          top: 12%;
          width: 88%;
          height: 80%;
        }

        input[type="range"] {
          width: 96px;
        }
      }
    </style>
  </head>

  <body>
    <div class="topbar">
      <div class="group">
        <button id="penBtn" class="primary active">Pen</button>
        <button id="eraserBtn">Eraser</button>
      </div>

      <div class="group">
        <span class="label">Color</span>
        <input type="color" id="color" value="#111827" />
      </div>

      <div class="group">
        <span class="label">Size</span>
        <input type="range" id="size" min="2" max="30" value="6" />
        <span id="sizeVal" class="status">6</span>
      </div>

      <div class="group">
        <button id="clearBtn">Clear</button>
        <button id="saveBtn">Save PNG</button>
        <button id="calibBtn">Calibrate</button>
      </div>

      <div class="spacer"></div>
      <div id="modeStatus" class="status">Draw mode</div>
    </div>

    <div class="stage" id="stage">
      <div class="bg"></div>

      <div class="boardBox" id="boardBox">
        <div class="calibOutline" id="outline"></div>
        <div class="dragPad" id="dragPad">MOVE</div>
        <div class="handle h-se" id="resizeHandle"></div>
        <canvas id="board"></canvas>
      </div>
    </div>

    <script>
      const canvas = document.getElementById("board");
      const ctx = canvas.getContext("2d");
      const boardBox = document.getElementById("boardBox");
      const stage = document.getElementById("stage");

      const penBtn = document.getElementById("penBtn");
      const eraserBtn = document.getElementById("eraserBtn");
      const colorEl = document.getElementById("color");
      const sizeEl = document.getElementById("size");
      const sizeVal = document.getElementById("sizeVal");
      const clearBtn = document.getElementById("clearBtn");
      const saveBtn = document.getElementById("saveBtn");
      const calibBtn = document.getElementById("calibBtn");
      const modeStatus = document.getElementById("modeStatus");

      const outline = document.getElementById("outline");
      const resizeHandle = document.getElementById("resizeHandle");
      const dragPad = document.getElementById("dragPad");

      let tool = "pen";
      let drawing = false;
      let last = null;
      let calibrate = false;
      let activePointerId = null;

      let dragging = false;
      let resizing = false;

      let dragStart = null;
      let startBox = null;

      function setupContext() {
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
      }

      function getCssSize() {
        const rect = boardBox.getBoundingClientRect();
        return { width: Math.max(1, rect.width), height: Math.max(1, rect.height) };
      }

      function snapshotCanvas() {
        if (!canvas.width || !canvas.height) return null;
        const img = new Image();
        img.src = canvas.toDataURL("image/png");
        return img;
      }

      function resizeCanvasPreserve() {
        const before = snapshotCanvas();
        const { width, height } = getCssSize();
        const dpr = window.devicePixelRatio || 1;

        canvas.width = Math.round(width * dpr);
        canvas.height = Math.round(height * dpr);

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        setupContext();

        if (before) {
          before.onload = () => {
            ctx.clearRect(0, 0, width, height);
            ctx.drawImage(before, 0, 0, width, height);
          };

          if (before.complete) {
            ctx.clearRect(0, 0, width, height);
            ctx.drawImage(before, 0, 0, width, height);
          }
        }
      }

      const ro = new ResizeObserver(() => resizeCanvasPreserve());
      ro.observe(boardBox);
      window.addEventListener("load", resizeCanvasPreserve);
      window.addEventListener("resize", resizeCanvasPreserve);

      function getPos(e) {
        const r = canvas.getBoundingClientRect();
        return {
          x: e.clientX - r.left,
          y: e.clientY - r.top,
        };
      }

      function applyStrokeStyle() {
        ctx.lineWidth = Number(sizeEl.value);
        if (tool === "eraser") {
          ctx.globalCompositeOperation = "destination-out";
          ctx.strokeStyle = "rgba(0,0,0,1)";
        } else {
          ctx.globalCompositeOperation = "source-over";
          ctx.strokeStyle = colorEl.value;
        }
      }

      function stroke(a, b) {
        applyStrokeStyle();
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }

      function dot(p) {
        applyStrokeStyle();
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(1, Number(sizeEl.value) / 2), 0, Math.PI * 2);
        ctx.fillStyle = tool === "eraser" ? "rgba(0,0,0,1)" : colorEl.value;

        if (tool === "eraser") {
          ctx.globalCompositeOperation = "destination-out";
          ctx.fill();
        } else {
          ctx.globalCompositeOperation = "source-over";
          ctx.fill();
        }
      }

      canvas.addEventListener("pointerdown", (e) => {
        if (calibrate) return;
        drawing = true;
        activePointerId = e.pointerId;
        canvas.setPointerCapture(e.pointerId);
        last = getPos(e);
        dot(last);
      });

      canvas.addEventListener("pointermove", (e) => {
        if (!drawing || calibrate || e.pointerId !== activePointerId) return;
        const p = getPos(e);
        stroke(last, p);
        last = p;
      });

      function stopDrawing(e) {
        if (e && activePointerId !== null) {
          try {
            canvas.releasePointerCapture(activePointerId);
          } catch (_) {}
        }
        drawing = false;
        last = null;
        activePointerId = null;
      }

      canvas.addEventListener("pointerup", stopDrawing);
      canvas.addEventListener("pointercancel", stopDrawing);

      penBtn.onclick = () => {
        tool = "pen";
        penBtn.classList.add("active");
        eraserBtn.classList.remove("active");
      };

      eraserBtn.onclick = () => {
        tool = "eraser";
        eraserBtn.classList.add("active");
        penBtn.classList.remove("active");
      };

      sizeEl.oninput = () => {
        sizeVal.textContent = sizeEl.value;
      };

      clearBtn.onclick = () => {
        const { width, height } = getCssSize();
        ctx.clearRect(0, 0, width, height);
      };

      function setCalibrateMode(on) {
        calibrate = on;
        outline.style.display = on ? "block" : "none";
        resizeHandle.style.display = on ? "block" : "none";
        dragPad.style.display = on ? "block" : "none";
        modeStatus.textContent = on ? "Calibrate mode" : "Draw mode";
        canvas.style.cursor = on ? "default" : "crosshair";
        calibBtn.classList.toggle("active", on);
      }

      calibBtn.onclick = () => setCalibrateMode(!calibrate);

      dragPad.addEventListener("pointerdown", (e) => {
        if (!calibrate) return;
        dragging = true;
        dragPad.setPointerCapture(e.pointerId);

        const rect = boardBox.getBoundingClientRect();
        dragStart = { x: e.clientX, y: e.clientY };
        startBox = {
          left: rect.left,
          top: rect.top,
          width: rect.width,
          height: rect.height,
        };
      });

      resizeHandle.addEventListener("pointerdown", (e) => {
        if (!calibrate) return;
        resizing = true;
        resizeHandle.setPointerCapture(e.pointerId);

        const rect = boardBox.getBoundingClientRect();
        dragStart = { x: e.clientX, y: e.clientY };
        startBox = {
          left: rect.left,
          top: rect.top,
          width: rect.width,
          height: rect.height,
        };
      });

      window.addEventListener("pointermove", (e) => {
        if (!dragging && !resizing) return;

        const stageRect = stage.getBoundingClientRect();

        if (dragging) {
          const dx = e.clientX - dragStart.x;
          const dy = e.clientY - dragStart.y;

          let newLeft = startBox.left - stageRect.left + dx;
          let newTop = startBox.top - stageRect.top + dy;

          newLeft = Math.max(0, Math.min(newLeft, stageRect.width - startBox.width));
          newTop = Math.max(0, Math.min(newTop, stageRect.height - startBox.height));

          boardBox.style.left = (newLeft / stageRect.width) * 100 + "%";
          boardBox.style.top = (newTop / stageRect.height) * 100 + "%";
        }

        if (resizing) {
          const dx = e.clientX - dragStart.x;
          const dy = e.clientY - dragStart.y;

          let newWidth = Math.max(120, startBox.width + dx);
          let newHeight = Math.max(120, startBox.height + dy);

          const currentRect = boardBox.getBoundingClientRect();
          const maxWidth = stageRect.right - currentRect.left;
          const maxHeight = stageRect.bottom - currentRect.top;

          newWidth = Math.min(newWidth, maxWidth);
          newHeight = Math.min(newHeight, maxHeight);

          boardBox.style.width = (newWidth / stageRect.width) * 100 + "%";
          boardBox.style.height = (newHeight / stageRect.height) * 100 + "%";
        }
      });

      window.addEventListener("pointerup", () => {
        dragging = false;
        resizing = false;
      });

      saveBtn.onclick = () => {
        const stageRect = stage.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;

        const output = document.createElement("canvas");
        output.width = Math.round(stageRect.width * dpr);
        output.height = Math.round(stageRect.height * dpr);

        const octx = output.getContext("2d");
        octx.scale(dpr, dpr);

        const bgImg = new Image();
        bgImg.onload = () => {
          octx.drawImage(bgImg, 0, 0, stageRect.width, stageRect.height);

          const boardRect = boardBox.getBoundingClientRect();
          const x = boardRect.left - stageRect.left;
          const y = boardRect.top - stageRect.top;

          octx.drawImage(canvas, x, y, boardRect.width, boardRect.height);

          const link = document.createElement("a");
          link.download = "full-classroom-board.png";
          link.href = output.toDataURL("image/png");
          link.click();
        };

        bgImg.src = "classroom.jpg";
      };
    </script>
  </body>
</html>
