<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Simple Whiteboard Chalk</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #111;
        overflow: hidden;
      }

      .toolbar {
        position: fixed;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
        padding: 10px;
        border-radius: 16px;
        background: rgba(0, 0, 0, 0.65);
        backdrop-filter: blur(10px);
      }

      button,
      input {
        border: 0;
        border-radius: 10px;
        padding: 8px 11px;
        font-weight: 700;
        cursor: pointer;
      }

      button {
        background: #fff;
        color: #111;
      }

      button.active {
        background: #ff9f1c;
      }

      input[type="color"] {
        width: 44px;
        height: 36px;
        padding: 3px;
      }

      .stage {
        width: 100vw;
        height: 100vh;
        background: url("classroom.jpg") center/cover no-repeat;
      }

      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
        touch-action: none;
        cursor: crosshair;
      }

      .light .toolbar {
        background: rgba(255, 255, 255, 0.75);
      }

      .light button {
        background: #111;
        color: #fff;
      }

      .light button.active {
        background: #ff9f1c;
        color: #111;
      }
    </style>
  </head>

  <body>
    <div class="toolbar">
      <button id="penBtn" class="active">✏️ Chalk</button>
      <button id="eraserBtn">⬜ Eraser</button>

      <input type="color" id="color" value="#111111" />
      <input type="range" id="size" min="2" max="35" value="5" />

      <button id="undoBtn">↶ Undo</button>
      <button id="redoBtn">↷ Redo</button>
      <button id="saveBtn">Save PNG</button>
      <button id="fsBtn">Fullscreen</button>
      <button id="themeBtn">Dark/Light</button>
      <button id="shareBtn">Share</button>
    </div>

    <div class="stage" id="stage">
      <canvas id="board"></canvas>
    </div>

    <script>
      const canvas = document.getElementById("board");
      const ctx = canvas.getContext("2d");

      const penBtn = document.getElementById("penBtn");
      const eraserBtn = document.getElementById("eraserBtn");
      const color = document.getElementById("color");
      const size = document.getElementById("size");

      let tool = "pen";
      let drawing = false;
      let lastX = 0;
      let lastY = 0;

      let undoStack = [];
      let redoStack = [];

      function resizeCanvas() {
        const old = document.createElement("canvas");
        old.width = canvas.width;
        old.height = canvas.height;
        old.getContext("2d").drawImage(canvas, 0, 0);

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        ctx.drawImage(old, 0, 0, canvas.width, canvas.height);
      }
      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);

      function saveState() {
        undoStack.push(canvas.toDataURL());
        if (undoStack.length > 40) undoStack.shift();
        redoStack = [];
      }

      function loadState(data) {
        const img = new Image();
        img.onload = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        };
        img.src = data;
      }

      function getPos(e) {
        const r = canvas.getBoundingClientRect();
        const p = e.touches ? e.touches[0] : e;
        return {
          x: p.clientX - r.left,
          y: p.clientY - r.top,
        };
      }

      function startDraw(e) {
        saveState();
        drawing = true;
        const p = getPos(e);
        lastX = p.x;
        lastY = p.y;
      }

      function draw(e) {
        if (!drawing) return;
        e.preventDefault();

        const p = getPos(e);

        ctx.lineWidth = size.value;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        if (tool === "eraser") {
          ctx.globalCompositeOperation = "destination-out";
          ctx.strokeStyle = "rgba(0,0,0,1)";
        } else {
          ctx.globalCompositeOperation = "source-over";
          ctx.strokeStyle = color.value;
        }

        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();

        lastX = p.x;
        lastY = p.y;
      }

      function stopDraw() {
        drawing = false;
      }

      canvas.addEventListener("mousedown", startDraw);
      canvas.addEventListener("mousemove", draw);
      window.addEventListener("mouseup", stopDraw);

      canvas.addEventListener("touchstart", startDraw, { passive: false });
      canvas.addEventListener("touchmove", draw, { passive: false });
      window.addEventListener("touchend", stopDraw);

      penBtn.onclick = () => {
        tool = "pen";
        canvas.style.cursor = "crosshair";
        penBtn.classList.add("active");
        eraserBtn.classList.remove("active");
      };

      eraserBtn.onclick = () => {
        tool = "eraser";
        canvas.style.cursor = "cell";
        eraserBtn.classList.add("active");
        penBtn.classList.remove("active");
      };

      undoBtn.onclick = () => {
        if (!undoStack.length) return;
        redoStack.push(canvas.toDataURL());
        loadState(undoStack.pop());
      };

      redoBtn.onclick = () => {
        if (!redoStack.length) return;
        undoStack.push(canvas.toDataURL());
        loadState(redoStack.pop());
      };

      saveBtn.onclick = () => {
        const output = document.createElement("canvas");
        const octx = output.getContext("2d");

        output.width = window.innerWidth;
        output.height = window.innerHeight;

        const bg = new Image();
        bg.onload = () => {
          octx.drawImage(bg, 0, 0, output.width, output.height);
          octx.drawImage(canvas, 0, 0);
          const link = document.createElement("a");
          link.download = "whiteboard-chalk.png";
          link.href = output.toDataURL("image/png");
          link.click();
        };
        bg.src = "classroom.jpg";
      };

      fsBtn.onclick = () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen();
        } else {
          document.exitFullscreen();
        }
      };

      themeBtn.onclick = () => {
        document.body.classList.toggle("light");
      };

      shareBtn.onclick = async () => {
        canvas.toBlob(async (blob) => {
          const file = new File([blob], "whiteboard.png", {
            type: "image/png",
          });

          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({
              title: "Whiteboard",
              files: [file],
            });
          } else {
            alert("Sharing not supported. Use Save PNG.");
          }
        });
      };
    </script>
  </body>
</html>
