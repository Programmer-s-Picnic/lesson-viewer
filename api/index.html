<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>API Request Builder</title>

<style>
  body{
    margin:0;
    font-family: Arial;
    background:#fffaf0;
    overflow:auto;
  }

  header{
    padding:15px;
    background:#1f2937;
    color:white;
  }

  .container{
    display:flex;
    flex-direction:column;
    height:calc(100vh - 60px);
  }

  .top{
    flex:1;
    padding:15px;
    overflow:auto;
  }

  .bottom{
    flex:1;
    border-top:2px solid #eee;
    padding:15px;
    overflow:auto;
  }

  textarea{
    width:100%;
    height:150px;
  }

  button{
    padding:10px 15px;
    background:#f59e0b;
    border:none;
    cursor:pointer;
  }
</style>
</head>

<body>

<header>
  <h2>API Request Builder</h2>
</header>

<div class="container">

  <!-- REQUEST -->
  <div class="top">

    <input id="url" style="width:70%" placeholder="Enter URL" />
    <button onclick="sendRequest()">Send</button>

    <h3>Request Body</h3>

    <!-- ✅ FIXED TEXTAREA -->
    <textarea id="bodyInput"
      placeholder='{"name":"Champak Roy","tool":"Programmer&#39;s Picnic API Studio"}'></textarea>

  </div>

  <!-- RESPONSE -->
  <div class="bottom">

    <h3>Response</h3>
    <pre id="responseBox">No response yet...</pre>

  </div>

</div>

<script>

async function sendRequest(){
  const url = document.getElementById("url").value;
  const body = document.getElementById("bodyInput").value;

  try{
    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type":"application/json" },
      body: body
    });

    const text = await res.text();

    document.getElementById("responseBox").textContent =
      JSON.stringify(JSON.parse(text), null, 2);

  }catch(e){
    document.getElementById("responseBox").textContent = e.toString();
  }
}

</script>

</body>
</html>
