<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dry Run Mastery — Interactive Lesson + Visualizer</title>
    <meta
      name="description"
      content="A comprehensive interactive lesson on dry runs in programming, with methodology, examples, importance, quizzes, and a dry run visualizer."
    />
    <style>
      :root {
        --bg: #fff8eb;
        --card: rgba(255, 255, 255, 0.92);
        --ink: #1f2937;
        --muted: #6b7280;
        --brand: #d97706;
        --brand-2: #f59e0b;
        --line: #ead7b0;
        --good: #166534;
        --bad: #b91c1c;
        --shadow: 0 14px 40px rgba(217, 119, 6, 0.12);
        --radius: 22px;
        --mono:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        --sans:
          Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        margin: 0;
        font-family: var(--sans);
        color: var(--ink);
        background:
          radial-gradient(
            circle at top left,
            rgba(245, 158, 11, 0.18),
            transparent 28%
          ),
          radial-gradient(
            circle at right,
            rgba(217, 119, 6, 0.12),
            transparent 24%
          ),
          linear-gradient(180deg, #fff8eb 0%, #fffaf2 55%, #fffdf9 100%);
        line-height: 1.65;
      }

      a {
        color: var(--brand);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }

      .wrap {
        width: min(1180px, calc(100% - 24px));
        margin: 0 auto;
        padding: 20px 0 80px;
      }

      .hero {
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(234, 215, 176, 0.9);
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.96),
          rgba(255, 248, 235, 0.95)
        );
        border-radius: 30px;
        box-shadow: var(--shadow);
        padding: 28px;
        margin-top: 14px;
      }

      .topbar {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }

      .pill {
        border: 1px solid #f3d59c;
        background: #fff3d6;
        padding: 6px 10px;
        border-radius: 999px;
        font-weight: 700;
      }

      .card {
        background: var(--card);
        border-radius: var(--radius);
        padding: 20px;
        box-shadow: var(--shadow);
      }

      textarea {
        width: 100%;
        min-height: 180px;
        border-radius: 12px;
        padding: 10px;
        font-family: var(--mono);
      }

      .btnrow {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 10px;
      }

      button {
        padding: 10px 14px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        font-weight: bold;
      }

      .primary {
        background: orange;
        color: white;
      }
      .ghost {
        background: #fff3d6;
      }

      .trace-item {
        border: 1px solid #eee;
        padding: 10px;
        margin: 6px 0;
        border-radius: 10px;
      }

      .active {
        border-color: orange;
      }

      .vars {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .var-box {
        padding: 10px;
        border: 1px solid #eee;
        border-radius: 10px;
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="hero">
        <div class="topbar">
          <div>
            <span class="pill">Dry Run</span>
            <span class="pill">Visualizer</span>
          </div>

          <a href="https://wa.me/919335874326" target="_blank"> WhatsApp </a>
        </div>

        <h1>Dry Run Visualizer</h1>
      </div>

      <div class="card">
        <h3>Code</h3>
        <textarea id="codeEditor">
sum = 0
for i in range(1, 4):
    sum = sum + i
print(sum)</textarea
        >

        <div class="btnrow">
          <button class="primary" onclick="buildTrace()">Build Trace</button>
          <button onclick="stepBack()">Prev</button>
          <button onclick="stepForward()">Next</button>
          <button onclick="saveCollection()">Save</button>
        </div>
      </div>

      <div class="card">
        <h3>Trace</h3>
        <div id="tracePanel"></div>
      </div>

      <div class="card">
        <h3>Variables</h3>
        <div id="varsPanel" class="vars"></div>
      </div>

      <div class="card">
        <h3>Output</h3>
        <div id="outputPanel"></div>
      </div>

      <div class="card">
        <h3>Collections</h3>
        <input id="collectionName" placeholder="Collection name" />
        <button onclick="saveCollection()">Save</button>
        <div id="collectionsList"></div>
      </div>
    </div>

    <script>
      let trace = [];
      let currentStep = -1;
      let collections = JSON.parse(
        localStorage.getItem("dryRunCollections") || "[]",
      );

      function saveCollection() {
        const name = document.getElementById("collectionName").value;
        const code = document.getElementById("codeEditor").value;
        collections.push({ name, code });
        localStorage.setItem("dryRunCollections", JSON.stringify(collections));
        renderCollections();
      }

      function renderCollections() {
        document.getElementById("collectionsList").innerHTML = collections
          .map(
            (c, i) => `
      <div class="trace-item">
        ${c.name}
        <button onclick="loadCollection(${i})">Load</button>
      </div>
    `,
          )
          .join("");
      }

      function loadCollection(i) {
        document.getElementById("codeEditor").value = collections[i].code;
        buildTrace();
      }

      function buildTrace() {
        const code = document.getElementById("codeEditor").value;
        trace = [];
        let vars = {};
        let output = [];

        code.split("\n").forEach((line, idx) => {
          if (line.includes("=")) {
            let [l, r] = line.split("=");
            vars[l.trim()] = eval(r);
          }
          if (line.includes("print")) {
            let val = eval(line.match(/\((.*)\)/)[1]);
            output.push(val);
          }

          trace.push({
            line,
            vars: JSON.parse(JSON.stringify(vars)),
            output: [...output],
          });
        });

        currentStep = 0;
        render();
      }

      function render() {
        let t = trace[currentStep];

        document.getElementById("tracePanel").innerHTML = trace
          .map(
            (s, i) =>
              `<div class="trace-item ${i == currentStep ? "active" : ""}">${s.line}</div>`,
          )
          .join("");

        document.getElementById("varsPanel").innerHTML = Object.entries(t.vars)
          .map(([k, v]) => `<div class="var-box">${k}: ${v}</div>`)
          .join("");

        document.getElementById("outputPanel").innerHTML =
          t.output.join("<br>");
      }

      function stepForward() {
        if (currentStep < trace.length - 1) {
          currentStep++;
          render();
        }
      }

      function stepBack() {
        if (currentStep > 0) {
          currentStep--;
          render();
        }
      }

      renderCollections();
    </script>
  </body>
</html>
