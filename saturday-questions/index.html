<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>Programmer's Picnic — Saturday Questions</title>

    <style>
      :root {
        --saffron: #d97706;
        --saffron2: #f59e0b;
        --bg: #fff8ef;
        --panel: #ffffff;
        --ink: #1f2937;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui;
        background: var(--bg);
        color: var(--ink);
      }

      /* ================= HEADER ================= */
      header {
        padding: 14px;
        background: linear-gradient(135deg, var(--saffron), var(--saffron2));
        color: #fff;
        font-weight: 700;
        font-size: 18px;
      }

      /* ================= LAYOUT ================= */
      .container {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 16px;
        padding: 16px;
      }

      /* ================= QUESTIONS ================= */
      .question-list {
        background: var(--panel);
        border-radius: 12px;
        padding: 12px;
        overflow: auto;
        height: 80vh;
      }

      .question-card {
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #eee;
        margin-bottom: 10px;
        cursor: pointer;
        transition: 0.2s;
      }

      .question-card:hover {
        background: #fff3e0;
      }

      /* ================= MAIN ================= */
      .main {
        background: var(--panel);
        border-radius: 12px;
        padding: 16px;
      }

      /* ================= REPLIES ================= */

      .replies-wrap {
        display: grid;
        gap: 14px;
        margin-top: 14px;
      }

      .reply-card {
        background: linear-gradient(135deg, #fff7ed, #ffedd5);
        border: 1px solid rgba(217, 119, 6, 0.25);
        border-radius: 14px;
        padding: 14px;
        box-shadow: 0 6px 18px rgba(217, 119, 6, 0.15);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .reply-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 28px rgba(217, 119, 6, 0.25);
      }

      .reply-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      .reply-user {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .reply-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, #f59e0b, #d97706);
        color: #fff;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .reply-name {
        font-weight: 600;
        color: #7c2d12;
      }

      .reply-date {
        font-size: 12px;
        color: #9a3412;
      }

      .reply-message {
        margin: 10px 0;
        line-height: 1.6;
      }

      .reply-code {
        background: #1e1e1e;
        color: #fbbf24;
        padding: 12px;
        border-radius: 10px;
        font-family: monospace;
        font-size: 13px;
        overflow: auto;
      }

      .reply-link {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: linear-gradient(135deg, #f59e0b, #d97706);
        color: #fff;
        padding: 10px 12px;
        border-radius: 10px;
        text-decoration: none;
      }

      .copy-btn {
        margin-top: 6px;
        font-size: 12px;
        background: #fff;
        border: 1px solid #f59e0b;
        padding: 4px 8px;
        border-radius: 6px;
        cursor: pointer;
      }

      .replies-empty {
        text-align: center;
        padding: 20px;
        background: #fff7ed;
        border: 1px dashed #f59e0b;
        border-radius: 12px;
      }

      /* ================= RESPONSIVE ================= */
      @media (max-width: 900px) {
        .container {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <header>🔥 Programmer's Picnic — Saturday Questions</header>

    <div class="container">
      <!-- LEFT QUESTIONS -->
      <div class="question-list" id="questionList"></div>

      <!-- MAIN AREA -->
      <div class="main">
        <h2 id="qTitle">Select a question</h2>
        <p id="qDesc"></p>

        <h3>Answers</h3>
        <div id="repliesWrap" class="replies-wrap"></div>
      </div>
    </div>

    <script>
      let QUESTIONS = [];
      let REPLIES = [];
      let CURRENT_ID = null;

      async function loadData() {
        QUESTIONS = await fetch("questions.json").then((r) => r.json());
        REPLIES = await fetch("replies.json").then((r) => r.json());

        renderQuestions();
      }

      function renderQuestions() {
        const list = document.getElementById("questionList");
        list.innerHTML = "";

        QUESTIONS.forEach((q) => {
          const div = document.createElement("div");
          div.className = "question-card";
          div.innerText = q.title;
          div.onclick = () => selectQuestion(q);
          list.appendChild(div);
        });
      }

      function selectQuestion(q) {
        CURRENT_ID = q.id;
        document.getElementById("qTitle").innerText = q.title;
        document.getElementById("qDesc").innerText = q.problem || "";
        renderReplies();
      }

      function renderReplies() {
        const wrap = document.getElementById("repliesWrap");
        wrap.innerHTML = "";

        const data = (REPLIES.replies || []).filter(
          (r) => r.qid === CURRENT_ID,
        );

        if (!data.length) {
          wrap.innerHTML = '<div class="replies-empty">No answers yet</div>';
          return;
        }

        data.forEach((r) => {
          const card = document.createElement("div");
          card.className = "reply-card";

          const initials = (r.name || "?")
            .split(" ")
            .map((x) => x[0])
            .join("")
            .toUpperCase();

          let html = `
      <div class="reply-head">
        <div class="reply-user">
          <div class="reply-avatar">${initials}</div>
          <div class="reply-name">${r.name || "Anonymous"}</div>
        </div>
        <div class="reply-date">${new Date(r.ts).toLocaleDateString()}</div>
      </div>
    `;

          if (r.msg) {
            html += `<div class="reply-message">${r.msg}</div>`;
          }

          if (r.code) {
            if (r.code.startsWith("http")) {
              html += `<a class="reply-link" href="${r.code}" target="_blank">Open Answer ↗</a>`;
            } else {
              html += `
          <pre class="reply-code">${escapeHtml(r.code)}</pre>
          <button class="copy-btn" onclick="copyText(\`${r.code}\`)">Copy</button>
        `;
            }
          }

          card.innerHTML = html;
          wrap.appendChild(card);
        });
      }

      function copyText(text) {
        navigator.clipboard.writeText(text);
        alert("Copied!");
      }

      function escapeHtml(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      loadData();
    </script>
  </body>
</html>
