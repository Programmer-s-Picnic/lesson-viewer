<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Saturday Questions</title>

<style>

:root{
--bg:#fff7e6;
--panel:#ffffff;
--ink:#1f2328;
--line:#e5e5e5;
--saffron:#ff9f1c;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
}

.banner{
margin:20px auto;
max-width:1200px;
border-radius:18px;
overflow:hidden;
border:1px solid var(--line);
}

.banner img{
width:100%;
display:block;
}

</style>
</head>


<body>

<div class="banner" id="banner"></div>

<script>

let META={};

function defaultBannerSVG(){

return `
<svg viewBox="0 0 1200 280" width="100%" xmlns="http://www.w3.org/2000/svg">

<defs>
<linearGradient id="g" x1="0" x2="1">
<stop offset="0" stop-color="#ff9f1c"/>
<stop offset="1" stop-color="#ffb74d"/>
</linearGradient>
</defs>

<rect width="1200" height="280" fill="url(#g)" rx="28"/>

<text x="100" y="150"
font-size="48"
font-weight="900"
fill="#111"
font-family="system-ui">
Programmer’s Picnic
</text>

<text x="100" y="200"
font-size="24"
fill="#111"
font-family="system-ui">
Saturday Questions
</text>

</svg>
`;
}



function renderBanner(){

const banner= META.banner || {};

const type=banner.type || "default";

const container=document.getElementById("banner");

if(type==="image" && banner.image_url){

container.innerHTML=
`<img src="${banner.image_url}">`;

return;

}

if(type==="svg" && banner.svg_html){

container.innerHTML=banner.svg_html;

return;

}

container.innerHTML=defaultBannerSVG();

}



async function load(){

const res=await fetch("questions.json");

const data=await res.json();

META=data.meta||{};

renderBanner();

}

load();

</script>

</body>
</html>
