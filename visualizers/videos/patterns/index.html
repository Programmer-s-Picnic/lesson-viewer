<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Music Visualizer — Patterns Only</title>
    <style>
      select {
        color: teal !important;
      }
      :root {
        --bg: #070b14;
        --panel: rgba(255, 255, 255, 0.08);
        --line: rgba(255, 255, 255, 0.12);
        --text: #f8fafc;
        --muted: #cbd5e1;
        --accent: #f59e0b;
        --accent2: #fb7185;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
        color: var(--text);
        background:
          radial-gradient(
            circle at top left,
            rgba(245, 158, 11, 0.18),
            transparent 26%
          ),
          radial-gradient(
            circle at top right,
            rgba(251, 113, 133, 0.12),
            transparent 28%
          ),
          linear-gradient(135deg, #050816, #0b1020 45%, #111827);
      }

      .app {
        min-height: 100%;
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 16px;
        padding: 16px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 24px;
        backdrop-filter: blur(10px);
      }

      .side {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .card {
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.06);
      }

      h1 {
        margin: 0;
        font-size: 1.45rem;
      }

      p {
        margin: 0.4rem 0 0;
        color: var(--muted);
        line-height: 1.45;
      }

      .label {
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: #fde68a;
        font-weight: 700;
        margin-bottom: 10px;
      }

      button,
      select,
      input[type="file"],
      input[type="range"] {
        width: 100%;
      }

      button,
      select {
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        cursor: pointer;
      }

      button:hover,
      select:hover {
        background: rgba(255, 255, 255, 0.12);
      }

      .primary {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border: none;
        font-weight: 700;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .canvas-wrap {
        position: relative;
        overflow: hidden;
        min-height: 78vh;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .top {
        position: absolute;
        top: 14px;
        left: 14px;
        right: 14px;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        z-index: 2;
        pointer-events: none;
      }

      .badge {
        background: rgba(255, 255, 255, 0.09);
        border: 1px solid var(--line);
        padding: 8px 12px;
        border-radius: 999px;
        color: var(--muted);
        font-size: 0.88rem;
      }

      .stat {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px dashed rgba(255, 255, 255, 0.12);
      }

      .stat:last-child {
        border-bottom: none;
      }

      body.full .side {
        display: none;
      }

      body.full .app {
        grid-template-columns: 1fr;
        padding: 0;
        gap: 0;
      }

      body.full .panel,
      body.full .canvas-wrap {
        border-radius: 0;
        border: none;
        min-height: 100vh;
      }

      @media (max-width: 900px) {
        .app {
          grid-template-columns: 1fr;
        }
        .canvas-wrap {
          min-height: 60vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="panel side">
        <div>
          <h1>Music Visualizer</h1>
          <p>
            Patterns only. No photos. Upload audio or use microphone. Full
            screen starts after 5 seconds.
          </p>
        </div>

        <section class="card">
          <div class="label">Audio Input</div>
          <div class="row">
            <button id="micBtn">Use Microphone</button>
            <button id="stopBtn">Stop Input</button>
          </div>
          <div style="height: 10px"></div>
          <input id="fileInput" type="file" accept="audio/*" />
          <audio
            id="audioPlayer"
            controls
            style="width: 100%; margin-top: 10px"
          ></audio>
        </section>

        <section class="card">
          <div class="label">Visualizer</div>
          <select id="mode">
            <option value="rings">Pulse Rings</option>
            <option value="wave">Wave Field</option>
            <option value="spiral">Spiral Bloom</option>
            <option value="bars">Radial Bars</option>
            <option value="particles">Particles</option>
          </select>

          <div style="height: 10px"></div>

          <label>Sensitivity</label>
          <input
            id="sens"
            type="range"
            min="0.5"
            max="3"
            step="0.1"
            value="1.3"
          />

          <label>Trail / Fade</label>
          <input
            id="trail"
            type="range"
            min="0.02"
            max="0.3"
            step="0.01"
            value="0.08"
          />

          <label>Zoom</label>
          <input
            id="zoom"
            type="range"
            min="0.4"
            max="2.4"
            step="0.1"
            value="1"
          />

          <div style="height: 10px"></div>
          <button id="saveBtn" class="primary">Save Current Frame</button>
        </section>

        <section class="card">
          <div class="label">Stats</div>
          <div class="stat">
            <span>Status</span><strong id="status">Idle</strong>
          </div>
          <div class="stat"><span>Volume</span><strong id="vol">0</strong></div>
          <div class="stat"><span>Bass</span><strong id="bass">0</strong></div>
          <div class="stat"><span>Mid</span><strong id="mid">0</strong></div>
          <div class="stat">
            <span>Treble</span><strong id="treble">0</strong>
          </div>
        </section>
      </aside>

      <main class="panel canvas-wrap">
        <div class="top">
          <div class="badge" id="modeBadge">Mode: Pulse Rings</div>
          <div class="badge">Auto full screen after 10 seconds</div>
        </div>
        <canvas id="canvas"></canvas>
      </main>
    </div>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      const mode = document.getElementById("mode");
      const modeBadge = document.getElementById("modeBadge");
      const sensEl = document.getElementById("sens");
      const trailEl = document.getElementById("trail");
      const zoomEl = document.getElementById("zoom");

      const fileInput = document.getElementById("fileInput");
      const audioPlayer = document.getElementById("audioPlayer");
      const micBtn = document.getElementById("micBtn");
      const stopBtn = document.getElementById("stopBtn");
      const saveBtn = document.getElementById("saveBtn");

      const statusEl = document.getElementById("status");
      const volEl = document.getElementById("vol");
      const bassEl = document.getElementById("bass");
      const midEl = document.getElementById("mid");
      const trebleEl = document.getElementById("treble");

      let audioCtx;
      let analyser;
      let sourceNode;
      let micStream;
      let dataArray;
      let timeArray;
      let raf;
      let particles = [];

      function resizeCanvas() {
        const dpr = Math.max(1, window.devicePixelRatio || 1);
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function ensureAudio() {
        if (audioCtx) return;

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        analyser.smoothingTimeConstant = 0.82;

        dataArray = new Uint8Array(analyser.frequencyBinCount);
        timeArray = new Uint8Array(analyser.fftSize);
      }

      function disconnectCurrentSource() {
        if (sourceNode) {
          try {
            sourceNode.disconnect();
          } catch (e) {}
          sourceNode = null;
        }

        if (micStream) {
          micStream.getTracks().forEach((track) => track.stop());
          micStream = null;
        }

        audioPlayer.pause();
        audioPlayer.removeAttribute("src");
        audioPlayer.load();
        statusEl.textContent = "Idle";
      }

      function connectAnalyser(node) {
        node.connect(analyser);
        analyser.connect(audioCtx.destination);
      }

      function connectFileAudio(file) {
        ensureAudio();
        disconnectCurrentSource();

        const url = URL.createObjectURL(file);
        audioPlayer.src = url;
        audioPlayer.play().catch(() => {});
        sourceNode = audioCtx.createMediaElementSource(audioPlayer);
        connectAnalyser(sourceNode);

        statusEl.textContent = "Playing file";

        if (audioCtx.state === "suspended") {
          audioCtx.resume();
        }

        startViz();
      }

      async function connectMic() {
        ensureAudio();
        disconnectCurrentSource();

        try {
          micStream = await navigator.mediaDevices.getUserMedia({
            audio: true,
            video: false,
          });
          sourceNode = audioCtx.createMediaStreamSource(micStream);
          sourceNode.connect(analyser);
          statusEl.textContent = "Listening to microphone";

          if (audioCtx.state === "suspended") {
            await audioCtx.resume();
          }

          startViz();
        } catch (err) {
          statusEl.textContent = "Microphone blocked";
          alert("Microphone permission was blocked.");
        }
      }

      function avgRange(start, end) {
        let sum = 0;
        const len = Math.max(1, end - start);
        for (let i = start; i < end; i++) sum += dataArray[i] || 0;
        return sum / len;
      }

      function getMetrics() {
        if (!analyser) {
          return { volume: 0, bass: 0, mid: 0, treble: 0, waveform: [] };
        }

        analyser.getByteFrequencyData(dataArray);
        analyser.getByteTimeDomainData(timeArray);

        let volume = 0;
        for (let i = 0; i < dataArray.length; i++) volume += dataArray[i];
        volume /= dataArray.length;

        return {
          volume,
          bass: avgRange(0, 20),
          mid: avgRange(20, 100),
          treble: avgRange(100, 220),
          waveform: timeArray,
        };
      }

      function drawBackground(fade) {
        ctx.fillStyle = `rgba(4,10,24,${fade})`;
        ctx.fillRect(0, 0, canvas.clientWidth, canvas.clientHeight);
      }

      function drawRings(m) {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        const cx = w / 2;
        const cy = h / 2;
        const s = +sensEl.value;
        const z = +zoomEl.value;

        const energy = (m.volume * s) / 255;
        const bass = (m.bass * s) / 255;
        const treble = (m.treble * s) / 255;

        for (let i = 0; i < 7; i++) {
          const r = (50 + i * 26 + energy * 120 + bass * 90) * z;
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.strokeStyle = `hsla(${(Date.now() / 18 + i * 32) % 360}, 90%, ${60 + treble * 20}%, ${0.12 + i / 12})`;
          ctx.lineWidth = 2 + bass * 7;
          ctx.stroke();
        }
      }

      function drawWave(m) {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        const s = +sensEl.value;
        const z = +zoomEl.value;

        ctx.beginPath();
        for (let i = 0; i < m.waveform.length; i++) {
          const x = (i / (m.waveform.length - 1)) * w;
          const centered = (m.waveform[i] - 128) / 128;
          const y =
            h / 2 +
            centered * 180 * s * z +
            Math.sin(i * 0.04 + performance.now() * 0.003) * m.bass * 0.12;

          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }

        ctx.strokeStyle = `hsla(${(Date.now() / 25) % 360}, 100%, 70%, .9)`;
        ctx.lineWidth = 3;
        ctx.stroke();
      }

      function drawSpiral(m) {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        const cx = w / 2;
        const cy = h / 2;
        const s = +sensEl.value;
        const z = +zoomEl.value;

        ctx.beginPath();
        for (let i = 0; i < 220; i++) {
          const a = i * 0.16 + performance.now() * 0.0012;
          const r = i * 1.3 * z + m.volume * s * 0.35;
          const wobble =
            Math.sin(i * 0.18 + performance.now() * 0.004) * m.treble * 0.16;
          const x = cx + Math.cos(a) * (r + wobble);
          const y = cy + Math.sin(a) * (r + wobble);

          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }

        ctx.strokeStyle = `hsla(${(Date.now() / 20 + m.bass) % 360}, 100%, 68%, .85)`;
        ctx.lineWidth = 2.2 + (m.mid / 255) * 4;
        ctx.stroke();
      }

      function drawBars(m) {
        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        const cx = w / 2;
        const cy = h / 2;
        const z = +zoomEl.value;
        const bars = 120;
        const radius = Math.min(w, h) * 0.16 * z;

        for (let i = 0; i < bars; i++) {
          const angle = (i / bars) * Math.PI * 2;
          const val = dataArray[Math.floor((i / bars) * dataArray.length)] || 0;
          const len = 20 + (val / 255) * 160 * +sensEl.value;

          const x1 = cx + Math.cos(angle) * radius;
          const y1 = cy + Math.sin(angle) * radius;
          const x2 = cx + Math.cos(angle) * (radius + len);
          const y2 = cy + Math.sin(angle) * (radius + len);

          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.strokeStyle = `hsla(${(i * 3 + Date.now() / 30) % 360}, 100%, 70%, .8)`;
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      }

      function initParticles() {
        particles = Array.from({ length: 220 }, () => ({
          x: Math.random() * canvas.clientWidth,
          y: Math.random() * canvas.clientHeight,
          vx: (Math.random() - 0.5) * 2,
          vy: (Math.random() - 0.5) * 2,
          size: Math.random() * 3 + 1,
        }));
      }

      function drawParticles(m) {
        if (!particles.length) initParticles();

        const w = canvas.clientWidth;
        const h = canvas.clientHeight;
        const s = +sensEl.value;
        const push = (m.volume / 255) * 1.8 * s;
        const hue = (Date.now() / 24 + m.treble) % 360;

        particles.forEach((p, idx) => {
          const a = idx * 0.2 + performance.now() * 0.001 + m.bass * 0.01;

          p.vx += Math.cos(a) * 0.02 * push;
          p.vy += Math.sin(a) * 0.02 * push;
          p.x += p.vx;
          p.y += p.vy;
          p.vx *= 0.98;
          p.vy *= 0.98;

          if (p.x < 0) p.x = w;
          if (p.x > w) p.x = 0;
          if (p.y < 0) p.y = h;
          if (p.y > h) p.y = 0;

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size + push * 0.8, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${hue + idx * 0.7}, 100%, 70%, .65)`;
          ctx.fill();
        });
      }

      function render() {
        const m = getMetrics();

        volEl.textContent = Math.round(m.volume);
        bassEl.textContent = Math.round(m.bass);
        midEl.textContent = Math.round(m.mid);
        trebleEl.textContent = Math.round(m.treble);

        drawBackground(+trailEl.value);

        if (mode.value === "wave") drawWave(m);
        else if (mode.value === "spiral") drawSpiral(m);
        else if (mode.value === "bars") drawBars(m);
        else if (mode.value === "particles") drawParticles(m);
        else drawRings(m);

        raf = requestAnimationFrame(render);
      }

      function startViz() {
        cancelAnimationFrame(raf);
        render();
      }

      fileInput.addEventListener("change", (e) => {
        const f = e.target.files?.[0];
        if (f) connectFileAudio(f);
      });

      micBtn.addEventListener("click", connectMic);

      stopBtn.addEventListener("click", () => {
        disconnectCurrentSource();
        cancelAnimationFrame(raf);
      });

      mode.addEventListener("change", () => {
        modeBadge.textContent =
          "Mode: " + mode.options[mode.selectedIndex].text;
      });

      saveBtn.addEventListener("click", () => {
        const a = document.createElement("a");
        a.href = canvas.toDataURL("image/png");
        a.download = "visualizer-frame.png";
        a.click();
      });

      window.addEventListener("resize", () => {
        resizeCanvas();
        initParticles();
      });

      setTimeout(async () => {
          document.body.classList.add('full');
        try {
          const el = document.documentElement;
          if (el.requestFullscreen) await el.requestFullscreen();
        } catch (e) {}
      }, 10000);

      resizeCanvas();
      initParticles();
      drawBackground(1);
    </script>
  </body>
</html>
