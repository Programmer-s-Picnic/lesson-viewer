<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Redirecting...</title>
</head>
<body>
  <p>Redirecting...</p>

  <script>
    const ALLOWED_HOSTS = [
      "learnwithchampak.live",
      "www.learnwithchampak.live",
      "editor.learnwithchampak.live",
      "aiml.learnwithchampak.live",
      "angular.learnwithchampak.live"
    ];

    const params = new URLSearchParams(window.location.search);
    const link = params.get("link");

    function redirectSafely(link) {
      if (!link) {
        document.body.innerHTML = "<h2>No link parameter found.</h2>";
        return;
      }

      let url;

      try {
        url = new URL(link);
      } catch {
        document.body.innerHTML = "<h2>Invalid link.</h2>";
        return;
      }

      if (!["http:", "https:"].includes(url.protocol)) {
        document.body.innerHTML = "<h2>Only http and https links are allowed.</h2>";
        return;
      }

      if (!ALLOWED_HOSTS.includes(url.hostname)) {
        document.body.innerHTML = "<h2>This link is not allowed.</h2>";
        return;
      }

      window.location.href = url.href;
    }

    redirectSafely(link);
  </script>
</body>
</html>
