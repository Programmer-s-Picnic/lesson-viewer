<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Programmer's Picnic — Advanced Whiteboard</title>
    <meta
      name="description"
      content="A single-file advanced whiteboard with drawing, shapes, connectors, sticky notes, code blocks, undo/redo, PNG export, JSON save/load, and share links."
    />
    <style>
      :root {
        --bg: #fff8ef;
        --bg-2: #fff2d6;
        --panel: rgba(255, 255, 255, 0.82);
        --panel-strong: rgba(255, 255, 255, 0.94);
        --line: rgba(31, 35, 40, 0.12);
        --line-strong: rgba(31, 35, 40, 0.18);
        --ink: #1f2328;
        --muted: #5f6771;
        --saffron: #ff9f1c;
        --saffron-2: #ffb74d;
        --saffron-3: #f59e0b;
        --green: #2f7d4a;
        --red: #d94841;
        --blue: #2563eb;
        --shadow: 0 24px 60px rgba(31, 35, 40, 0.12);
        --shadow-soft: 0 12px 28px rgba(31, 35, 40, 0.1);
        --radius: 22px;
        --radius-lg: 28px;
        --sans: Inter, "DM Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }* {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    height: 100%;
  }

  body {
    font-family: var(--sans);
    color: var(--ink);
    background:
      radial-gradient(circle at top left, rgba(255, 159, 28, 0.22), transparent 35%),
      radial-gradient(circle at top right, rgba(255, 183, 77, 0.16), transparent 32%),
      linear-gradient(180deg, #fffdf8 0%, var(--bg) 58%, var(--bg-2) 100%);
    overflow: hidden;
  }

  button,
  input,
  select,
  textarea {
    font: inherit;
  }

  .app {
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100%;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    background: rgba(255, 248, 239, 0.78);
    backdrop-filter: blur(14px);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }

  .logo {
    width: 46px;
    height: 46px;
    border-radius: 16px;
    background: conic-gradient(from 210deg, var(--saffron), var(--saffron-2), #ffe0a6, var(--saffron));
    position: relative;
    box-shadow: 0 14px 30px rgba(255, 159, 28, 0.28);
    flex: 0 0 auto;
  }

  .logo::before {
    content: "";
    position: absolute;
    inset: 9px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.9);
    border: 1px solid rgba(31, 35, 40, 0.08);
  }

  .logo::after {
    content: "✎";
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    font-size: 18px;
    color: #9a5800;
    font-weight: 900;
  }

  .brand-copy h1 {
    margin: 0;
    font-size: 17px;
    line-height: 1.1;
  }

  .brand-copy p {
    margin: 4px 0 0;
    font-size: 12px;
    color: var(--muted);
  }

  .top-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .btn,
  .tool-btn,
  .swatch,
  .seg-btn {
    border: 1px solid rgba(31, 35, 40, 0.12);
    background: rgba(255, 255, 255, 0.84);
    color: var(--ink);
    border-radius: 999px;
    padding: 10px 14px;
    font-weight: 800;
    font-size: 13px;
    cursor: pointer;
    transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease, border-color 0.14s ease;
    box-shadow: 0 10px 24px rgba(31, 35, 40, 0.08);
  }

  .btn:hover,
  .tool-btn:hover,
  .swatch:hover,
  .seg-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 16px 28px rgba(31, 35, 40, 0.12);
  }

  .btn.primary {
    background: linear-gradient(180deg, rgba(255, 159, 28, 0.98), rgba(255, 183, 77, 0.98));
    color: #2b1c08;
    border-color: rgba(217, 119, 6, 0.24);
  }

  .btn.dark {
    background: #1f2328;
    color: #fff;
    border-color: #1f2328;
  }

  .main {
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: 0;
  }

  .sidebar {
    padding: 14px;
    border-right: 1px solid var(--line);
    overflow: auto;
    background: rgba(255, 255, 255, 0.28);
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow-soft);
    padding: 14px;
    margin-bottom: 12px;
  }

  .panel h2,
  .panel h3 {
    margin: 0 0 10px;
    font-size: 14px;
  }

  .panel p {
    margin: 0;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.5;
  }

  .tool-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .tool-btn.active,
  .seg-btn.active {
    background: rgba(255, 159, 28, 0.2);
    border-color: rgba(217, 119, 6, 0.22);
  }

  .seg {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .field {
    display: grid;
    gap: 6px;
    margin-top: 10px;
  }

  .field label {
    font-size: 12px;
    font-weight: 800;
  }

  .field input,
  .field textarea,
  .field select {
    width: 100%;
    border: 1px solid var(--line-strong);
    background: rgba(255, 255, 255, 0.9);
    border-radius: 14px;
    padding: 10px 12px;
    color: var(--ink);
    outline: none;
  }

  .field textarea {
    min-height: 88px;
    resize: vertical;
  }

  .row {
    display: flex;
    gap: 8px;
  }

  .row > * {
    flex: 1 1 0;
  }

  .swatches {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .swatch {
    width: 36px;
    height: 36px;
    min-width: 36px;
    padding: 0;
    border-radius: 50%;
  }

  .canvas-wrap {
    position: relative;
    min-width: 0;
    min-height: 0;
    overflow: hidden;
  }

  .canvas-stage {
    position: absolute;
    inset: 0;
  }

  #board {
    width: 100%;
    height: 100%;
    display: block;
    cursor: crosshair;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.06));
  }

  .statusbar {
    position: absolute;
    left: 16px;
    right: 16px;
    bottom: 16px;
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.86);
    border: 1px solid var(--line);
    box-shadow: var(--shadow-soft);
    backdrop-filter: blur(10px);
    font-size: 12px;
    color: var(--muted);
    pointer-events: none;
  }

  .hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
  }

  .kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 24px;
    height: 24px;
    padding: 0 7px;
    border-radius: 8px;
    border: 1px solid var(--line-strong);
    background: #fff;
    font-size: 11px;
    font-weight: 900;
    color: var(--ink);
  }

  .chip-list {
    display: grid;
    gap: 8px;
  }

  .template-btn {
    text-align: left;
    border-radius: 16px;
    padding: 12px;
    border: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.78);
    cursor: pointer;
    box-shadow: 0 10px 18px rgba(31, 35, 40, 0.06);
  }

  .template-btn b {
    display: block;
    font-size: 13px;
    margin-bottom: 4px;
  }

  .template-btn span {
    font-size: 12px;
    color: var(--muted);
  }

  @media (max-width: 980px) {
    .main {
      grid-template-columns: 1fr;
    }

    .sidebar {
      max-height: 42vh;
      border-right: 0;
      border-bottom: 1px solid var(--line);
    }
  }

  @media (max-width: 640px) {
    .topbar {
      align-items: flex-start;
      flex-direction: column;
    }

    .tool-grid {
      grid-template-columns: 1fr 1fr;
    }

    .statusbar {
      flex-direction: column;
    }
  }
</style>

  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="logo" aria-hidden="true"></div>
          <div class="brand-copy">
            <h1>Programmer's Picnic — Advanced Whiteboard</h1>
            <p>Single-file visual board with drawing, shapes, connectors, code blocks, share links, and export.</p>
          </div>
        </div>
        <div class="top-actions">
          <button class="btn" id="newBoardBtn">New</button>
          <button class="btn" id="undoBtn">Undo</button>
          <button class="btn" id="redoBtn">Redo</button>
          <button class="btn" id="saveJsonBtn">Save JSON</button>
          <button class="btn" id="loadJsonBtn">Load JSON</button>
          <button class="btn" id="shareBtn">Copy Share Link</button>
          <button class="btn primary" id="exportBtn">Export PNG</button>
          <input type="file" id="fileInput" accept="application/json" hidden />
        </div>
      </header><div class="main">
    <aside class="sidebar">
      <section class="panel">
        <h2>Tools</h2>
        <div class="tool-grid" id="toolButtons">
          <button class="tool-btn active" data-tool="select">Select</button>
          <button class="tool-btn" data-tool="pen">Pen</button>
          <button class="tool-btn" data-tool="rect">Rectangle</button>
          <button class="tool-btn" data-tool="ellipse">Ellipse</button>
          <button class="tool-btn" data-tool="diamond">Diamond</button>
          <button class="tool-btn" data-tool="line">Line</button>
          <button class="tool-btn" data-tool="arrow">Arrow</button>
          <button class="tool-btn" data-tool="text">Text</button>
          <button class="tool-btn" data-tool="sticky">Sticky</button>
          <button class="tool-btn" data-tool="code">Code</button>
        </div>
        <div class="hint">
          Hold <span class="kbd">Space</span> and drag to pan. Use <span class="kbd">Delete</span> to remove selected items.
        </div>
      </section>

      <section class="panel">
        <h3>Board</h3>
        <div class="seg">
          <button class="seg-btn" id="gridBtn">Grid</button>
          <button class="seg-btn" id="snapBtn">Snap</button>
        </div>
        <div class="field">
          <label for="zoomRange">Zoom</label>
          <input type="range" id="zoomRange" min="0.4" max="2" step="0.05" value="1" />
        </div>
        <div class="field">
          <label for="strokeWidth">Stroke width</label>
          <input type="range" id="strokeWidth" min="1" max="8" step="1" value="2" />
        </div>
      </section>

      <section class="panel">
        <h3>Colors</h3>
        <div class="field">
          <label for="strokeColor">Stroke</label>
          <input type="color" id="strokeColor" value="#1f2328" />
        </div>
        <div class="field">
          <label for="fillColor">Fill</label>
          <input type="color" id="fillColor" value="#fff6d8" />
        </div>
        <div class="swatches" id="swatches"></div>
      </section>

      <section class="panel">
        <h3>Selected item</h3>
        <div class="field">
          <label for="propText">Text / content</label>
          <textarea id="propText" placeholder="Edit text, sticky notes, or code block content"></textarea>
        </div>
        <div class="row">
          <div class="field">
            <label for="propWidth">Width</label>
            <input id="propWidth" type="number" min="20" step="10" />
          </div>
          <div class="field">
            <label for="propHeight">Height</label>
            <input id="propHeight" type="number" min="20" step="10" />
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label for="propFont">Font size</label>
            <input id="propFont" type="number" min="10" max="40" step="1" />
          </div>
          <div class="field">
            <label for="propRadius">Radius</label>
            <input id="propRadius" type="number" min="0" max="32" step="1" />
          </div>
        </div>
        <div class="row">
          <button class="btn" id="bringFrontBtn">Bring front</button>
          <button class="btn" id="sendBackBtn">Send back</button>
        </div>
      </section>

      <section class="panel">
        <h3>CS templates</h3>
        <div class="chip-list">
          <button class="template-btn" data-template="flowchart">
            <b>Flowchart starter</b>
            <span>Start, process, decision, end.</span>
          </button>
          <button class="template-btn" data-template="stack">
            <b>Stack diagram</b>
            <span>Push/pop blocks with labels.</span>
          </button>
          <button class="template-btn" data-template="tree">
            <b>Binary tree</b>
            <span>Simple parent-child layout.</span>
          </button>
          <button class="template-btn" data-template="system">
            <b>System design</b>
            <span>Client, API, DB, cache sketch.</span>
          </button>
        </div>
      </section>
    </aside>

    <section class="canvas-wrap">
      <div class="canvas-stage">
        <canvas id="board"></canvas>
        <div class="statusbar">
          <div id="statusLeft">Tool: Select</div>
          <div id="statusCenter">0 items</div>
          <div id="statusRight">100% zoom</div>
        </div>
      </div>
    </section>
  </div>
</div>

<script>
  const canvas = document.getElementById("board");
  const ctx = canvas.getContext("2d");
  const stage = canvas.parentElement;

  const state = {
    items: [],
    tool: "select",
    stroke: "#1f2328",
    fill: "#fff6d8",
    strokeWidth: 2,
    zoom: 1,
    panX: 0,
    panY: 0,
    showGrid: false,
    snap: false,
    selectedId: null,
    hoveredId: null,
    dragOffsetX: 0,
    dragOffsetY: 0,
    drawing: false,
    panning: false,
    resizeHandle: null,
    history: [],
    future: [],
    temp: null,
    penCurrent: null,
    pointerStart: null,
    spaceDown: false,
    colors: ["#1f2328", "#ff9f1c", "#2563eb", "#2f7d4a", "#d94841", "#7c3aed", "#0f766e", "#111827"],
  };

  const els = {
    toolButtons: [...document.querySelectorAll("[data-tool]")],
    gridBtn: document.getElementById("gridBtn"),
    snapBtn: document.getElementById("snapBtn"),
    zoomRange: document.getElementById("zoomRange"),
    strokeWidth: document.getElementById("strokeWidth"),
    strokeColor: document.getElementById("strokeColor"),
    fillColor: document.getElementById("fillColor"),
    statusLeft: document.getElementById("statusLeft"),
    statusCenter: document.getElementById("statusCenter"),
    statusRight: document.getElementById("statusRight"),
    undoBtn: document.getElementById("undoBtn"),
    redoBtn: document.getElementById("redoBtn"),
    newBoardBtn: document.getElementById("newBoardBtn"),
    exportBtn: document.getElementById("exportBtn"),
    saveJsonBtn: document.getElementById("saveJsonBtn"),
    loadJsonBtn: document.getElementById("loadJsonBtn"),
    shareBtn: document.getElementById("shareBtn"),
    fileInput: document.getElementById("fileInput"),
    propText: document.getElementById("propText"),
    propWidth: document.getElementById("propWidth"),
    propHeight: document.getElementById("propHeight"),
    propFont: document.getElementById("propFont"),
    propRadius: document.getElementById("propRadius"),
    bringFrontBtn: document.getElementById("bringFrontBtn"),
    sendBackBtn: document.getElementById("sendBackBtn"),
    swatches: document.getElementById("swatches"),
    templateButtons: [...document.querySelectorAll("[data-template]")],
  };

  function uid() {
    return "i_" + Math.random().toString(36).slice(2, 10);
  }

  function clone(obj) {
    return JSON.parse(JSON.stringify(obj));
  }

  function saveHistory() {
    state.history.push(clone(state.items));
    if (state.history.length > 80) state.history.shift();
    state.future = [];
  }

  function setTool(tool) {
    state.tool = tool;
    els.toolButtons.forEach((b) => b.classList.toggle("active", b.dataset.tool === tool));
    updateStatus();
  }

  function updateStatus() {
    els.statusLeft.textContent = `Tool: ${state.tool.charAt(0).toUpperCase() + state.tool.slice(1)}`;
    els.statusCenter.textContent = `${state.items.length} item${state.items.length === 1 ? "" : "s"}`;
    els.statusRight.textContent = `${Math.round(state.zoom * 100)}% zoom`;
    els.gridBtn.classList.toggle("active", state.showGrid);
    els.snapBtn.classList.toggle("active", state.snap);
  }

  function resizeCanvas() {
    const rect = stage.getBoundingClientRect();
    const ratio = window.devicePixelRatio || 1;
    canvas.width = rect.width * ratio;
    canvas.height = rect.height * ratio;
    canvas.style.width = rect.width + "px";
    canvas.style.height = rect.height + "px";
    ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    render();
  }

  function worldToScreen(x, y) {
    return { x: x * state.zoom + state.panX, y: y * state.zoom + state.panY };
  }

  function screenToWorld(x, y) {
    return { x: (x - state.panX) / state.zoom, y: (y - state.panY) / state.zoom };
  }

  function snap(v) {
    return state.snap ? Math.round(v / 20) * 20 : v;
  }

  function pointInRect(px, py, item) {
    return px >= item.x && py >= item.y && px <= item.x + item.w && py <= item.y + item.h;
  }

  function pointInEllipse(px, py, item) {
    const rx = item.w / 2;
    const ry = item.h / 2;
    const cx = item.x + rx;
    const cy = item.y + ry;
    return (((px - cx) * (px - cx)) / (rx * rx || 1) + ((py - cy) * (py - cy)) / (ry * ry || 1)) <= 1;
  }

  function pointInDiamond(px, py, item) {
    const cx = item.x + item.w / 2;
    const cy = item.y + item.h / 2;
    const dx = Math.abs(px - cx) / (item.w / 2 || 1);
    const dy = Math.abs(py - cy) / (item.h / 2 || 1);
    return dx + dy <= 1;
  }

  function distToSegment(px, py, x1, y1, x2, y2) {
    const A = px - x1;
    const B = py - y1;
    const C = x2 - x1;
    const D = y2 - y1;
    const dot = A * C + B * D;
    const lenSq = C * C + D * D;
    let t = lenSq ? dot / lenSq : -1;
    t = Math.max(0, Math.min(1, t));
    const ex = x1 + t * C;
    const ey = y1 + t * D;
    return Math.hypot(px - ex, py - ey);
  }

  function hitTest(worldX, worldY) {
    for (let i = state.items.length - 1; i >= 0; i--) {
      const item = state.items[i];
      if (item.type === "pen") {
        for (let p = 1; p < item.points.length; p++) {
          const a = item.points[p - 1];
          const b = item.points[p];
          if (distToSegment(worldX, worldY, a.x, a.y, b.x, b.y) <= 8) return item;
        }
      } else if (item.type === "line" || item.type === "arrow") {
        if (distToSegment(worldX, worldY, item.x, item.y, item.x2, item.y2) <= 8) return item;
      } else if (item.type === "ellipse") {
        if (pointInEllipse(worldX, worldY, item)) return item;
      } else if (item.type === "diamond") {
        if (pointInDiamond(worldX, worldY, item)) return item;
      } else {
        if (pointInRect(worldX, worldY, item)) return item;
      }
    }
    return null;
  }

  function normalizeRect(x1, y1, x2, y2) {
    const x = Math.min(x1, x2);
    const y = Math.min(y1, y2);
    const w = Math.abs(x2 - x1);
    const h = Math.abs(y2 - y1);
    return { x, y, w, h };
  }

  function drawRoundRect(x, y, w, h, r) {
    const radius = Math.max(0, Math.min(r, Math.min(w, h) / 2));
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.arcTo(x + w, y, x + w, y + h, radius);
    ctx.arcTo(x + w, y + h, x, y + h, radius);
    ctx.arcTo(x, y + h, x, y, radius);
    ctx.arcTo(x, y, x + w, y, radius);
    ctx.closePath();
  }

  function drawArrowHead(x1, y1, x2, y2, size) {
    const angle = Math.atan2(y2 - y1, x2 - x1);
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - size * Math.cos(angle - Math.PI / 6), y2 - size * Math.sin(angle - Math.PI / 6));
    ctx.lineTo(x2 - size * Math.cos(angle + Math.PI / 6), y2 - size * Math.sin(angle + Math.PI / 6));
    ctx.closePath();
    ctx.fill();
  }

  function drawTextBlock(item, bg, fontFamily) {
    if (bg) {
      ctx.fillStyle = item.fill || "#fff6d8";
      drawRoundRect(item.x, item.y, item.w, item.h, item.radius || 14);
      ctx.fill();
      ctx.strokeStyle = item.stroke || "#1f2328";
      ctx.lineWidth = item.strokeWidth || 2;
      ctx.stroke();
    }
    ctx.fillStyle = item.stroke || "#1f2328";
    ctx.font = `${item.fontSize || 18}px ${fontFamily}`;
    ctx.textBaseline = "top";
    const lines = wrapLines(item.text || "", item.w - 20, fontFamily, item.fontSize || 18);
    let yy = item.y + 12;
    for (const line of lines) {
      ctx.fillText(line, item.x + 10, yy);
      yy += (item.fontSize || 18) * 1.35;
    }
  }

  function wrapLines(text, maxWidth, family, size) {
    ctx.save();
    ctx.font = `${size}px ${family}`;
    const paragraphs = String(text).split("\n");
    const out = [];
    for (const para of paragraphs) {
      const words = para.split(" ");
      let line = "";
      for (const word of words) {
        const test = line ? line + " " + word : word;
        if (ctx.measureText(test).width > maxWidth && line) {
          out.push(line);
          line = word;
        } else {
          line = test;
        }
      }
      out.push(line);
    }
    ctx.restore();
    return out;
  }

  function renderItem(item) {
    ctx.save();
    ctx.strokeStyle = item.stroke || state.stroke;
    ctx.fillStyle = item.fill || state.fill;
    ctx.lineWidth = item.strokeWidth || 2;
    ctx.lineJoin = "round";
    ctx.lineCap = "round";

    if (item.type === "rect") {
      drawRoundRect(item.x, item.y, item.w, item.h, item.radius || 14);
      ctx.fill();
      ctx.stroke();
    } else if (item.type === "ellipse") {
      ctx.beginPath();
      ctx.ellipse(item.x + item.w / 2, item.y + item.h / 2, Math.abs(item.w / 2), Math.abs(item.h / 2), 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    } else if (item.type === "diamond") {
      ctx.beginPath();
      ctx.moveTo(item.x + item.w / 2, item.y);
      ctx.lineTo(item.x + item.w, item.y + item.h / 2);
      ctx.lineTo(item.x + item.w / 2, item.y + item.h);
      ctx.lineTo(item.x, item.y + item.h / 2);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    } else if (item.type === "line" || item.type === "arrow") {
      ctx.beginPath();
      ctx.moveTo(item.x, item.y);
      ctx.lineTo(item.x2, item.y2);
      ctx.stroke();
      if (item.type === "arrow") {
        ctx.fillStyle = item.stroke || state.stroke;
        drawArrowHead(item.x, item.y, item.x2, item.y2, 14);
      }
    } else if (item.type === "pen") {
      if (item.points.length > 1) {
        ctx.beginPath();
        ctx.moveTo(item.points[0].x, item.points[0].y);
        for (let i = 1; i < item.points.length; i++) ctx.lineTo(item.points[i].x, item.points[i].y);
        ctx.stroke();
      }
    } else if (item.type === "text") {
      drawTextBlock(item, false, "Inter, sans-serif");
    } else if (item.type === "sticky") {
      drawTextBlock(item, true, "Inter, sans-serif");
      ctx.fillStyle = "rgba(255,255,255,0.42)";
      ctx.beginPath();
      ctx.moveTo(item.x + item.w - 24, item.y);
      ctx.lineTo(item.x + item.w, item.y + 24);
      ctx.lineTo(item.x + item.w, item.y);
      ctx.closePath();
      ctx.fill();
    } else if (item.type === "code") {
      drawRoundRect(item.x, item.y, item.w, item.h, item.radius || 16);
      ctx.fillStyle = item.fill || "#111827";
      ctx.fill();
      ctx.strokeStyle = item.stroke || "#e5e7eb";
      ctx.stroke();
      ctx.fillStyle = "#d1d5db";
      ctx.font = `${item.fontSize || 15}px ${getComputedStyle(document.documentElement).getPropertyValue("--mono")}`;
      ctx.textBaseline = "top";
      const lines = String(item.text || "").split("\n");
      let yy = item.y + 12;
      for (const line of lines) {
        ctx.fillText(line, item.x + 12, yy);
        yy += (item.fontSize || 15) * 1.45;
      }
    }

    if (item.id === state.selectedId) {
      drawSelection(item);
    }
    ctx.restore();
  }

  function getBounds(item) {
    if (item.type === "line" || item.type === "arrow") {
      return { x: Math.min(item.x, item.x2), y: Math.min(item.y, item.y2), w: Math.abs(item.x2 - item.x), h: Math.abs(item.y2 - item.y) };
    }
    if (item.type === "pen") {
      const xs = item.points.map((p) => p.x);
      const ys = item.points.map((p) => p.y);
      return { x: Math.min(...xs), y: Math.min(...ys), w: Math.max(...xs) - Math.min(...xs), h: Math.max(...ys) - Math.min(...ys) };
    }
    return { x: item.x, y: item.y, w: item.w, h: item.h };
  }

  function drawSelection(item) {
    const b = getBounds(item);
    ctx.save();
    ctx.setLineDash([6, 6]);
    ctx.strokeStyle = "#2563eb";
    ctx.lineWidth = 1.5;
    ctx.strokeRect(b.x - 6, b.y - 6, b.w + 12, b.h + 12);
    ctx.setLineDash([]);
    const handle = { x: b.x + b.w + 6, y: b.y + b.h + 6 };
    ctx.fillStyle = "#2563eb";
    ctx.beginPath();
    ctx.arc(handle.x, handle.y, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawGrid() {
    if (!state.showGrid) return;
    const rect = canvas.getBoundingClientRect();
    const step = 20 * state.zoom;
    ctx.save();
    ctx.strokeStyle = "rgba(31, 35, 40, 0.08)";
    ctx.lineWidth = 1;
    for (let x = state.panX % step; x < rect.width; x += step) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, rect.height);
      ctx.stroke();
    }
    for (let y = state.panY % step; y < rect.height; y += step) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(rect.width, y);
      ctx.stroke();
    }
    ctx.restore();
  }

  function render() {
    const rect = canvas.getBoundingClientRect();
    ctx.clearRect(0, 0, rect.width, rect.height);
    drawGrid();
    ctx.save();
    ctx.translate(state.panX, state.panY);
    ctx.scale(state.zoom, state.zoom);
    for (const item of state.items) renderItem(item);
    if (state.temp) renderItem(state.temp);
    ctx.restore();
    updateStatus();
    syncProps();
  }

  function pointerPos(evt) {
    const r = canvas.getBoundingClientRect();
    return { x: evt.clientX - r.left, y: evt.clientY - r.top };
  }

  function getResizeHandle(item, worldX, worldY) {
    if (!item || item.type === "pen") return null;
    const b = getBounds(item);
    const hx = b.x + b.w + 6;
    const hy = b.y + b.h + 6;
    if (Math.hypot(worldX - hx, worldY - hy) <= 10) return "se";
    return null;
  }

  canvas.addEventListener("pointerdown", (evt) => {
    canvas.setPointerCapture(evt.pointerId);
    const pos = pointerPos(evt);
    const world = screenToWorld(pos.x, pos.y);
    state.pointerStart = { screenX: pos.x, screenY: pos.y, worldX: world.x, worldY: world.y };

    if (state.spaceDown) {
      state.panning = true;
      return;
    }

    const hit = hitTest(world.x, world.y);

    if (state.tool === "select") {
      state.selectedId = hit ? hit.id : null;
      const selected = state.items.find((i) => i.id === state.selectedId);
      state.resizeHandle = selected ? getResizeHandle(selected, world.x, world.y) : null;
      if (selected && state.resizeHandle) {
        saveHistory();
        state.drawing = true;
      } else if (hit) {
        saveHistory();
        state.drawing = true;
        const b = getBounds(hit);
        state.dragOffsetX = world.x - b.x;
        state.dragOffsetY = world.y - b.y;
      }
      render();
      return;
    }

    saveHistory();
    state.drawing = true;

    if (state.tool === "pen") {
      state.penCurrent = {
        id: uid(),
        type: "pen",
        stroke: state.stroke,
        strokeWidth: state.strokeWidth,
        points: [{ x: world.x, y: world.y }],
      };
      state.temp = state.penCurrent;
      return;
    }

    if (state.tool === "text") {
      const text = prompt("Enter text", "New text") || "Text";
      state.items.push({
        id: uid(),
        type: "text",
        x: snap(world.x),
        y: snap(world.y),
        w: 220,
        h: 90,
        text,
        stroke: state.stroke,
        fill: state.fill,
        fontSize: 20,
        radius: 0,
        strokeWidth: 1,
      });
      state.drawing = false;
      render();
      return;
    }

    if (state.tool === "sticky") {
      const text = prompt("Sticky note text", "Idea") || "Idea";
      state.items.push({
        id: uid(),
        type: "sticky",
        x: snap(world.x),
        y: snap(world.y),
        w: 220,
        h: 150,
        text,
        stroke: "#7a4a00",
        fill: "#ffe082",
        fontSize: 18,
        radius: 16,
        strokeWidth: 2,
      });
      state.drawing = false;
      render();
      return;
    }

    if (state.tool === "code") {
      const text = prompt("Code block content", "for i in range(5):\n    print(i)") || "code";
      state.items.push({
        id: uid(),
        type: "code",
        x: snap(world.x),
        y: snap(world.y),
        w: 320,
        h: 160,
        text,
        stroke: "#e5e7eb",
        fill: "#111827",
        fontSize: 15,
        radius: 16,
        strokeWidth: 1,
      });
      state.drawing = false;
      render();
      return;
    }

    if (state.tool === "line" || state.tool === "arrow") {
      state.temp = {
        id: uid(),
        type: state.tool,
        x: snap(world.x),
        y: snap(world.y),
        x2: snap(world.x),
        y2: snap(world.y),
        stroke: state.stroke,
        fill: state.fill,
        strokeWidth: state.strokeWidth,
      };
      return;
    }

    state.temp = {
      id: uid(),
      type: state.tool,
      x: snap(world.x),
      y: snap(world.y),
      w: 0,
      h: 0,
      stroke: state.stroke,
      fill: state.fill,
      strokeWidth: state.strokeWidth,
      radius: 16,
    };
  });

  canvas.addEventListener("pointermove", (evt) => {
    const pos = pointerPos(evt);
    const world = screenToWorld(pos.x, pos.y);

    if (state.panning && state.pointerStart) {
      state.panX += pos.x - state.pointerStart.screenX;
      state.panY += pos.y - state.pointerStart.screenY;
      state.pointerStart.screenX = pos.x;
      state.pointerStart.screenY = pos.y;
      render();
      return;
    }

    if (!state.drawing) {
      state.hoveredId = hitTest(world.x, world.y)?.id || null;
      return;
    }

    if (state.tool === "select") {
      const item = state.items.find((i) => i.id === state.selectedId);
      if (!item) return;
      if (state.resizeHandle === "se") {
        const b = getBounds(item);
        const nw = Math.max(24, snap(world.x) - b.x);
        const nh = Math.max(24, snap(world.y) - b.y);
        if (item.type === "line" || item.type === "arrow") {
          item.x2 = item.x + nw;
          item.y2 = item.y + nh;
        } else {
          item.w = nw;
          item.h = nh;
        }
      } else {
        if (item.type === "line" || item.type === "arrow") {
          const dx = snap(world.x - state.dragOffsetX) - Math.min(item.x, item.x2);
          const dy = snap(world.y - state.dragOffsetY) - Math.min(item.y, item.y2);
          item.x += dx;
          item.x2 += dx;
          item.y += dy;
          item.y2 += dy;
        } else if (item.type === "pen") {
          const b = getBounds(item);
          const targetX = snap(world.x - state.dragOffsetX);
          const targetY = snap(world.y - state.dragOffsetY);
          const dx = targetX - b.x;
          const dy = targetY - b.y;
          item.points.forEach((p) => {
            p.x += dx;
            p.y += dy;
          });
        } else {
          item.x = snap(world.x - state.dragOffsetX);
          item.y = snap(world.y - state.dragOffsetY);
        }
      }
      render();
      return;
    }

    if (state.tool === "pen" && state.penCurrent) {
      state.penCurrent.points.push({ x: world.x, y: world.y });
      render();
      return;
    }

    if (state.tool === "line" || state.tool === "arrow") {
      state.temp.x2 = snap(world.x);
      state.temp.y2 = snap(world.y);
      render();
      return;
    }

    if (state.temp) {
      const n = normalizeRect(state.pointerStart.worldX, state.pointerStart.worldY, snap(world.x), snap(world.y));
      state.temp.x = n.x;
      state.temp.y = n.y;
      state.temp.w = Math.max(8, n.w);
      state.temp.h = Math.max(8, n.h);
      render();
    }
  });

  function finishPointer() {
    if (state.panning) {
      state.panning = false;
      return;
    }
    if (!state.drawing) return;

    if (state.tool === "select") {
      state.drawing = false;
      state.resizeHandle = null;
      render();
      return;
    }

    if (state.tool === "pen" && state.penCurrent) {
      if (state.penCurrent.points.length > 1) state.items.push(clone(state.penCurrent));
      state.penCurrent = null;
      state.temp = null;
      state.drawing = false;
      render();
      return;
    }

    if (state.temp) {
      if (state.tool === "line" || state.tool === "arrow") {
        if (Math.hypot(state.temp.x2 - state.temp.x, state.temp.y2 - state.temp.y) > 4) state.items.push(clone(state.temp));
      } else if (state.temp.w > 10 && state.temp.h > 10) {
        state.items.push(clone(state.temp));
      }
      state.temp = null;
    }

    state.drawing = false;
    render();
  }

  canvas.addEventListener("pointerup", finishPointer);
  canvas.addEventListener("pointercancel", finishPointer);
  canvas.addEventListener("wheel", (evt) => {
    evt.preventDefault();
    const factor = evt.deltaY < 0 ? 1.08 : 0.92;
    state.zoom = Math.max(0.4, Math.min(2, state.zoom * factor));
    els.zoomRange.value = state.zoom;
    render();
  }, { passive: false });

  document.addEventListener("keydown", (evt) => {
    if (evt.code === "Space") state.spaceDown = true;
    if ((evt.ctrlKey || evt.metaKey) && evt.key.toLowerCase() === "z") {
      evt.preventDefault();
      undo();
    }
    if ((evt.ctrlKey || evt.metaKey) && evt.key.toLowerCase() === "y") {
      evt.preventDefault();
      redo();
    }
    if (evt.key === "Delete" || evt.key === "Backspace") {
      const tag = document.activeElement?.tagName;
      if (tag === "INPUT" || tag === "TEXTAREA") return;
      removeSelected();
    }
  });

  document.addEventListener("keyup", (evt) => {
    if (evt.code === "Space") state.spaceDown = false;
  });

  function undo() {
    if (!state.history.length) return;
    state.future.push(clone(state.items));
    state.items = state.history.pop();
    state.selectedId = null;
    render();
  }

  function redo() {
    if (!state.future.length) return;
    state.history.push(clone(state.items));
    state.items = state.future.pop();
    state.selectedId = null;
    render();
  }

  function removeSelected() {
    if (!state.selectedId) return;
    saveHistory();
    state.items = state.items.filter((item) => item.id !== state.selectedId);
    state.selectedId = null;
    render();
  }

  function syncProps() {
    const item = state.items.find((i) => i.id === state.selectedId);
    els.propText.value = item?.text || "";
    els.propWidth.value = item?.w ?? "";
    els.propHeight.value = item?.h ?? "";
    els.propFont.value = item?.fontSize ?? "";
    els.propRadius.value = item?.radius ?? "";
  }

  function applyProps() {
    const item = state.items.find((i) => i.id === state.selectedId);
    if (!item) return;
    if ("text" in item) item.text = els.propText.value;
    if ("w" in item && els.propWidth.value) item.w = Math.max(20, Number(els.propWidth.value));
    if ("h" in item && els.propHeight.value) item.h = Math.max(20, Number(els.propHeight.value));
    if (els.propFont.value) item.fontSize = Number(els.propFont.value);
    if (els.propRadius.value) item.radius = Number(els.propRadius.value);
    render();
  }

  function bringFront() {
    const index = state.items.findIndex((i) => i.id === state.selectedId);
    if (index < 0) return;
    saveHistory();
    const [item] = state.items.splice(index, 1);
    state.items.push(item);
    render();
  }

  function sendBack() {
    const index = state.items.findIndex((i) => i.id === state.selectedId);
    if (index < 0) return;
    saveHistory();
    const [item] = state.items.splice(index, 1);
    state.items.unshift(item);
    render();
  }

  function saveJson() {
    const data = {
      version: 1,
      zoom: state.zoom,
      panX: state.panX,
      panY: state.panY,
      showGrid: state.showGrid,
      snap: state.snap,
      items: state.items,
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "pp-whiteboard.json";
    a.click();
    URL.revokeObjectURL(url);
  }

  function loadFromData(data) {
    if (!data || !Array.isArray(data.items)) return;
    state.items = data.items;
    state.zoom = data.zoom || 1;
    state.panX = data.panX || 0;
    state.panY = data.panY || 0;
    state.showGrid = !!data.showGrid;
    state.snap = !!data.snap;
    els.zoomRange.value = state.zoom;
    state.selectedId = null;
    render();
  }

  function loadJsonFile(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        loadFromData(data);
      } catch {
        alert("Invalid JSON file.");
      }
    };
    reader.readAsText(file);
  }

  function exportPNG() {
    state.selectedId = null;
    render();
    const url = canvas.toDataURL("image/png");
    const a = document.createElement("a");
    a.href = url;
    a.download = "pp-whiteboard.png";
    a.click();
  }

  function copyShareLink() {
    const data = {
      version: 1,
      zoom: state.zoom,
      panX: state.panX,
      panY: state.panY,
      showGrid: state.showGrid,
      snap: state.snap,
      items: state.items,
    };
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
    const url = location.origin + location.pathname + "#data=" + encoded;
    navigator.clipboard.writeText(url).then(() => alert("Share link copied."));
  }

  function loadFromHash() {
    const hash = location.hash || "";
    const match = hash.match(/data=(.*)$/);
    if (!match) return;
    try {
      const json = decodeURIComponent(escape(atob(match[1])));
      loadFromData(JSON.parse(json));
    } catch {
      console.warn("Could not load board from hash.");
    }
  }

  function addTemplate(name) {
    saveHistory();
    const baseX = 120;
    const baseY = 100;
    if (name === "flowchart") {
      state.items.push(
        { id: uid(), type: "ellipse", x: baseX + 120, y: baseY, w: 180, h: 70, text: "", stroke: "#1f2328", fill: "#fff1c7", strokeWidth: 2, radius: 16 },
        { id: uid(), type: "text", x: baseX + 175, y: baseY + 22, w: 100, h: 30, text: "Start", stroke: "#1f2328", fill: "#fff", fontSize: 20, radius: 0, strokeWidth: 1 },
        { id: uid(), type: "rect", x: baseX + 120, y: baseY + 140, w: 180, h: 80, text: "", stroke: "#1f2328", fill: "#e0f2fe", strokeWidth: 2, radius: 16 },
        { id: uid(), type: "text", x: baseX + 148, y: baseY + 168, w: 130, h: 30, text: "Process", stroke: "#1f2328", fill: "#fff", fontSize: 20, radius: 0, strokeWidth: 1 },
        { id: uid(), type: "diamond", x: baseX + 115, y: baseY + 290, w: 190, h: 110, text: "", stroke: "#1f2328", fill: "#fde68a", strokeWidth: 2, radius: 0 },
        { id: uid(), type: "text", x: baseX + 175, y: baseY + 330, w: 90, h: 30, text: "Check?", stroke: "#1f2328", fill: "#fff", fontSize: 18, radius: 0, strokeWidth: 1 },
        { id: uid(), type: "arrow", x: baseX + 210, y: baseY + 70, x2: baseX + 210, y2: baseY + 140, stroke: "#1f2328", strokeWidth: 2 },
        { id: uid(), type: "arrow", x: baseX + 210, y: baseY + 220, x2: baseX + 210, y2: baseY + 290, stroke: "#1f2328", strokeWidth: 2 }
      );
    } else if (name === "stack") {
      for (let i = 0; i < 4; i++) {
        state.items.push({ id: uid(), type: "rect", x: baseX + 130, y: baseY + 220 - i * 70, w: 180, h: 58, stroke: "#1f2328", fill: ["#fee2e2", "#fde68a", "#dbeafe", "#dcfce7"][i], strokeWidth: 2, radius: 12 });
        state.items.push({ id: uid(), type: "text", x: baseX + 190, y: baseY + 238 - i * 70, w: 100, h: 20, text: "Item " + (i + 1), stroke: "#1f2328", fontSize: 18 });
      }
      state.items.push({ id: uid(), type: "text", x: baseX + 150, y: baseY - 70, w: 150, h: 24, text: "Stack Top", stroke: "#1f2328", fontSize: 20 });
      state.items.push({ id: uid(), type: "arrow", x: baseX + 220, y: baseY - 26, x2: baseX + 220, y2: baseY + 8, stroke: "#1f2328", strokeWidth: 2 });
    } else if (name === "tree") {
      const nodes = [
        { x: 280, y: 90, label: "8" },

        { x: 240, y: 330, label: "6" },
        { x: 340, y: 330, label: "10" },

      ];
      const links = [[0,1],[0,2],[1,3],[1,4],[2,5],[2,6]];
      links.forEach(([a,b]) => state.items.push({ id: uid(), type: "line", x: nodes[a].x, y: nodes[a].y, x2: nodes[b].x, y2: nodes[b].y, stroke: "#1f2328", strokeWidth: 2 }));
      nodes.forEach((n) => {
        state.items.push({ id: uid(), type: "ellipse", x: n.x - 36, y: n.y - 30, w: 72, h: 60, stroke: "#1f2328", fill: "#fff1c7", strokeWidth: 2 });
        state.items.push({ id: uid(), type: "text", x: n.x - 10, y: n.y - 11, w: 24, h: 20, text: n.label, stroke: "#1f2328", fontSize: 20 });
      });
    } else if (name === "system") {
      state.items.push(
        { id: uid(), type: "rect", x: 80, y: 150, w: 180, h: 90, stroke: "#1f2328", fill: "#dbeafe", strokeWidth: 2, radius: 16 },
        { id: uid(), type: "text", x: 130, y: 182, w: 100, h: 30, text: "Client", stroke: "#1f2328", fontSize: 22 },
        { id: uid(), type: "rect", x: 350, y: 150, w: 220, h: 90, stroke: "#1f2328", fill: "#dcfce7", strokeWidth: 2, radius: 16 },
        { id: uid(), type: "text", x: 415, y: 182, w: 120, h: 30, text: "API Server", stroke: "#1f2328", fontSize: 22 },
        { id: uid(), type: "rect", x: 670, y: 80, w: 180, h: 90, stroke: "#1f2328", fill: "#fde68a", strokeWidth: 2, radius: 16 },
        { id: uid(), type: "text", x: 726, y: 112, w: 100, h: 30, text: "Cache", stroke: "#1f2328", fontSize: 22 },
        { id: uid(), type: "rect", x: 670, y: 240, w: 180, h: 90, stroke: "#1f2328", fill: "#fee2e2", strokeWidth: 2, radius: 16 },
        { id: uid(), type: "text", x: 706, y: 272, w: 120, h: 30, text: "Database", stroke: "#1f2328", fontSize: 22 },
        { id: uid(), type: "arrow", x: 260, y: 195, x2: 350, y2: 195, stroke: "#1f2328", strokeWidth: 2 },
        { id: uid(), type: "arrow", x: 570, y: 180, x2: 670, y2: 125, stroke: "#1f2328", strokeWidth: 2 },
        { id: uid(), type: "arrow", x: 570, y: 210, x2: 670, y2: 285, stroke: "#1f2328", strokeWidth: 2 }
      );
    }
    render();
  }

  els.toolButtons.forEach((btn) => btn.addEventListener("click", () => setTool(btn.dataset.tool)));
  els.gridBtn.addEventListener("click", () => { state.showGrid = !state.showGrid; render(); });
  els.snapBtn.addEventListener("click", () => { state.snap = !state.snap; render(); });
  els.zoomRange.addEventListener("input", () => { state.zoom = Number(els.zoomRange.value); render(); });
  els.strokeWidth.addEventListener("input", () => { state.strokeWidth = Number(els.strokeWidth.value); });
  els.strokeColor.addEventListener("input", () => { state.stroke = els.strokeColor.value; });
  els.fillColor.addEventListener("input", () => { state.fill = els.fillColor.value; });
  els.undoBtn.addEventListener("click", undo);
  els.redoBtn.addEventListener("click", redo);
  els.newBoardBtn.addEventListener("click", () => {
    if (!confirm("Clear the board?")) return;
    saveHistory();
    state.items = [];
    state.selectedId = null;
    state.panX = 0;
    state.panY = 0;
    state.zoom = 1;
    els.zoomRange.value = 1;
    render();
  });
  els.exportBtn.addEventListener("click", exportPNG);
  els.saveJsonBtn.addEventListener("click", saveJson);
  els.loadJsonBtn.addEventListener("click", () => els.fileInput.click());
  els.fileInput.addEventListener("change", (e) => {
    const file = e.target.files?.[0];
    if (file) loadJsonFile(file);
    e.target.value = "";
  });
  els.shareBtn.addEventListener("click", copyShareLink);
  [els.propText, els.propWidth, els.propHeight, els.propFont, els.propRadius].forEach((el) => el.addEventListener("input", applyProps));
  els.bringFrontBtn.addEventListener("click", bringFront);
  els.sendBackBtn.addEventListener("click", sendBack);
  els.templateButtons.forEach((btn) => btn.addEventListener("click", () => addTemplate(btn.dataset.template)));

  state.colors.forEach((color) => {
    const b = document.createElement("button");
    b.className = "swatch";
    b.style.background = color;
    b.title = color;
    b.addEventListener("click", () => {
      state.stroke = color;
      els.strokeColor.value = color;
    });
    els.swatches.appendChild(b);
  });

  loadFromHash();
  updateStatus();
  setTool("select");
  window.addEventListener("resize", resizeCanvas);
  resizeCanvas();
</script>

  </body>
</html>
