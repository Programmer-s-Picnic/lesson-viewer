<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SQL Playground — Beginner + Fullscreen</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
body { font-family: Arial; margin:0; background:#1e1e1e; color:#eee; }

.vs-titlebar {
  display:flex; justify-content:space-between; padding:10px;
  background:#2d2d2d;
}

button { margin:5px; padding:6px 10px; cursor:pointer; }

textarea {
  width:100%; height:150px; background:#111; color:#0f0;
  padding:10px;
}

#result { margin-top:10px; background:#000; padding:10px; }

.beginner-mode .advanced-only { display:none; }
</style>
</head>

<body>

<div class="vs-titlebar">
  <div>Programmer’s Picnic SQL</div>
  <div>
    <button id="beginnerModeBtn">🧑‍🎓 Beginner Mode</button>
    <button id="fullscreenBtn">⛶ Full Screen</button>
  </div>
</div>

<div style="padding:10px">

  <!-- RUN BUTTONS -->
  <div>
    <button id="runBtn">▶ Run SQL</button>
    <button id="resetBtn">⟳ Reset DB</button>
  </div>

  <!-- SAMPLES -->
  <div>
    <button class="chip" data-sql="SELECT * FROM students;">Students</button>
    <button class="chip" data-sql="SELECT COUNT(*) FROM students;">COUNT</button>
  </div>

  <!-- EDITOR -->
  <textarea id="sqlInput">SELECT * FROM students;</textarea>

  <!-- RESULT -->
  <div id="result">Result will appear here</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>

<script>
let db;

/* INIT SQLITE */
initSqlJs({
  locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}`
}).then(SQL => {

  function initDB() {
    db = new SQL.Database();

    db.run(`
      CREATE TABLE students (id INTEGER, name TEXT);
      INSERT INTO students VALUES (1,'Champak'),(2,'Roy'),(3,'SQL Student');
    `);
  }

  initDB();

  /* RUN SQL */
  document.getElementById("runBtn").onclick = () => {
    const sql = document.getElementById("sqlInput").value;

    try {
      const res = db.exec(sql);

      if (res.length === 0) {
        document.getElementById("result").innerText = "Query executed (no result)";
        return;
      }

      let html = "<table border='1' style='border-collapse:collapse'>";
      html += "<tr>" + res[0].columns.map(c => `<th>${c}</th>`).join("") + "</tr>";

      res[0].values.forEach(row => {
        html += "<tr>" + row.map(v => `<td>${v}</td>`).join("") + "</tr>";
      });

      html += "</table>";

      document.getElementById("result").innerHTML = html;

    } catch (err) {
      document.getElementById("result").innerText = err;
    }
  };

  /* RESET */
  document.getElementById("resetBtn").onclick = () => {
    initDB();
    document.getElementById("result").innerText = "Database reset.";
  };

});

/* SAMPLE CLICK */
document.querySelectorAll(".chip").forEach(btn => {
  btn.onclick = () => {
    document.getElementById("sqlInput").value = btn.dataset.sql;
  };
});

/* BEGINNER MODE */
const beginnerBtn = document.getElementById("beginnerModeBtn");

function setMode(on) {
  document.body.classList.toggle("beginner-mode", on);
  beginnerBtn.textContent = on ? "🧑‍💻 Advanced Mode" : "🧑‍🎓 Beginner Mode";
  localStorage.setItem("mode", on ? "1" : "0");
}

beginnerBtn.onclick = () => {
  setMode(!document.body.classList.contains("beginner-mode"));
};

setMode(localStorage.getItem("mode") !== "0");

/* FULLSCREEN */
const fsBtn = document.getElementById("fullscreenBtn");

fsBtn.onclick = async () => {
  if (!document.fullscreenElement) {
    await document.documentElement.requestFullscreen();
  } else {
    await document.exitFullscreen();
  }
};

document.addEventListener("fullscreenchange", () => {
  fsBtn.textContent = document.fullscreenElement
    ? "⛶ Exit Full Screen"
    : "⛶ Full Screen";
});
</script>

</body>
</html>
