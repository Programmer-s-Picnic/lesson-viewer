<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SQL in Browser — SQLite Demo (VS Code Style)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<meta name="description" content="Practice SQL in your browser using SQLite. Beginner-friendly SQL playground with fullscreen and advanced mode." />

<link rel="stylesheet" href="styles.css" />

<style>
/* BEGINNER MODE */
body.beginner-mode .advanced-only {
  display: none !important;
}

body.beginner-mode .split {
  grid-template-columns: 1fr;
}

body.beginner-mode .samples .chip:not(.beginner-chip) {
  display: none;
}

/* COLLAPSE */
.info-card-body.collapsed {
  display: none;
}
</style>
</head>

<body class="theme-dark">

<!-- TITLEBAR -->
<div class="vs-titlebar">
  <div class="title">Programmer’s Picnic — SQL Playground</div>

  <div class="right">
    <button id="beginnerModeBtn" class="btn-ghost">🧑‍🎓 Beginner Mode</button>
    <button id="fullscreenBtn" class="btn-ghost">⛶ Full Screen</button>
  </div>
</div>

<!-- MAIN -->
<div class="vs-shell">

  <!-- SIDEBAR -->
  <aside class="vs-sidebar">
    <div class="block">
      <b>RUN</b><br><br>
      <button id="runBtn">Run SQL</button>
      <button id="resetBtn">Reset</button>
    </div>

    <!-- ADVANCED -->
    <div class="block advanced-only">
      <b>IMPORT / EXPORT</b><br><br>
      <button>Load DB</button>
      <button>Export DB</button>
    </div>

    <div class="block advanced-only">
      <b>HISTORY</b><br><br>
      <button>Show History</button>
    </div>
  </aside>

  <!-- MAIN AREA -->
  <main class="vs-main">

    <!-- INTRO -->
    <section class="info-card">
      <div class="info-card-head">
        <h2>SQL Introduction</h2>
        <button class="toggle-section-btn" data-target="intro">Show</button>
      </div>

      <div id="intro" class="info-card-body collapsed">
        SQL is used to store, read, update, and manage structured data in databases.
      </div>
    </section>

    <!-- EDITOR -->
    <section class="split">

      <!-- LEFT -->
      <div class="pane">

        <h2>EDITOR</h2>

        <div class="samples">
          <button class="chip beginner-chip" data-sql="SELECT * FROM birthdays;">Birthdays</button>
          <button class="chip beginner-chip" data-sql="SELECT COUNT(*) FROM birthdays;">COUNT</button>
          <button class="chip beginner-chip" data-sql="SELECT MAX(id) FROM birthdays;">MAX</button>
          <button class="chip beginner-chip" data-sql="SELECT * FROM birthdays WHERE id=1;">WHERE</button>

          <!-- ADVANCED -->
          <button class="chip advanced-only" data-sql="SELECT * FROM sqlite_master;">Show Tables</button>
        </div>

        <textarea id="sqlInput">SELECT * FROM birthdays;</textarea>

        <div id="result"></div>

      </div>

      <!-- RIGHT (ADVANCED HISTORY) -->
      <div class="pane advanced-only">
        <h2>QUERY HISTORY</h2>
        <div id="history"></div>
      </div>

    </section>

  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>

<script>
/* BEGINNER MODE */
const beginnerModeBtn = document.getElementById("beginnerModeBtn");

function setBeginnerMode(on) {
  document.body.classList.toggle("beginner-mode", on);
  beginnerModeBtn.textContent = on ? "🧑‍💻 Advanced Mode" : "🧑‍🎓 Beginner Mode";
  localStorage.setItem("beginner", on ? "1" : "0");
}

beginnerModeBtn.onclick = () => {
  setBeginnerMode(!document.body.classList.contains("beginner-mode"));
};

setBeginnerMode(localStorage.getItem("beginner") !== "0");

/* FULLSCREEN */
const fullscreenBtn = document.getElementById("fullscreenBtn");

fullscreenBtn.onclick = async () => {
  if (!document.fullscreenElement) {
    await document.documentElement.requestFullscreen();
  } else {
    await document.exitFullscreen();
  }
};

document.addEventListener("fullscreenchange", () => {
  fullscreenBtn.textContent = document.fullscreenElement
    ? "⛶ Exit Full Screen"
    : "⛶ Full Screen";
});

/* TOGGLE INTRO */
document.querySelectorAll(".toggle-section-btn").forEach(btn => {
  btn.onclick = () => {
    const target = document.getElementById(btn.dataset.target);
    const collapsed = target.classList.toggle("collapsed");
    btn.textContent = collapsed ? "Show" : "Hide";
  };
});

/* SAMPLE SQL CLICK */
document.querySelectorAll(".chip").forEach(btn => {
  btn.onclick = () => {
    document.getElementById("sqlInput").value = btn.dataset.sql;
  };
});
</script>

</body>
</html>
