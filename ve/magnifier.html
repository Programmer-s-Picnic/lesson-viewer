<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Magnifier</title>
    <style>
        .supercontainer {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
        }

        .container {
            display: flex;
            
            flex-direction: column;
        }

        .simpleimage {
            width: 200px;
        }
.cover{
    position: absolute;
    left: 10px;
    width: 400px;
    top:10px;
    height: 400px;
    border-radius: 50%;
    z-index:100001;
    background-color: blue;
}
        .magnifiedimage {
            position: absolute;
    left: 10px;
    width: 400px;
    top:10px;
    height: 400px;
            width: 400px;
            
        }
    </style>
</head>

<body>
    <div class="supercontainer">
        <div class="container">
            <img onmousemove="getPicture(event)" class="simpleimage" src="pics/0.jpg">
            <img onmousemove="getPicture(event)" src="pics/1.jpg" class="simpleimage">
        </div>
        <div class="container" style="position: relative !important;">
            <div class="cover">hoohhhhhhhhh</div><img id="magnifiedimg" class="magnifiedimage" src="pics/0.jpg">
            
</div>
        </div>
    
    <script>
        const magnifiedimg = document.getElementById("magnifiedimg");
        function getPicture(evt) {
            // console.log(evt.target.src);
            const x = evt.clientX;
            const y = evt.clientY;
            console.log(x, y);
            magnifiedimg.src = evt.target.src;
            magnifiedimg.style.left=`${300}.px`;
            magnifiedimg.style.top=`${y}.px`;
        }
    </script>
</body>

</html>
