<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Hello World Coming Out of the Computer — Animated SVG V2</title>
    <meta
      name="description"
      content="An animated HTML page with an SVG illustration of Hello World coming out of a computer screen."
    />
    <style>
      :root {
        --bg1: #fff8ef;
        --bg2: #ffe0a8;
        --bg3: #f6b35f;
        --ink: #1f2937;
        --muted: #6b7280;
        --card: #ffffff;
        --brand: #d97706;
        --brand2: #f59e0b;
        --line: #ead7b0;
        --glow: #6ee7ff;
        --glow2: #c4fbff;
        --shadow: 0 18px 50px rgba(0, 0, 0, 0.16);
        --radius: 26px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
        color: var(--ink);
        background:
          radial-gradient(
            circle at top left,
            rgba(255, 255, 255, 0.65),
            transparent 35%
          ),
          linear-gradient(135deg, var(--bg1), var(--bg2) 48%, var(--bg3));
        min-height: 100vh;
      }

      .wrap {
        width: min(1200px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      .hero {
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.55);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 20px 22px;
        background: linear-gradient(
          90deg,
          rgba(217, 119, 6, 0.12),
          rgba(245, 158, 11, 0.08)
        );
        border-bottom: 1px solid var(--line);
        flex-wrap: wrap;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-badge {
        width: 48px;
        height: 48px;
        border-radius: 16px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, var(--brand), var(--brand2));
        color: #fff;
        font-weight: 800;
        font-size: 22px;
        box-shadow: 0 10px 24px rgba(217, 119, 6, 0.28);
      }

      .title h1 {
        margin: 0;
        font-size: clamp(1.35rem, 2vw, 2rem);
        line-height: 1.15;
      }

      .title p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.98rem;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 11px 16px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          opacity 0.18s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      .btn-primary {
        background: linear-gradient(90deg, var(--brand), var(--brand2));
        color: #fff;
        box-shadow: 0 10px 24px rgba(217, 119, 6, 0.25);
      }

      .btn-secondary {
        background: #fff;
        color: var(--ink);
        border: 1px solid var(--line);
      }

      .stage {
        padding: 18px;
        background:
          radial-gradient(
            circle at 20% 8%,
            rgba(255, 255, 255, 0.55),
            transparent 22%
          ),
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.35),
            rgba(255, 255, 255, 0.12)
          );
      }

      .svg-card {
        background: #fff8ee;
        border: 1px solid var(--line);
        border-radius: 22px;
        overflow: hidden;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      }

      svg {
        display: block;
        width: 100%;
        height: auto;
      }

      .footer-note {
        padding: 14px 22px 22px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .footer-note code {
        background: #fff;
        border: 1px solid var(--line);
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 0.9em;
      }

      @media (max-width: 700px) {
        .topbar {
          padding: 16px;
        }
        .stage {
          padding: 10px;
        }
        .footer-note {
          padding: 10px 16px 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="hero">
        <div class="topbar">
          <div class="brand">
            <div class="brand-badge">HW</div>
            <div class="title">
              <h1>Hello World Coming Out of the Computer — V2</h1>
              <p>
                Animated SVG inside a clean HTML page. The glowing text rises
                from the laptop screen.
              </p>
            </div>
          </div>

          <div class="actions">
            <button class="btn-primary" id="toggleAnimBtn">
              Pause Animation
            </button>
            <button class="btn-secondary" id="downloadBtn">Download SVG</button>
          </div>
        </div>

        <div class="stage">
          <div class="svg-card">
            <svg
              id="helloSvg"
              viewBox="0 0 1400 880"
              xmlns="http://www.w3.org/2000/svg"
              role="img"
              aria-label="Animated SVG showing Hello World coming out of a computer"
            >
              <defs>
                <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#f8d98f" />
                  <stop offset="100%" stop-color="#d1994a" />
                </linearGradient>

                <linearGradient id="floorGrad" x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0%" stop-color="#5b3b2a" />
                  <stop offset="100%" stop-color="#3f281d" />
                </linearGradient>

                <linearGradient id="sofaGrad" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#594033" />
                  <stop offset="100%" stop-color="#261d19" />
                </linearGradient>

                <linearGradient id="clothGrad" x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0%" stop-color="#c31f5e" />
                  <stop offset="100%" stop-color="#8c1240" />
                </linearGradient>

                <linearGradient id="shirtGrad" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#ef4b77" />
                  <stop offset="100%" stop-color="#bc1f4b" />
                </linearGradient>

                <linearGradient id="skinGrad" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#b78164" />
                  <stop offset="100%" stop-color="#8c5f49" />
                </linearGradient>

                <linearGradient id="laptopBody" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#353941" />
                  <stop offset="100%" stop-color="#15181d" />
                </linearGradient>

                <linearGradient id="screenGrad" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#ffffff" />
                  <stop offset="100%" stop-color="#dff8ff" />
                </linearGradient>

                <radialGradient id="screenBurst" cx="50%" cy="50%" r="60%">
                  <stop offset="0%" stop-color="#ffffff" stop-opacity=".95" />
                  <stop offset="35%" stop-color="#7cecff" stop-opacity=".9" />
                  <stop offset="100%" stop-color="#7cecff" stop-opacity="0" />
                </radialGradient>

                <filter
                  id="softGlow"
                  x="-80%"
                  y="-80%"
                  width="260%"
                  height="260%"
                >
                  <feGaussianBlur stdDeviation="8" result="b" />
                  <feMerge>
                    <feMergeNode in="b" />
                    <feMergeNode in="SourceGraphic" />
                  </feMerge>
                </filter>

                <filter
                  id="strongGlow"
                  x="-120%"
                  y="-120%"
                  width="340%"
                  height="340%"
                >
                  <feGaussianBlur stdDeviation="15" result="b1" />
                  <feGaussianBlur stdDeviation="32" result="b2" />
                  <feMerge>
                    <feMergeNode in="b2" />
                    <feMergeNode in="b1" />
                    <feMergeNode in="SourceGraphic" />
                  </feMerge>
                </filter>

                <filter
                  id="shadow"
                  x="-40%"
                  y="-40%"
                  width="180%"
                  height="180%"
                >
                  <feDropShadow
                    dx="0"
                    dy="14"
                    stdDeviation="14"
                    flood-color="#000"
                    flood-opacity=".28"
                  />
                </filter>

                <style>
                  .hello-word {
                    font-family: "Segoe UI", Arial, sans-serif;
                    font-weight: 900;
                    letter-spacing: 3px;
                  }

                  .code-font {
                    font-family: Consolas, Monaco, monospace;
                    font-weight: 700;
                  }

                  .pulseGlow {
                    animation: pulseGlow 2.4s ease-in-out infinite;
                    transform-origin: center;
                  }

                  .screenFlicker {
                    animation: screenFlicker 3s ease-in-out infinite;
                  }

                  .floatA {
                    animation: floatA 5s ease-in-out infinite;
                    transform-origin: center;
                  }
                  .floatB {
                    animation: floatB 5.8s ease-in-out infinite;
                    transform-origin: center;
                  }
                  .floatC {
                    animation: floatC 6.4s ease-in-out infinite;
                    transform-origin: center;
                  }
                  .floatD {
                    animation: floatD 7.1s ease-in-out infinite;
                    transform-origin: center;
                  }

                  .typingFinger {
                    animation: typingFinger 1s ease-in-out infinite;
                    transform-origin: 530px 560px;
                  }

                  .cardHand {
                    animation: cardHand 3.6s ease-in-out infinite;
                    transform-origin: 470px 500px;
                  }

                  .blinkCursor {
                    animation: blinkCursor 1s steps(1) infinite;
                  }

                  .spark1 {
                    animation: sparkRise1 3.4s linear infinite;
                  }
                  .spark2 {
                    animation: sparkRise2 4s linear infinite;
                  }
                  .spark3 {
                    animation: sparkRise3 3.7s linear infinite;
                  }

                  @keyframes pulseGlow {
                    0%,
                    100% {
                      opacity: 0.75;
                      transform: scale(1);
                    }
                    50% {
                      opacity: 1;
                      transform: scale(1.08);
                    }
                  }

                  @keyframes screenFlicker {
                    0%,
                    100% {
                      opacity: 1;
                    }
                    18% {
                      opacity: 0.96;
                    }
                    52% {
                      opacity: 1;
                    }
                    78% {
                      opacity: 0.93;
                    }
                  }

                  @keyframes floatA {
                    0% {
                      transform: translate(0, 0) scale(0.95);
                      opacity: 0;
                    }
                    10% {
                      opacity: 1;
                    }
                    55% {
                      transform: translate(-14px, -76px) scale(1.04);
                      opacity: 1;
                    }
                    100% {
                      transform: translate(-28px, -145px) scale(1.1);
                      opacity: 0;
                    }
                  }

                  @keyframes floatB {
                    0% {
                      transform: translate(0, 0) scale(0.95);
                      opacity: 0;
                    }
                    12% {
                      opacity: 1;
                    }
                    60% {
                      transform: translate(18px, -98px) scale(1.06);
                      opacity: 1;
                    }
                    100% {
                      transform: translate(46px, -168px) scale(1.12);
                      opacity: 0;
                    }
                  }

                  @keyframes floatC {
                    0% {
                      transform: translate(0, 0) scale(0.9);
                      opacity: 0;
                    }
                    15% {
                      opacity: 1;
                    }
                    50% {
                      transform: translate(0, -88px) scale(1.03);
                      opacity: 1;
                    }
                    100% {
                      transform: translate(-8px, -160px) scale(1.13);
                      opacity: 0;
                    }
                  }

                  @keyframes floatD {
                    0% {
                      transform: translate(0, 0) scale(0.92);
                      opacity: 0;
                    }
                    18% {
                      opacity: 1;
                    }
                    56% {
                      transform: translate(12px, -84px) scale(1.03);
                      opacity: 1;
                    }
                    100% {
                      transform: translate(20px, -152px) scale(1.08);
                      opacity: 0;
                    }
                  }

                  @keyframes typingFinger {
                    0%,
                    100% {
                      transform: translateY(0px);
                    }
                    50% {
                      transform: translateY(6px);
                    }
                  }

                  @keyframes cardHand {
                    0%,
                    100% {
                      transform: rotate(0deg) translateY(0px);
                    }
                    50% {
                      transform: rotate(-3deg) translateY(-4px);
                    }
                  }

                  @keyframes blinkCursor {
                    0%,
                    48% {
                      opacity: 1;
                    }
                    49%,
                    100% {
                      opacity: 0;
                    }
                  }

                  @keyframes sparkRise1 {
                    0% {
                      transform: translate(0, 0) scale(0.7);
                      opacity: 0;
                    }
                    20% {
                      opacity: 1;
                    }
                    100% {
                      transform: translate(-20px, -120px) scale(1.3);
                      opacity: 0;
                    }
                  }

                  @keyframes sparkRise2 {
                    0% {
                      transform: translate(0, 0) scale(0.8);
                      opacity: 0;
                    }
                    16% {
                      opacity: 1;
                    }
                    100% {
                      transform: translate(28px, -150px) scale(1.4);
                      opacity: 0;
                    }
                  }

                  @keyframes sparkRise3 {
                    0% {
                      transform: translate(0, 0) scale(0.75);
                      opacity: 0;
                    }
                    18% {
                      opacity: 1;
                    }
                    100% {
                      transform: translate(6px, -132px) scale(1.35);
                      opacity: 0;
                    }
                  }

                  .paused * {
                    animation-play-state: paused !important;
                  }
                </style>
              </defs>

              <!-- room -->
              <rect width="1400" height="880" fill="url(#wallGrad)" />
              <rect y="705" width="1400" height="175" fill="url(#floorGrad)" />

                <rect

                <!-- shoulder / arm holding card -->
                <g class="cardHand">
                  <path
                    d="M376 498 Q486 480 600 500 Q616 506 609 520 Q602 534 584 532 Q499 523 405 540 Z"

              <!-- laptop -->

                <ellipse

                <!-- keyboard -->

                  <rect x="22" y="58" width="21" height="15" rx="3" />

                  <rect x="43" y="124" width="21" height="15" rx="3" />

    <script>
      (function () {
        const svg = document.getElementById("helloSvg");
        const btn = document.getElementById("toggleAnimBtn");
        const downloadBtn = document.getElementById("downloadBtn");
        let paused = false;

        btn.addEventListener("click", function () {
          paused = !paused;
          if (paused) {
            svg.classList.add("paused");
            btn.textContent = "Play Animation";
          } else {
            svg.classList.remove("paused");
            btn.textContent = "Pause Animation";
          }
        });

        downloadBtn.addEventListener("click", function () {
          const serializer = new XMLSerializer();
          const svgString = serializer.serializeToString(svg);
          const blob = new Blob([svgString], {
            type: "image/svg+xml;charset=utf-8",
          });
          const url = URL.createObjectURL(blob);

          const a = document.createElement("a");
          a.href = url;
          a.download = "hello-world-computer-v2.svg";
          document.body.appendChild(a);
          a.click();
          a.remove();

          setTimeout(function () {
            URL.revokeObjectURL(url);
          }, 1000);
        });
      })();
    </script>
