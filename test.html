<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Programmer's Picnic SQL Playground</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
--bg:#1e1e1e;
--panel:#252526;
--text:#e6e6e6;
--accent:#3794ff;
--border:#3a3a3a;
--good:#22c55e;
--bad:#f85149;
}

body.light{
--bg:#f7f7fb;
--panel:#ffffff;
--text:#1f2937;
--border:#d3d9e3;
--accent:#2563eb;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
display:flex;
flex-direction:column;
height:100vh;
}

header{
height:40px;
display:flex;
align-items:center;
padding:0 12px;
background:var(--panel);
border-bottom:1px solid var(--border);
}

header .title{
font-weight:700;
}

header .right{
margin-left:auto;
display:flex;
gap:10px;
}

button{
padding:8px 10px;
border-radius:8px;
border:1px solid var(--border);
background:var(--panel);
color:var(--text);
cursor:pointer;
}

button:hover{
background:var(--accent);
color:white;
}

main{
flex:1;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

textarea{
width:100%;
height:220px;
background:#111;
color:#e6e6e6;
border-radius:10px;
padding:10px;
font-family:monospace;
}

.result{
overflow:auto;
border:1px solid var(--border);
border-radius:10px;
padding:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border-bottom:1px solid var(--border);
padding:6px;
}

.history{
border-top:1px solid var(--border);
padding:10px;
overflow:auto;
height:150px;
}

.history pre{
margin:0;
}

.status{
font-size:12px;
color:#9aa0a6;
}

</style>
</head>

<body>

<header>
<div class="title">Programmer's Picnic — SQL Playground</div>

<div class="right">
<button id="themeToggle">🌙 Theme</button>
<button id="runBtn">▶ Run</button>
</div>
</header>

<main>

<div>
<h3>SQL Editor</h3>

<textarea id="sqlInput">SELECT * FROM birthdays;</textarea>

<div style="margin-top:8px">
<button id="resetDB">Reset DB</button>
</div>

</div>

<div>
<h3>Result</h3>

<div class="result" id="result"></div>

<div class="status" id="status"></div>

</div>

</main>

<div class="history">
<h4>Query History</h4>
<div id="history"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>

<script>

let db
let SQL
let history = []

const sqlInput = document.getElementById("sqlInput")
const resultDiv = document.getElementById("result")
const status = document.getElementById("status")
const historyDiv = document.getElementById("history")

function addHistory(q){

history.unshift(q)

if(history.length>20) history.pop()

renderHistory()

}

function renderHistory(){

historyDiv.innerHTML = history.map(q=>`
<div>
<pre>${q}</pre>
</div>
`).join("")

}

function renderTable(columns,values){

let html="<table><tr>"

columns.forEach(c=> html+=`<th>${c}</th>`)

html+="</tr>"

values.forEach(row=>{
html+="<tr>"
row.forEach(v=>{
html+=`<td>${v}</td>`
})
html+="</tr>"
})

html+="</table>"

resultDiv.innerHTML=html

}

function runSQL(){

let q = sqlInput.value.trim()

if(!q) return

try{

let res = db.exec(q)

if(res.length===0){

resultDiv.innerHTML="<b>Query executed.</b>"
status.textContent="Success"
addHistory(q)
return

}

let r=res[0]

renderTable(r.columns,r.values)

status.textContent=`${r.values.length} rows returned`

addHistory(q)

}catch(e){

status.textContent="Error: "+e.message

}

}

document.getElementById("runBtn").onclick = runSQL

document.getElementById("resetDB").onclick = ()=>{

createDB()

status.textContent="Database reset"

}

document.getElementById("themeToggle").onclick = ()=>{

document.body.classList.toggle("light")

}

function createDB(){

db = new SQL.Database()

db.run(`
CREATE TABLE birthdays(
id INTEGER PRIMARY KEY AUTOINCREMENT,
name TEXT,
birthday TEXT
);
`)

db.run(`
INSERT INTO birthdays(name,birthday) VALUES
('Alice','1990-01-01'),
('Bob','1988-04-12'),
('Charlie','1995-07-22');
`)

}

initSqlJs({

locateFile: file =>
"https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/"+file

}).then(SQLLib=>{

SQL = SQLLib

createDB()

status.textContent="SQLite ready"

})

</script>

</body>
</html>
